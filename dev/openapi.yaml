  /Wl/Member/Purchase/MemberByPromotion.json:
    get:
      operationId: Wl.Member.Purchase.MemberByPromotionApi.get
      responses:
        '200':
          description: 'Successful response.'
          content:
            application/json:
              schema:
                type: object
                properties:
                  a_clients:
                    type: array
                    items:
                      type: object
                      properties:
                        a_purchase_options:
                          type: object
                          description: 'The list of active Purchase Options. Each element has:'
                          properties:
                            dl_end:
                              type:
                                - string
                                - 'null'
                              description: |-
                                The date in the location time zone when the Purchase Option expires.
                                  This will be `null` if the Purchase Option doesn't expire.
                            dtu_purchase:
                              type: string
                              description: 'The global date and time when the Purchase Option was sold.'
                            dl_start:
                              type:
                                - string
                                - 'null'
                              description: |-
                                The date in location's time zone when the Purchase Option starts.
                                  This will be `null` if not defined yet. For example, if the starting date is the date of the first visit
                                  and there haven't been any visits yet.
                            dl_terminate:
                              type:
                                - string
                                - 'null'
                              description: |-
                                The date in location time zone when the Purchase Option will be terminated.
                                  This will be `null` if the Purchase Option isn't scheduled to be terminated.
                            k_promotion:
                              type: string
                              description: 'The key of the Purchase Option.'
                          required:
                            - dl_end
                            - dtu_purchase
                            - dl_start
                            - dl_terminate
                            - k_promotion
                        uid:
                          type: string
                          description: 'The key of the client.'
                      required:
                        - a_purchase_options
                        - uid
                required:
                  - a_clients
