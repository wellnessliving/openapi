      summary: 'Completes the appointment booking and processes payment for the client.'
      description: |-
        Delegates to `post()` to handle a single appointment booking, mapping
         the legacy single-provider request fields to the multi-provider format. Creates an appointment
         record, applies the selected Purchase Option, and sends the booking confirmation notification.
      tags:
        - Appointments
      parameters:
        -
          $ref: '#/components/parameters/X-Error-Rules'
        -
          name: a_book_data
          in: query
          required: true
          schema:
            type: array
            items:
              type: object
              properties:
                a_conflict:
                  type: object
                  description: 'Information about booking conflicts. Keys are bookings dates/times in MySQL format in UTC. Values are arrays with next keys:'
                  properties:
                    dt_date_local:
                      type: string
                      description: 'New appointment date/time in MySQL in locale timezone.'
                    i_duration:
                      type: integer
                      format: int32
                      description: 'New asset booking duration.'
                    i_index:
                      type: integer
                      format: int32
                      description: 'New asset index.'
                    id_conflict:
                      $ref: '#/components/schemas/RsAppointmentEditConflictSid'
                      description: 'Solution type. One of [RsAppointmentEditConflictSid](#/components/schemas/RsAppointmentEditConflictSid) constants.'
                    k_resource:
                      type: string
                      description: 'New asset.'
                    k_staff:
                      type:
                        - string
                        - 'null'
                      description: 'New staff member.  `null` in a case of asset booking.'
                  required:
                    - dt_date_local
                    - i_duration
                    - i_index
                    - id_conflict
                    - k_resource
                    - k_staff
                a_product:
                  type: object
                  description: |-
                    Add-ons to the appointment. Specify this for appointment bookings only.
                    Old format: array keys refer to primary keys. 
                    New format: each element is an array:
                  properties:
                    i_count:
                      type: integer
                      format: int32
                      description: 'The add-on count'
                    i_count_use:
                      type: integer
                      format: int32
                      description: 'The add-on use count.'
                    k_shop_product_option:
                      type: string
                      description: 'The key of add-on.'
                  required:
                    - i_count
                    - k_shop_product_option
                a_repeat:
                  type: object
                  description: |-
                    Recurring booking information:

                    This will be empty if the appointment isn't recurring.
                  properties:
                    a_week:
                      type: array
                      description: |-
                        The days of week when appointment repeats. One of the [ADateWeekSid](#/components/schemas/ADateWeekSid) constants.
                        This will be empty if the appointment doesn't repeat weekly.
                      items:
                        type: integer
                        format: int32
                    dl_end:
                      type: string
                      description: "The date when the appointment's repeat cycle stops. This will be empty if the repeat cycle doesn't stop at a certain date."
                    i_occurrence:
                      type: integer
                      format: int32
                      description: |-
                        The number of occurrences after which the appointment's repeat cycle must stop.
