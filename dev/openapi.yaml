      summary: 'Retrieves a list of information about available purchase options.'
      description: |-
        Extends `get()` to also support rescheduling an existing appointment by
         accepting an optional appointment key. When a key is provided, the existing appointment is
         validated and its current Purchase Option usage is taken into account when calculating
         eligibility for available options.
      tags:
        - Appointments
      parameters:
        -
          $ref: '#/components/parameters/X-Error-Rules'
        -
          name: a_service
          in: query
          required: true
          schema:
            type: array
            items:
              type: object
              properties:
                a_purchase:
                  type: object
                  description: |-
                    List of purchase options selected for the service.
                       Should be set if a new purchase option is selected for this service.
                  properties:
                    id_purchase_item:
                      $ref: '#/components/schemas/RsPurchaseItemSid'
                      description: 'Purchase item ID. Constant from [RsPurchaseItemSid](#/components/schemas/RsPurchaseItemSid).'
                    k_id:
                      type: string
                      description: 'Purchase item key.'
                    is_purchase_previous:
                      type: boolean
                      description: |-
                        Should be `true` if this promotion is selected again, i.e. one that has already been applied to another appointment.
                         This is needed to correctly calculate the remaining quantity of promotions with limited uses.
                  required:
                    - id_purchase_item
                    - k_id
                dt_date:
                  type: string
                  description: 'Local date/time to check purchase options expiration.'
                k_login_prize:
                  type:
                    - string
                    - 'null'
                  description: |-
                    Login prize key. 
                       `null` if no login prize used to pay for this service.
                k_login_promotion:
                  type:
                    - string
                    - 'null'
                  description: |-
                    Login promotion key.
                       Should be set if login promotion selected for this service.
                k_service:
                  type: string
                  description: 'Service key.'
                k_timezone:
                  type: string
                  description: |-
                    The timezone key for `dt_date` field.

                       Can be `null` if timezone is not selected.
                       If not selected, the default client timezone will be used.
                       

                       In any case, the timezone will be used if the business allows client timezones.
              required:
                - a_purchase
                - dt_date
                - k_login_prize
                - k_login_promotion
                - k_service
                - k_timezone
          description: |-
            List of selected services without current [PurchaseApi](/Wl/Appointment/Book/Purchase/Purchase.json).

            The list of these services directly affects the list of selected promotions.
            Depending on the number and order of services, there may be different results.

            The current [PurchaseApi](/Wl/Appointment/Book/Purchase/Purchase.json) will be added to the end of this list.
            It is worth considering this list as a list of previously selected services.

            Each element has the following structure:
        -
          name: a_uid
          in: query
          required: true
          schema:
            type: array
            items:
              type: string
          description: |-
            List of user keys to book appointments.
            There may be empty values in this list, which means that this is a walk-in.
        -
          name: dt_date
          in: query
          required: true
          schema:
            type: string
            format: date-time
          description: 'The date to use to check for expiration of Purchase Options.'
        -
          name: i_duration
          in: query
          required: true
          schema:
            type: integer
            format: int32
          description: 'The asset booking duration.'
        -
          name: i_height
          in: query
          required: false
          schema:
            type:
              - integer
              - 'null'
            format: int32
          description: |-
            Image height in pixels. Please specify this value if you need image to be returned in specific size.
            In case this value is not specified returned image will have default thumbnail size.
        -
          name: i_width
          in: query
          required: false
          schema:
            type:
              - integer
              - 'null'
            format: int32
          description: |-
            Image width in pixels. Please specify this value if you need image to be returned in specific size.
            In case this value is not specified returned image will have default thumbnail size.
        -
          name: id_mode
          in: query
          required: true
          schema:
            $ref: '#/components/schemas/Wl.Mode.ModeSid'
          description: 'The mode type. One of the [ModeSid](#/components/schemas/Wl.Mode.ModeSid) constants.'
        -
          name: is_backend
          in: query
          required: true
          schema:
            type: boolean
          description: |-
            `true` - get all Purchase Options suitable for appointment.
            `false` - get only Purchase Options available for the client.
        -
          name: is_walk_in
          in: query
          required: true
          schema:
            type: boolean
          description: 'If `true`, the client is a walk-in. Otherwise, this will be `false`.'
        -
          name: k_appointment
          in: query
          required: false
          schema:
            type:
              - string
              - 'null'
          description: |-
            Appointment key. 
            Not empty in case when we return payment options for rescheduling existing appointment.
        -
          name: k_location
          in: query
          required: true
          schema:
            type: string
          description: 'Location to show available appointment booking schedule.'
        -
          name: k_login_promotion
          in: query
          required: false
          schema:
            type:
              - string
              - 'null'
          description: |-
            The Purchase Option ID used to pay for the appointment.
            This will be `null` if the client doesn't have a suitable Purchase Option.
        -
          name: k_resource
          in: query
          required: true
          schema:
            type: string
          description: 'The resource key.'
        -
          name: k_service
          in: query
          required: true
          schema:
            type: string
          description: |-
            The service key used to select available Purchase Options.
            If multiple services are selected, they should be specified in [PurchaseApi](/Wl/Appointment/Book/Purchase/Purchase.json) array.
        -
          name: k_timezone
          in: query
          required: false
          schema:
            type:
              - string
              - 'null'
          description: |-
            The timezone key for [PurchaseApi](/Wl/Appointment/Book/Purchase/Purchase.json).

            Can be `null` if timezone is not selected.
            If not selected, the default client timezone will be used.


            In any case, the timezone will be used if the business allows client timezones.
        -
          name: uid
          in: query
          required: true
          schema:
            type: string
          description: |-
            The user key.

            This field is used if the client books for himself or for the relative.

            This field is incorrect to use for guest booking since in this case the client will be checked as a relative.

            In case of a group booking or a guest booking, the key of the client who is making the booking is set here.
      x-rate-limit:
        -
          limit: 200000
          period: 3600
  /Wl/Appointment/Book/Question/Question.json:
    get:
      operationId: Wl.Appointment.Book.Question.QuestionApi.get
