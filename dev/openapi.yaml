      operationId: Wl.Book.Process.Relation.RelationApi.post
      responses:
        '200':
          description: 'Successful response.'
          content:
            application/json:
              schema:
                type: object
                properties:
                  uid_create:
                    type: string
                    description: 'The newly added relative.'
                required:
                  - uid_create
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '404':
          $ref: '#/components/responses/404'
        '422':
          $ref: '#/components/responses/422'
        '500':
          $ref: '#/components/responses/500'
      summary: 'Added new relative.'
      description: |-
        Creates a new family member profile for the specified business and links it as a relative of `uid_from`,
        applying birthday validation, email-inheritance rules, and payment responsibility settings. Returns the UID
        of the newly created user in `uid_create`.
      tags:
        - Booking
      parameters:
        -
          $ref: '#/components/parameters/X-Error-Rules'
        -
          name: k_business
          in: query
          required: true
          schema:
            type: string
          description: 'The business where `uid_from` creates the new relative.'
        -
          name: uid_from
          in: query
          required: true
          schema:
            type: string
          description: "The user who's adding the new relative."
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                i_day:
                  type:
                    - integer
                    - 'null'
                  format: int32
                  description: |-
                    Day of birthday.
                    `null` if birthday is not entered.
                i_month:
                  type:
                    - integer
                    - 'null'
                  format: int32
                  description: |-
                    Month of birthday.
                    `null` if birthday is not entered.
                i_year:
                  type:
                    - integer
                    - 'null'
                  format: int32
                  description: |-
                    Year of birthday.
                    `null` if birthday is not entered.
                id_mode:
