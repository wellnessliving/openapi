  /Wl/Login/Attendance/AttendanceInfo.json:
    get:
      operationId: Wl.Login.Attendance.AttendanceInfoApi.get
      responses:
        '200':
          description: 'Successful response.'
          content:
            application/json:
              schema:
                type: object
                properties:
                  a_appointment_visit_info:
                    type: array
                    items:
                      type: object
                      properties:
                        is_deny:
                          type: boolean
                          description: '`true` means that appointment was requested and denied by the staff.'
                        is_notify_request_accept:
                          type: boolean
                          description: '`true` means that the client will receive a notification, if appointment will be confirmed by the staff.'
                        is_notify_request_deny:
                          type: boolean
                          description: '`true` means that the client will receive a notification, if appointment will be denied by the staff.'
                        is_request:
                          type: boolean
                          description: '`true` means that appointment was requested, but not confirmed by the staff.'
                      required:
                        - is_deny
                        - is_notify_request_accept
                        - is_notify_request_deny
                        - is_request
                  a_logo:
                    type: array
                    items:
                      type: object
                      properties:
                        is_empty:
                          type: boolean
                          description: 'Whether service image is empty.'
                        s_url:
                          type: string
                          description: 'Url link to image.'
                      required:
                        - is_empty
                        - s_url
                  a_purchase_option_default:
                    type: array
                    items:
                      type: object
                      properties:
                        id_sale:
                          $ref: '#/components/schemas/RsSaleSid'
                          description: |-
                            The sale item type, one of the [RsSaleSid](#/components/schemas/RsSaleSid) constants.
                            This will be `null` if the class has no default Purchase Option, or it sets to "Drop-in rate".
                        k_id:
                          type:
                            - string
                            - 'null'
                          description: |-
                            The default Purchase Option key. 
                            This will be `null` if the class has no default Purchase Option, or it sets to "Drop-in rate".
                        is_single_default:
                          type: boolean
                          description: 'If the default Purchase Option is set to "Drop-in rate" then the value will be `true`, `false` otherwise.'
                      required:
                        - id_sale
                        - k_id
                        - is_single_default
                  a_resource:
                    type: array
                    description: 'Assets which are bound to this session.'
                    items:
                      type: string
                  a_resource_layout:
                    type: array
                    items:
                      type: object
                      properties:
                        a_client:
                          type: object
                          description: |-
                            List of clients who occupy assets of class.
                            It is a double nesting array.
                            Keys -  Sub keys - asset index.
                            Values - sub array with keys:
                          properties:
                            text_client:
                              type: string
                              description: "User's name."
                            uid:
                              type: string
                              description: "User's primary key."
                          required:
                            - text_client
                            - uid
                        a_resource_available:
                          type: array
                          description: 'Key of asset.'
                          items:
                            type: string
                        k_resource_layout:
                          type: string
                          description: 'Key of layout.'
                        text_resource_type:
                          type: string
                          description: 'Title of asset category.'
                      required:
                        - a_client
                        - a_resource_available
                        - k_resource_layout
                        - text_resource_type
                  a_staff:
                    type: array
                    items:
                      type: object
                      properties:
                        a_logo:
                          type: object
                          description: "Data of staff member's photo. Empty if staff has no photo. Otherwise contains next keys:"
                          properties:
                            i_height:
                              type: integer
                              format: int32
                              description: 'Height in pixels.'
                            i_width:
                              type: integer
                              format: int32
                              description: 'Width in pixels.'
                            url_logo:
                              type: string
                              description: 'Image URL.'
                          required:
                            - i_height
                            - i_width
                            - url_logo
                        k_staff:
                          type: string
                          description: 'deprecated Legacy staff key. Returned only for applications from allow-list.'
                        uid_staff:
                          type: string
                          description: 'Staff user key.'
                        html_firstname:
                          type: string
                          description: "Staff member's first name."
                        html_lastname:
                          type: string
                          description: "Staff member's last name."
                      required:
                        - a_logo
                        - k_staff
                        - uid_staff
                        - html_firstname
                        - html_lastname
                  dt_confirm:
                    type: string
                    format: date-time
                    description: 'Confirmation date+time of appointment in MySQL format. If client never confirmed, will be zero date + time.'
                  dt_date_global:
                    type: string
                    format: date-time
                    description: 'Start date of the session in MySQL format in GMT.'
                  dtl_end:
                    type: string
                    format: date-time
                    description: 'End date and time of the session in MySQL format in local timezone.'
                  dtu_end:
                    type: string
                    format: date-time
                    description: 'End date and time of the session in MySQL format in GMT.'
                  dtu_wait_promote:
                    type: string
                    format: date-time
                    description: |-
                      Date and time in UTC when the visit is promoted from wait list to active list.
                      Not empty for appointments.
                  has_note:
                    type: boolean
                    description: 'Whether notes added to visit.'
                  i_duration:
                    type: integer
                    format: int32
                    description: 'Duration of the session in minutes.'
                  id_note:
                    $ref: '#/components/schemas/Wl.Visit.Note.Sid.NoteSid'
                    description: 'Type of note. One of [NoteSid](#/components/schemas/Wl.Visit.Note.Sid.NoteSid) constants. `false` if notes not allowed.'
                  id_service:
                    $ref: '#/components/schemas/RsServiceSid'
                    description: 'Service type, one of [RsServiceSid](#/components/schemas/RsServiceSid).'
                  is_start_virtual_service:
                    type: boolean
                    description: |-
                      Whether this service be carried out in Zoom.
                      `true` - If the service can be carried out in Zoom.
                      `false` - otherwise.
                  k_class:
                    type: string
                    description: 'Class identifier. Not empty if service is class or event reservation.'
                  k_location:
                    type: string
                    description: 'Location identifier.'
                  k_resource:
                    type: string
                    description: 'Resource identifier. Not empty if service is asset reservation.'
                  k_service:
                    type: string
                    description: 'Service identifier. Not empty if service is appointment reservation.'
                  text_location:
                    type: string
                    description: 'Location name.'
                  text_time_end:
                    type: string
                    description: 'Time when service starts in format `8:00AM`.'
                  text_time_start:
                    type: string
                    description: "Start time of the session in format '9:30AM'."
                  text_title:
                    type: string
                    description: 'Title of the appointment.'
                  url_booking:
                    type: string
                    description: |-
                      URL that leads directly to the class/event booking page in the Client Web App.
                      Empty string if the service is an appointment reservation.
                required:
                  - a_appointment_visit_info
                  - a_logo
                  - a_purchase_option_default
                  - a_resource
                  - a_resource_layout
                  - a_staff
                  - dt_confirm
                  - dt_date_global
                  - dtl_end
                  - dtu_end
                  - dtu_wait_promote
                  - has_note
                  - i_duration
                  - id_note
                  - id_service
                  - is_start_virtual_service
                  - k_class
                  - k_location
                  - k_resource
                  - k_service
                  - text_location
                  - text_time_end
                  - text_time_start
                  - text_title
                  - url_booking
