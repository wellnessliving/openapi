                a_setting:
                  type: array
                  items:
                    type: object
                    properties:
                      a_notify_additional:
                        type: array
                        description: |-
                          List of additional email addresses which should receive email notification after quiz is submitted.

                          Considered only if `is_notify_additional` is `true`.
                        items:
                          type: string
                      a_service:
                        type: array
                        description: |-
                          List of services grouped by service ID.

                          Key is service ID. One of [ServiceSid](#/components/schemas/Wl.Quiz.Service.ServiceSid) constants.
                          Values is list of services.
                        items:
                          type: array
                          items:
                            type: string
                      hide_frontend:
                        type: boolean
                        description: 'Whether completed forms should be hidden for client in frontend.'
                      i_notify_automated:
                        oneOf:
                          -
                            type: integer
                            format: int32
                          -
                            type: string
                        description: |-
                          Number of periods email reminders should be sent for incomplete forms after. Type of a period is specified by
                            `id_notify_automated`.
                      id_book_request_type:
                        $ref: '#/components/schemas/Wl.Quiz.QuizFrequencySid'
                        description: |-
                          Whether response is required every time they book service.

                          Considered only if `is_book` is `true`.
                      id_notify_automated:
                        $ref: '#/components/schemas/ADurationSid'
                        description: 'Time interval ID. One of [ADurationSid](#/components/schemas/ADurationSid) constants.'
                      id_purchase_request_type:
                        $ref: '#/components/schemas/Wl.Quiz.QuizFrequencySid'
                        description: |-
                          Whether response is required every time they purchase service.

                          Considered only if `is_purchase` is `true`.
                      is_amend_support:
                        type: boolean
                        description: 'Whether form support amending responses.'
                      is_book:
                        type: boolean
                        description: |-
                          Whether quiz is required during/after book service selected in `a_service` list.
                          * Related to options:
                          * * `is_service_all`
                          * * `is_book_before`
                          * * `id_book_request_type`
                      is_book_before:
                        type: boolean
                        description: |-
                          Whether quiz is required during booking process.

                          Considered only if `is_book` is `true`.
                      is_internal:
                        type: boolean
                        description: |-
                          Whether form can be required for clients.
                          Internal forms can be only added to client profiles or filled by direct link,
                           but they don't prevent clients to perform any actions until form filled.
                           `true` if form can be visible to clients
                           `false` otherwise
                      is_notify_additional:
                        type: boolean
                        description: |-
                          Whether email notification should be sent to specific email addresses after quiz is submitted.

                          List of email addresses stored in `a_notify_additional`.
                      is_notify_automated:
                        type: boolean
                        description: 'Whether email reminders should be sent for incomplete forms.'
                      is_notify_client:
                        type: boolean
                        description: 'Whether email notification should be sent to client after quiz submitted.'
                      is_notify_staff:
                        type: boolean
                        description: 'Whether email notification should be sent to staff members after quiz is submitted.'
                      is_prevent_franchisee:
                        type: boolean
                        description: |-
                          Whether form can be edited by franchisee.
                          `true` prevent franchisees from editing this form, `false` - otherwise.
                      is_private:
                        type: boolean
                        description: |-
                          Whether form can be viewed by staff member only after confirmation.
                          `true` if form can be viewed only after confirmation
                          `false` if form can be viewed always
                      is_purchase:
                        type: boolean
                        description: |-
                          Whether quiz is required during/after purchase service selected in `a_service` list.
                          Related to options:
                          * `is_purchase_all`
                          * `is_purchase_before`
                          * `id_purchase_request_type`
                      is_purchase_all:
                        type: boolean
                        description: 'Whether all services for purchase should be added in `a_service`.'
                      is_purchase_before:
                        type: boolean
                        description: |-
                          Whether quiz is required during purchase process.

                          Considered only if `is_purchase` is `true`.
                      is_register_after:
                        type: boolean
                        description: 'Whether quiz is required after registration process.'
                      is_register_before:
                        type: boolean
                        description: |-
                          Whether quiz is required during registration process.

                          Considered only if `is_register_after` is `true`.
                      is_require_user:
                        type: boolean
                        description: 'Whether client should be redirected to sign-in page before completing the form.'
                      is_service_all:
                        type: boolean
                        description: 'Whether all services for booking should be added in `a_service`.'
                    required:
                      - a_notify_additional
                      - a_service
                      - hide_frontend
                      - i_notify_automated
                      - id_book_request_type
                      - id_notify_automated
                      - id_purchase_request_type
                      - is_amend_support
                      - is_book
                      - is_book_before
                      - is_internal
                      - is_notify_additional
                      - is_notify_automated
                      - is_notify_client
                      - is_notify_staff
                      - is_prevent_franchisee
                      - is_private
                      - is_purchase
                      - is_purchase_all
                      - is_purchase_before
                      - is_register_after
                      - is_register_before
                      - is_require_user
                      - is_service_all
