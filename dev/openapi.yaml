                        description: '`true` to send mail; `false` to not send.'
                      is_sms:
                        type: boolean
                        description: '`true` to send SMS; `false` to not send.'
                      is_push:
                        type: boolean
                        description: '`true` to send push notification; `false` to not send.'
                a_pay_form:
                  type: array
                  items:
                    type: object
                    properties:
                      f_amount:
                        type: number
                        format: float
                        description: 'Amount of money to withdraw with this payment source.'
                      id_pay_method:
                        $ref: '#/components/schemas/RsPayMethodSid'
                        description: 'Payment method. One of [RsPayMethodSid](#/components/schemas/RsPayMethodSid) constants.'
