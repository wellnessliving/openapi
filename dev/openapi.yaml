                k_login_promotion:
                  type: string
                  description: 'Login promotion to be used to book a class.'
                k_session_pass:
                  type: string
                  description: 'Session pass to be used to book a class.'
                s_signature:
                  type: string
                  description: 'User signature.'
              required:
                - a_resource
                - a_session_select
                - a_session_wait_list_unpaid
                - can_book
                - is_agree
                - is_book_unpaid
                - is_force_pay_later
                - k_login_promotion
                - k_session_pass
                - s_signature
