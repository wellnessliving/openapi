  /Wl/Reception/Application/ReceptionAuthorize.json:
    post:
      operationId: Wl.Reception.Application.ReceptionAuthorizeApi.post
      responses:
        '200':
          description: 'Successful response.'
          content:
            application/json:
              schema:
                type: object
                properties:
                  a_select:
                    type: array
                    items:
                      type: object
                      properties:
                        text_name_first:
                          type: string
                          description: 'First name of the user.'
                        text_name_last:
                          type: string
                          description: 'Last name of the user.'
                        uid:
                          type: string
                          description: 'Key of the user.'
                        url_image:
                          type: string
                          description: 'Link to the profile image.'
                      required:
                        - text_name_first
                        - text_name_last
                        - uid
                        - url_image
                  uid:
                    type: string
                    description: |-
                      Key of the authorized user.

                      Can be set only this field or `a_select`.
                      It depends, whether we found one user or multiple.
                required:
                  - a_select
                  - uid
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '404':
          $ref: '#/components/responses/404'
        '422':
          $ref: '#/components/responses/422'
        '500':
          $ref: '#/components/responses/500'
      summary: 'Performs authorization based on the given authorization value and business settings.'
      description: |-
        Looks up clients by member ID, email address, or phone number and returns matching user records for selection
        in the Self Check-In Web App.
      tags:
        - Reception
      parameters:
        -
          $ref: '#/components/parameters/X-Error-Rules'
        -
          name: k_business
          in: query
          required: true
          schema:
            type: string
          description: 'Key of the business, where Check In application is started.'
        -
          name: k_location
          in: query
          required: true
          schema:
            type: string
          description: 'Key of the location, where Check In application is started.'
        -
          name: s_secret
          in: query
          required: true
          schema:
            type: string
          description: 'Key of the Check In application.'
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                text_authorize:
                  type: string
                  description: |-
                    Authorization value - it's a value, which client entered on authorization form.

                    It can be client ID, email or phone number. Depends on the business settings.
              required:
                - text_authorize
      x-rate-limit:
        -
          limit: 200000
          period: 3600
