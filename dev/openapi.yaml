                    type: array
                    items:
                      type: object
                      properties:
                        i_age_from:
                          type:
                            - integer
                            - 'null'
                          format: int32
                          description: "The minimum age permitted for the event. This will be `null` if a minimum age isn't set or available."
                        i_age_to:
                          type:
                            - integer
                            - 'null'
                          format: int32
                          description: "The maximum age permitted for the event. This will be `null` if a maximum age isn't set or available."
                        is_age_public:
                          type: boolean
                          description: |-
                            If `true`, age restrictions are public and available. Otherwise, this will be `false` if they're hidden.
                            When restrictions are hidden and the current user isn't a staff member, the age range will be empty.
                      required:
                        - i_age_from
                        - i_age_to
                        - is_age_public
                  a_data:
                    type: array
                    items:
                      type: object
                      properties:
                        a_service_access:
                          type: array
                          description: |-
                            Access to services for a purchase option.
                            Keys are one of the [ServiceSid](#/components/schemas/Wl.Service.ServiceSid) constants, values are one of the [AFlagSid](#/components/schemas/AFlagSid)
                            constants. Set only for relevant purchase option service category.
                            [AFlagSid::ON](#/components/schemas/AFlagSid) access to some services.
                            [AFlagSid::OFF](#/components/schemas/AFlagSid) no access to services. It can be set only for classes and events.
                            [AFlagSid::ALL](#/components/schemas/AFlagSid) access to all services. It can be set only for classes and events.
                            For purchase options with appointments and assets service category status is always [AFlagSid::ON](#/components/schemas/AFlagSid).
                          items:
                            type: integer
                            format: int32
                        is_renew_public:
                          type: boolean
                          description: |-
                            This applies only for promotions.
                            `true` - clients can set promotion auto-renew.
                            `false` - clients can't set promotion auto-renew.
                        a_component:
                          type: object
                          description: 'This applies only for coupons. Coupon components information. Each element will contain the following keys:'
                          properties:
                            id_program:
                              $ref: '#/components/schemas/RsProgramSid'
                              description: "Program ID. One of [RsProgramSid](#/components/schemas/RsProgramSid) ID's. Only applies to promotions."
                            id_purchase_item:
                              $ref: '#/components/schemas/RsPurchaseItemSid'
                              description: "Purchase item ID. One of [RsPurchaseItemSid](#/components/schemas/RsPurchaseItemSid) ID's."
                            id_sale:
                              $ref: '#/components/schemas/RsSaleSid'
                              description: "Sale ID. One of [RsSaleSid](#/components/schemas/RsSaleSid) ID's."
                            k_id:
