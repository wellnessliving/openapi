                            explorer. Otherwise, this will be `false`.
                        is_introductory:
                          type: boolean
                          description: 'If `true`, this promotion is for introductory clients. Otherwise, this will be `false`.'
                        is_online:
                          type: boolean
                          description: 'If `true` this promotion is available for online purchase. Otherwise, this will be `false`.'
