      summary: 'Returns quiz element data including settings, elements, and access information for the given quiz.'
      description: |-
        Loads the quiz configuration, element list, and access log for the specified business and user context,
        applying franchise and privilege checks before returning the result.
      tags:
        - Quiz
      parameters:
        -
          $ref: '#/components/parameters/X-Error-Rules'
        -
          name: can_anonymous
          in: query
          required: true
          schema:
            type: boolean
          description: |-
            Checks whether unauthorized user should be permitted to operate with form and make a response.
            In general all quizzes should have users in response but it some cases such as registration process
             user might not exist yet, and we need ability to ignore check for user existence.
            `true` - add possibility load form and accept response for non-registered user, `false` otherwise.
        -
          name: is_builder
          in: query
          required: true
          schema:
            type: boolean
          description: '`true` for request quiz from form builder page, `false` otherwise.'
        -
          name: is_simple
          in: query
          required: true
          schema:
            type: boolean
          description: |-
            Whether quiz response received by kiosk or direct mode link.

            `true` quiz response received by kiosk mode.
            `false` quiz response received by direct or direct mode.
        -
          name: json_purchase_item
          in: query
          required: true
          schema:
            oneOf:
              -
                $ref: '#/components/schemas/RsPurchaseItemSid'
                description: |-
                  A list of purchase types.

                  Last used ID: 25.

                  Values:
                  - 7 (`ACCOUNT`): Personal user's account refill.
                  - 11 (`ACCOUNT_BUSINESS`): Business account payment.
                  - 8 (`APPOINTMENT`): Single appointment reservation.

                    This purchase is created when a worker has charged a client for an appointment.

                    This purchase can only be created in POS.

                    Key of appointment.



                    A purchased item that is created during the online booking process [RsPurchaseItemSid::SERVICE](#/components/schemas/RsPurchaseItemSid).
                  - 18 (`APPOINTMENT_DEPOSIT`): Single appointment reservation with deposit.

                    This purchase created when client books a single appointment reservation with deposit amount,
                    to do so appointment should be managed with deposit.
                  - 22 (`APPOINTMENT_TIP`): Tips for the appointment.



                    A purchased item that is created during the online booking process [RsPurchaseItemSid::SERVICE](#/components/schemas/RsPurchaseItemSid).
                  - 16 (`BUSINESS_EXPENSE`): Expense that comes along with the payment business. It contains information about additional services which are
                    included in the package. For example, payment for SMS.
                  - 17 (`BUSINESS_SKIP`): A skipped purchase for the business account.
                  - 23 (`BUSINESS_SUBSCRIPTION`): Business subscription payment.
                  - 2 (`CLASS_PERIOD`): Single classes.
                  - 24 (`COLLECTOR_DEBT`): Collectors payments
                  - 13 (`COMMENT`): Arbitrary money withdrawal with comment.
                  - 10 (`COUPON`): Gift Cards.
                  - 4 (`ENROLLMENT`): Events and enrollments. Client can not book only one class, he needs to book the whole enrollment.
                  - 19 (`ENROLLMENT_DEPOSIT`): Enrollment reservation with a deposit.

                    This purchase created when client books an enrollment reservation with deposit amount,
                    to do so enrollment should be managed with deposit.
                  - 21 (`ENROLLMENT_DISCOUNT`): Enrollment reservation with a discount.

                    This purchase created when client books an enrollment reservation with early bird price.
                  - 14 (`INSTALLMENT`): Payment by an installment plan.
                  - 3 (`MEMBERSHIP`): Recurrent payments.
                  - 9 (`PRODUCT`): Products.
                  - 1 (`PROMOTION`): Promotions.
                  - 25 (`PROMOTION_CANCEL_FEE`): Early cancellation fee for a memberships.
                  - 12 (`PROMOTION_RENEW`): A purchase to renew a promotion.
                  - 15 (`RESOURCE`): A purchase to book an asset.
                  - 20 (`RESOURCE_DEPOSIT`): A purchase to book a deposit asset.
                  - 6 (`SERVICE`): Purchase item for appointments.

                    This purchase item is created during the online booking process.



                    Purchase that is created when a staff adds payment for an appointment at POS [RsPurchaseItemSid::APPOINTMENT](#/components/schemas/RsPurchaseItemSid).
                  - 26 (`TUITION`): Tuition purchase item.
                    Used when client purchases tuition for an event list.
          description: |-
            List of purchase items for which this form is loaded in JSON format.

            This variable supports two structures:

            New structure:
            Each element key has the format `[id_purchase_item]::[k_id]`, where: 

            Old structure:
            Each element is a string in the format `[id_purchase_item]::[k_id]`.

            Empty in case when purchase item not specified or form loaded from direct link.
        -
          name: k_business
          in: query
          required: true
          schema:
            type: string
          description: 'Business key within which quiz is managed.'
        -
          name: k_quiz
          in: query
          required: true
          schema:
            type: string
          description: 'Quiz key.'
        -
          name: k_quiz_login
          in: query
          required: true
          schema:
            type: string
          description: 'Quiz login key.'
        -
          name: uid_client
          in: query
          required: true
          schema:
            type: string
          description: 'UID of the client for which quiz requested.'
