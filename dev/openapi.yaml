    get:
      operationId: Wl.Appointment.Book.Asset.Service.ServiceApi.get
      responses:
        '200':
          description: 'Successful response.'
          content:
            application/json:
              schema:
                type: object
                properties:
                  a_resource_busy:
                    type: array
                    description: |-
                      A list of reserved assets.

                      1st level keys refer to asset keys.
                      2nd level keys refer to asset numbers.
                      Values refer to keys of appointment bookings that reserve the asset(s).

                      For example, if you want to check if the 10th asset with the key of '15' is reserved,
                      you can check if `a_resource_busy[&#039;15&#039;][&#039;10&#039;]` is free.

                      If you're rebooking an appointment, check the value of `a_resource_busy[&#039;15&#039;][&#039;10&#039;]`.
                      If it's equal to the key of your current appointment booking, you can assume the asset is available.
                    items:
                      type: array
                      items:
                        type: string
                  a_resource_type:
                    type: array
                    items:
                      type: object
                      properties:
                        a_resource:
                          type: object
                          description: 'A list of resources. Every element has the following keys:'
                          properties:
                            a_image:
                              type: object
                              description: "The asset's image data."
                              properties:
                                a_image:
                                  type: object
                                  description: 'Image data.'
                                  properties:
                                    i_height:
                                      type: integer
                                      format: int32
                                      description: 'Actual height of thumbnail image.'
                                    i_height_src:
                                      type: integer
                                      format: int32
                                      description: 'Height of original image.'
                                    i_rotate:
                                      type: integer
                                      format: int32
                                      description: 'Angle on which image was rotated compared to the original.'
                                    i_width:
                                      type: integer
                                      format: int32
                                      description: 'Actual width of thumbnail image.'
                                    i_width_src:
                                      type: integer
                                      format: int32
                                      description: 'Width of original image.'
                                    is-resize:
                                      type: boolean
                                      description: |-
                                        Whether thumbnail is a resized variant of original image. If `false`, `url-thumbnail`
                                        equals `url-view`.
                                    url-view:
                                      type: string
                                      description: 'URL to original image in file storage.'
                                    url-thumbnail:
                                      type: string
                                      description: |-
                                        URL to resized and rotated image in file storage. If the original is larger than
                                        the specified dimensions, a thumbnail is created and its link is returned. Otherwise,
                                        the link to the original image is returned here.
                                  required:
                                    - i_height
                                    - i_height_src
                                    - i_rotate
                                    - i_width
                                    - i_width_src
                                    - is-resize
                                    - url-view
                                    - url-thumbnail
                                i_angle:
                                  type: integer
                                  format: int32
                                  description: 'Angle of shape rotation. Is set only if `sid_image` equals to `shape`.'
                                i_height:
                                  type: integer
                                  format: int32
                                  description: 'Height of image.'
                                i_width:
                                  type: integer
                                  format: int32
                                  description: 'Width of image.'
                                is_empty:
                                  type: boolean
                                  description: 'Whether is empty.'
                                k_resource:
                                  type: string
                                  description: 'Resource key.'
                                sid_image:
                                  type: string
                                  description: 'Image kind. String representation of one of [ImageSid](#/components/schemas/Wl.Resource.Image.ImageSid) constants.'
                                sid_image_icon:
                                  type: string
                                  description: |-
