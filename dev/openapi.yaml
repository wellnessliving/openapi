  /Wl/Login/Promotion/GuestPass/GuestPass.json:
    get:
      operationId: Wl.Login.Promotion.GuestPass.GuestPassApi.get
      responses:
        '200':
          description: 'Successful response.'
          content:
            application/json:
              schema:
                type: object
                properties:
                  a_guest_pass:
                    type: array
                    items:
                      type: object
                      properties:
                        a_image:
                          type: object
                          description: 'Thumbnail image data for the guest promotion.'
                          properties:
                            i_height:
                              type: integer
                              format: int32
                              description: 'Image height.'
                            i_width:
                              type: integer
                              format: int32
                              description: 'Image width.'
                            url-thumbnail:
                              type: string
                              description: 'Thumbnail url.'
                          required:
                            - i_height
                            - i_width
                            - url-thumbnail
                        a_period_dl:
                          type:
                            - object
                            - 'null'
                          description: |-
                            Start and end dates of the current reset period.
                              `null` if there is no reset period or the reset date is unavailable.
                          properties:
                            dl_end:
                              type: string
                              description: 'Period end date in MySQL date format.'
                            dl_start:
                              type: string
                              description: 'Period start date in MySQL date format.'
                          required:
                            - dl_end
                            - dl_start
                        a_settings:
                          type: object
                          description: |-
                            Guest pass settings.
                            Empty array when the guest pass has no settings (class-type passes).
                          properties:
                            i_claim_day:
                              type: integer
                              format: int32
                              description: |-
                                Count of days for accept guest invite.

                                If the invitation is not accepted within this time, it will be canceled.
                            i_limit:
                              type: integer
                              format: int32
                              description: 'Times that member can invite the same guest.'
                            i_limit_duration:
                              type: integer
                              format: int32
                              description: 'The time during which a member can invite a guest `i_limit` times.'
                            id_limit_duration:
                              $ref: '#/components/schemas/ADurationSid'
                              description: 'Type of the duration of `i_limit_duration`. One of [ADurationSid](#/components/schemas/ADurationSid) constants.'
                            is_checkin:
                              type: boolean
                              description: 'Whether guests can only enter the gym when the inviting member is checked in.'
                            is_limit:
                              type: boolean
                              description: 'Whether there are limits for a guest promotion.'
                          required:
                            - i_claim_day
                            - i_limit
                            - i_limit_duration
                            - id_limit_duration
                            - is_checkin
                            - is_limit
                        can_invite:
                          type: boolean
                          description: '`true` if the guest pass is invite-type (the member sends invitations to guests).'
                        can_send:
                          type: boolean
                          description: '`true` if the member can currently send a guest pass (eligible and within quota).'
                        dl_reset:
                          type:
                            - string
                            - 'null'
                          description: |-
                            Date on which the pass resets or expires, in MySQL date format.
                            `null` if no expiry date is determined.
                        has_service:
                          type: boolean
                          description: '`true` if the guest pass is service-type (not invite-type). Inverse of `can_invite`.'
                        i_cap_day:
                          type:
                            - integer
                            - 'null'
                          format: int32
                          description: 'Maximum guest passes that can be sent per day. `null` if there is no daily cap.'
                        i_limit:
                          type:
                            - integer
                            - 'null'
                          format: int32
                          description: 'Total number of guest passes initially granted. `null` if the supply is unlimited.'
                        i_period:
                          type:
                            - integer
                            - 'null'
                          format: int32
                          description: |-
                            Numeric length of the reset period (for example `1` for a one-month period).
                            `null` if the promotion has no reset period.
                        i_remain:
                          type:
                            - integer
                            - 'null'
                          format: int32
                          description: |-
                            Number of guest passes remaining in the current period.
                            `null` if the supply is unlimited.
                        i_remain_day:
                          type:
                            - integer
                            - 'null'
                          format: int32
                          description: |-
                            Number of guest passes remaining today per the daily cap.
                            `null` if there is no daily cap.
                        i_use:
                          type: integer
                          format: int32
                          description: 'Number of accepted invitations for this guest pass.'
                        id_period:
                          $ref: '#/components/schemas/ADurationSid'
                          description: |-
                            Unit of the reset period. One of [ADurationSid](#/components/schemas/ADurationSid) constants.
                            `null` if the promotion has no reset period.
                        id_program_guest:
                          $ref: '#/components/schemas/RsProgramSid'
                          description: |-
                            Guest pass program ID.
                            One of [RsProgramSid](#/components/schemas/RsProgramSid) constants.
                        id_reset_type_guest:
                          $ref: '#/components/schemas/Wl.Promotion.Guest.Pass.GuestPassResetTypeSid'
                          description: 'Reset type of the host promotion. One of [GuestPassResetTypeSid](#/components/schemas/Wl.Promotion.Guest.Pass.GuestPassResetTypeSid) constants.'
                        is_expire_note:
                          type: boolean
                          description: |-
                            `true` if the pass is close enough to its reset or expiry date that the UI should
                            display a warning.
                        is_reset:
                          type: boolean
                          description: |-
                            `true` if the remaining count resets on `dl_reset`;
                            `false` if the pass expires on that date.
                        k_business:
                          type: string
                          description: 'Business key.'
                        k_login_promotion:
                          type: string
                          description: 'Login promotion key of the host membership.'
                        k_promotion:
                          type: string
                          description: 'Guest promotion key.'
                        text_location:
                          type: string
                          description: |-
                            Comma-separated list of location titles where the promotion is valid.
                            Empty when the promotion is business-wide.
                        text_owner:
                          type: string
                          description: 'Full name of the membership owner.'
                        text_period:
                          type: string
                          description: |-
                            Human-readable reset period label (e.g. "1 month").
                            Empty when there is no reset period.
                        text_period_date:
                          type: string
                          description: |-
                            Human-readable date range of the current period (e.g. "Jan 1 - Jan 31").
                            Empty when there is no reset period or the reset date is unavailable.
                        text_promotion_grant:
                          type: string
                          description: 'Title of the host (granting) promotion.'
                        text_promotion_guest:
                          type: string
                          description: 'Title of the guest promotion.'
                        uid_owner:
                          type: string
                          description: 'User key of the membership owner.'
                      required:
                        - a_image
                        - a_period_dl
                        - a_settings
                        - can_invite
                        - can_send
                        - dl_reset
                        - has_service
                        - i_cap_day
                        - i_limit
                        - i_period
                        - i_remain
                        - i_remain_day
                        - i_use
                        - id_period
                        - id_program_guest
                        - id_reset_type_guest
                        - is_expire_note
                        - is_reset
                        - k_business
                        - k_login_promotion
                        - k_promotion
                        - text_location
                        - text_owner
                        - text_period
                        - text_period_date
                        - text_promotion_grant
                        - text_promotion_guest
                        - uid_owner
                required:
                  - a_guest_pass
