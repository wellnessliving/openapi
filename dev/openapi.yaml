                    description: |-
                      Video.js media player initialization parameters in JSON format.

                      Usage example:
                           <script>
                               videojs($('video'), {
                                   "techOrder": ["Vimeo"],
                                   "sources": [
                                       {"type": "video/vimeo", "src": "https://vimeo.com/123456789"}
                                   ]
                               });
