        '200':
          description: 'Successful response.'
          content:
            application/json:
              schema:
                type: object
                properties:
                  a_service_list:
                    type: array
                    description: |-
                      A list of all business services and their availability data.
                      This is presented as an array, where keys are SIDs from [ServiceSid](#/components/schemas/Wl.Service.ServiceSid) and values are Boolean.
                      If `true`, at least one service is enabled in the business. Otherwise, this will be `false`.
                    items:
                      $ref: '#/components/schemas/Wl.Service.ServiceSid'
                  a_tip_predefine:
                    type: array
                    description: 'The list of predefined tips in percentages.'
                    items:
                      type: number
                      format: float
                  id_category:
                    $ref: '#/components/schemas/RsBusinessCategorySid'
                    description: 'The business category ID of the business.'
                  id_claim_status:
                    $ref: '#/components/schemas/Wl.Business.Claim.BusinessClaimStatusSid'
                    description: |-
                      Business status for managing claim request behavior.

                      Constant from [BusinessClaimStatusSid](#/components/schemas/Wl.Business.Claim.BusinessClaimStatusSid).
                  id_currency:
                    $ref: '#/components/schemas/Core.Locale.CurrencySid'
                    description: "The currency ID of the given business (or the system currency ID if the business didn't pass)."
                  id_locale:
                    $ref: '#/components/schemas/Core.Locale.LocaleSid'
                    description: 'The Locale ID, used to search geo items.'
                  id_rank_type:
                    $ref: '#/components/schemas/RsRankTypeSid'
                    description: |-
                      The rank type ID of the business.

                      One of the [RsRankTypeSid](#/components/schemas/RsRankTypeSid) constants.

                      This will be `null` if the business doesn't have a rank type.
                  id_region:
                    $ref: '#/components/schemas/Core.Amazon.Region.AmazonRegionSid'
                    description: |-
                      The region ID. This indicates the data center where the information about the business is stored.
                      One of the [AmazonRegionSid](#/components/schemas/Core.Amazon.Region.AmazonRegionSid) constants.

                      Requests made to different regions can lead to known issues such as responses indicating that the
                      business (or its elements) doesn't exist. This is because databases on different data centers are
                      independent. For example, performing a request to the US cluster for a list of classes for an AU
                      cluster business will return an empty list.
                  is_apply_surcharge:
                    type: boolean
                    description: 'Determines whether surcharges to client payments are enabled in the business.'
                  is_franchise:
                    type: boolean
                    description: '`true` if business is a franchisor or franchisee.'
                  is_location_multiple:
                    type: boolean
                    description: 'Determines whether the business has multiple locations (including inactive locations).'
                  is_profile_timezone:
                    type: boolean
                    description: |-
                      `true` - clients of the business can select a custom time zone in their profile.

                      `false` - the location or business time zone is used.
                  is_progress_client:
                    type: boolean
                    description: 'If `true`, clients can enter the progress log. Otherwise, this will be `false`.'
                  is_progress_verify:
                    type: boolean
                    description: 'If `true`, verification of the progress log by a staff member is required. Otherwise, this will be `false`.'
                  is_quiz_available:
                    type: boolean
                    description: 'Determines whether quizzes are available in the business.'
                  is_test:
                    type: boolean
                    description: 'Determines if the business operates in testing mode.'
                  is_tip:
                    type: boolean
                    description: 'If `true`, tips are available in the business. Otherwise, this will be `false`.'
                  is_tip_deny:
                    type: boolean
                    description: 'If `true`, the business has the "No tip" option displayed. Otherwise, this will be `false`.'
                  is_tip_sign:
                    type: boolean
                    description: 'If `true`, the client must sign after selecting the tip. Otherwise, this will be `false`.'
                  k_business_franchisor:
                    type: string
                    description: 'The franchisor business key. This will be empty if this business is the franchisor or not in a franchise.'
                  k_business_token:
                    type: string
                    description: |-
                      The business key obtained by the security token `text_token`.
                      This can be used on the client side if authorization token should be used instead of the business key
                      (the business key isn't available).
                  k_business_type:
                    type: string
                    description: 'Key of the business type.'
                  k_currency:
                    type: string
                    deprecated: true
