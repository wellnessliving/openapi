                               Copy of value set with
                               `Wl_Pay_Processor_ProcessorInterface_Abstract.paDataSet()`.

                               An empty string (or element not passed) if this payment processor does not provide additional payer
                               authentication data, or payer authentication was not performed.
                          m_amount:
                            type: string
                            description: |-
                              Authenticated payment amount.

                               Copy of value set with
                               `Wl_Pay_Processor_ProcessorInterface_Abstract.paAmountSet()`.

                               An empty string (or element not passed) if payer authentication was not performed.
                          k_pay_transaction:
                            type: string
                            description: |-
                              Key of the payment transaction that was created during payer authentication.
                               In this case, payment transaction should be attached to this transaction.

                               An empty string (or element not passed) if transaction was not created during payer authentication, or payer
                               authentication was not executed.
                      s_index:
                        type: string
                        description: 'Index of this form. This corresponds the key this item is written in this array with.'
                    required:
                      - f_amount
                      - id_pay_method
                      - is_hide
                      - s_index
                a_payment_data:
                  type: array
                  items:
                    type: object
                    properties:
                      id_purchase_item:
                        $ref: '#/components/schemas/RsPurchaseItemSid'
                        description: 'Type of the purchase item. One of the [RsPurchaseItemSid](#/components/schemas/RsPurchaseItemSid) constants.'
                      k_id:
                        type: string
                        description: 'Promotion key or appointment key. Depends on `id_purchase_item` of this array.'
                      k_login_promotion:
                        type: string
                        description: 'Login promotion key.'
                      k_session_pass:
                        type: string
                        description: 'Session pass key.'
                      text_discount_code:
                        type: string
                        description: 'Discount code.'
                    required:
                      - id_purchase_item
                      - k_id
                      - k_login_promotion
                      - k_session_pass
                      - text_discount_code
                a_purchase_item:
                  type: array
                  description: |-
                    The purchase item keys.
                    Empty if no purchases are made for the appointment booking.
                  items:
                    type: string
                a_quiz_response:
                  type: array
                  description: |-
                    A list of quiz response keys.
                    Key is quiz key.
                    Value is quiz response key.
                  items:
                    type: string
                id_mode:
                  $ref: '#/components/schemas/Wl.Mode.ModeSid'
                  description: 'The booking mode ID. One of the [ModeSid](#/components/schemas/Wl.Mode.ModeSid) constants.'
                is_back_to_back:
                  type: boolean
                  description: 'Determines whether multiple appointments are booked in back-to-back mode.'
                is_unpaid_force:
                  type: boolean
                  description: 'If `true`, the appointment is booked as unpaid. Otherwise, this will be `false` to select an available Purchase Option.'
                m_pay:
                  type: string
                  description: 'The sum paid for a deposit.'
                s_id:
                  type: string
                  description: 'Unique identifier of the wizard.'
              required:
                - a_answer
                - a_notification
                - a_pay_form
                - a_payment_data
                - a_purchase_item
                - a_quiz_response
                - id_mode
                - is_back_to_back
                - is_unpaid_force
                - m_pay
                - s_id
