          name: a_uid
          in: query
          required: false
          schema:
            type:
              - array
              - 'null'
            items:
              type: string
          description: |-
            Primary keys of users whose information must be returned.

            `null` if data of a single user is requested.
        -
          name: a_uid_date
          in: query
          required: false
          schema:
            type:
              - array
              - 'null'
            items:
              type: string
          description: |-
            List of dates for load additional information about users.

            Key is UID of user. Value is date.

            `null` if data of a single user is requested.
