      summary: 'Returns quiz response data including element answers, dates, and access information.'
      description: |-
        Loads the response for the specified quiz and user, resolving answers, formatted dates, and access flags such as
        amendment availability and PDF generation support.
      tags:
        - Quiz
      parameters:
        -
          $ref: '#/components/parameters/X-Error-Rules'
        -
          name: can_anonymous
          in: query
          required: true
          schema:
            type: boolean
          description: |-
            Checks whether unauthorized user should be permitted to operate with form and make a response.
            In general all quizzes should have users in response but it some cases such as registration process
             user might not exist yet, and we need ability to ignore check for user existence.
            `true` - add possibility load form and accept response for non-registered user, `false` otherwise.
        -
          name: is_answer
          in: query
          required: true
          schema:
            type: boolean
          description: '`true` for load answers for response, `false` otherwise.'
        -
          name: is_backend
          in: query
          required: true
          schema:
            type: boolean
        -
          name: is_simple
          in: query
          required: true
          schema:
            type: boolean
          description: |-
            Whether quiz response received by kiosk or direct mode link.

            `true` quiz response received by kiosk mode.
            `false` quiz response received by direct or direct mode.
        -
          name: k_business
          in: query
          required: true
          schema:
            type: string
          description: 'Business key within which quiz is managed.'
        -
          name: k_quiz_response
          in: query
          required: false
          schema:
            type:
              - string
              - 'null'
          description: |-
            Quiz response key.

            `null` in a case of response creation or
            removing set of responses in [QuizResponseApi](/Core/Quiz/QuizResponse.json).
      x-rate-limit:
        -
          limit: 200000
          period: 3600
    post:
      operationId: Wl.Quiz.Response.Response65Api.post
      responses:
        '200':
          description: 'Successful response.'
          content:
            application/json:
              schema:
                type: object
                properties:
                  k_quiz_response:
                    type:
                      - string
                      - 'null'
                    description: |-
                      Quiz response key.

                      `null` in a case of response creation or
                      removing set of responses in [QuizResponseApi](/Core/Quiz/QuizResponse.json).
