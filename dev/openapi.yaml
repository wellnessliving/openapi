      summary: 'Retrieves an information about current sale item.'
      description: |-
        Used to render the detail view of a single store item (promotion, product, event, or coupon) in the
        client-facing catalog. Returns everything needed to display the item: price, taxes, images,
        description, booking restrictions, and available purchase options.
      tags:
        - Catalog
      parameters:
        -
          $ref: '#/components/parameters/X-Error-Rules'
        -
          name: a_discount_code
          in: query
          required: true
          schema:
            type: array
            items:
              type: object
              properties:
                f_amount:
                  type: string
                  description: 'The fixed amount of the discount.'
                f_percent:
                  type: number
                  format: float
                  description: 'The percentage amount of the discount.'
                i_limit:
                  type: integer
                  format: int32
                  description: Limitation.
                k_discount_code:
                  type: string
                  description: 'The discount code key.'
                s_discount_code:
                  type: string
                  description: 'The discount code value.'
              required:
                - f_amount
                - f_percent
                - i_limit
                - k_discount_code
                - s_discount_code
          description: 'Information about the discount code:'
        -
          name: a_sale_id_group
          in: query
          required: true
          schema:
            type: array
            items:
              type: object
              properties:
                id_sale:
                  $ref: '#/components/schemas/RsSaleSid'
                  description: 'The item category ID. One of the [RsSaleSid](#/components/schemas/RsSaleSid) constants.'
                k_id:
                  type: string
                  description: 'The primary key of item.'
                k_shop_product_option:
                  type: string
                  description: 'The product option or `0` for any other cases.'
              required:
                - id_sale
                - k_id
                - k_shop_product_option
          description: |-
            The list of items grouped by sale categories on the store page.
            Keys refer to sale IDs from [RsSaleSid](#/components/schemas/RsSaleSid), and values refer to data to identify an item:
        -
          name: dl_client_prorate
          in: query
          required: false
          schema:
            type:
              - string
              - 'null'
            format: date
          description: |-
            The client prorate date.

            This will be `null` in cases where the client prorate date hasn't passed.
        -
          name: i_image_height
          in: query
          required: true
          schema:
            type: integer
            format: int32
          description: |-
            The image height in pixels. Specify this value if you need the image to be returned in a specific size.
            The returned image will have default thumbnail size if this value isn't specified.
        -
          name: i_image_width
          in: query
          required: true
          schema:
            type: integer
            format: int32
          description: |-
            The image width in pixels. Specify this value if you need the image to be returned in a specific size.
            The returned image will have default thumbnail size if this value isn't specified.
        -
          name: i_promotion_image_height
          in: query
          required: true
          schema:
            type: integer
            format: int32
          description: |-
            The promotion image height in pixels. Specify this value if you need the image to be returned in a specific size.
            The returned image will have default thumbnail size if this value isn't specified.
        -
          name: i_promotion_image_width
          in: query
          required: true
          schema:
            type: integer
            format: int32
          description: |-
            The promotion image width in pixels. Specify this value if you need the image to be returned in a specific size.
            The returned image will have default thumbnail size if this value isn't specified.
        -
          name: id_sale
          in: query
          required: true
          schema:
            $ref: '#/components/schemas/RsSaleSid'
          description: |-
            The ID of item category.
            One of the [RsSaleSid](#/components/schemas/RsSaleSid) constants.
        -
          name: is_backend
          in: query
          required: true
          schema:
            type: boolean
          description: 'Determines whether the API is called in the backend mode.'
        -
          name: k_business
          in: query
          required: true
          schema:
            type: string
          description: 'The business key.'
        -
          name: k_id
          in: query
          required: true
          schema:
            type: string
          description: 'The item key.'
        -
          name: k_location
          in: query
          required: true
          schema:
            type: string
          description: 'The location key.'
        -
          name: k_shop_product_option
          in: query
          required: false
          schema:
            type:
              - string
              - 'null'
          description: |-
            The product option key.

            This will be `null` if not set yet.
        -
          name: text_item
          in: query
          required: false
          schema:
            type:
              - string
              - 'null'
          description: |-
            A list of goods to get information for. Every element must contain the next keys:

            Note that this must be serialized via JSON.

            If this field is specified, don't specify any of the following fields:
            * `id_sale`
            * `k_id`
            * `k_shop_product_option`

            This will be `null` to get information for only one item.
        -
          name: uid_customer
          in: query
          required: true
          schema:
            type: string
          description: 'The UID of a customer (user) for whom the purchase is made. This is used in the backend to calculate discounts.'
      x-rate-limit:
        -
          limit: 200000
          period: 3600
