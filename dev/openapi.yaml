                                format: int32
                                description: 'New asset index.'
                              id_conflict:
                                $ref: '#/components/schemas/RsAppointmentEditConflictSid'
                                description: 'Solution type. One of [RsAppointmentEditConflictSid](#/components/schemas/RsAppointmentEditConflictSid) constants.'
                              k_resource:
                                type: string
                                description: 'New asset.'
                              k_staff:
                                type:
                                  - string
                                  - 'null'
                                description: 'New staff member.  `null` in a case of asset booking.'
                              uid_staff:
                                type:
                                  - string
                                  - 'null'
                                description: 'New staff member.  `null` in a case of asset booking.'
                            required:
                              - dt_date_local
                              - i_duration
                              - i_index
                              - id_conflict
                              - k_resource
                              - k_staff
                              - uid_staff
                          a_product:
                            type: object
                            description: |-
                              Add-ons to the appointment. Specified for appointment bookings only.
                              The old format used array keys.  While the new format has each element as an array:
                            properties:
                              i_count:
                                type: integer
                                format: int32
                                description: 'The add-on buy count.'
                              i_count_use:
