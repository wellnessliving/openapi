      summary: 'Retrieves information about classes.'
      description: |-
        A POST-method alternative to `get()` for multi-session batch lookups
        where the session list is too long to encode in a GET query string. The session list is
        provided as a JSON-encoded string in the request body.
      tags:
        - Schedule
      parameters:
        -
          $ref: '#/components/parameters/X-Error-Rules'
        -
          name: a_session_request
          in: query
          required: false
          schema:
            type:
              - array
              - 'null'
            items:
              type: object
              properties:
                dt_date:
                  type: string
                  description: 'The date/time of the session in UTC.'
                k_class_period:
                  type: string
                  description: 'The session key.'
              required:
                - dt_date
                - k_class_period
          description: |-
            A list of sessions to get information for. Every element has the following keys:


            `null` if requesting a single session.
        -
          name: dt_date
          in: query
          required: true
          schema:
            type: string
            format: date-time
          description: 'The date/time of the session.'
        -
          name: k_business
          in: query
          required: false
          schema:
            type:
              - string
              - 'null'
          description: |-
            Key of the business in which the action is performed.

            `null` if key of the business was not passed.

            Key of the business is required if [ClassViewApi](/Wl/Schedule/ClassView/ClassView.json) was passed.
        -
          name: k_class_period
          in: query
          required: true
          schema:
            type: string
          description: 'The class period key.'
        -
          name: uid
          in: query
          required: true
          schema:
            type: string
          description: 'The user key.'
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                s_session_request:
                  type: string
                  description: |-
                    A list of sessions to get information for.
                    A serialized array. See `a_session_request` for the array structure.
                    Serialization and sending by POST is necessary to send big lists.
              required:
                - s_session_request
      x-rate-limit:
        -
          limit: 200000
          period: 3600
        -
          limit: 3000
          period: 300
