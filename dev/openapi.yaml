          required: true
          schema:
            type: string
          description: 'Location to show available appointment booking schedule.'
        -
          name: k_timezone
          in: query
          required: false
          schema:
            type:
              - string
              - 'null'
          description: |-
            Key of timezone.

            `null` if not set then use default timezone client.
        -
          name: uid
          in: query
          required: true
          schema:
            type: string
          description: |-
            The user key.

            This field is used if the client books for himself or for the relative.

            This field is incorrect to use for guest booking since in this case the client will be checked as a relative.

            In case of a group booking or a guest booking, the key of the client who is making the booking is set here.
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                a_answer:
                  type: array
                  description: |-
                    A list of answers for the questions from [QuestionApi](/Wl/Appointment/Book/Question/Question.json).
