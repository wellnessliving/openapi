                      i_duration:
                        type: integer
                        format: int32
                        description: 'Count of days\weeks\months between recurring bookings.'
                      i_occurrence:
                        type: integer
                        format: int32
                        description: 'Deprecated, use `i_count` instead!'
                      i_period:
                        type: integer
                        format: int32
                        description: 'Deprecated, use `i_duration` instead!'
                      id_duration:
                        $ref: '#/components/schemas/ADurationSid'
                        description: |-
                          The measurement unit of `i_period`. One of the [ADurationSid](#/components/schemas/ADurationSid) constants.
                          Available duration units are: [ADurationSid::DAY](#/components/schemas/ADurationSid), [ADurationSid::WEEK](#/components/schemas/ADurationSid), [ADurationSid::MONTH](#/components/schemas/ADurationSid).
                      id_period:
                        $ref: '#/components/schemas/ADurationSid'
                        description: 'Deprecated, use `id_duration` instead! One of [ADurationSid](#/components/schemas/ADurationSid) constants.'
                      id_repeat_end:
                        $ref: '#/components/schemas/RsRepeatEndSid'
                        description: 'Possible ways to stop repeatable events. One of the [RsRepeatEndSid](#/components/schemas/RsRepeatEndSid) constants.'
                    required:
                      - a_day
                      - a_week
                      - i_duration
                      - i_period
                      - id_duration
                      - id_period
                      - id_repeat_end
                a_resource:
                  type: array
                  items:
                    type: object
                    properties:
                      i_index:
                        type: integer
                        format: int32
                        description: 'Order number of the asset (maybe from 1 to asset quantity).'
                      k_resource:
                        type: string
                        description: 'The key of asset.'
                    required:
                      - i_index
                      - k_resource
                a_session_select:
                  type: array
                  description: |-
