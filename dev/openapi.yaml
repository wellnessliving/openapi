                k_staff_date:
                  type: string
                  description: |-
                    The staff member conducting the appointment.
                    The difference between this an `k_staff` is that this value must be set only in cases
                    when you want to add a customer to an appointment that already exists.
                    Specify this for appointment bookings only.
                m_tip_appointment:
                  type: string
                  description: 'The amount of selected tips.'
              required:
                - dt_date
          description: 'All data from the provider model `Wl_Appointment_Book_ProviderModel`:'
        -
          name: a_uid
          in: query
          required: true
          schema:
            type: array
            items:
              type: string
          description: |-
