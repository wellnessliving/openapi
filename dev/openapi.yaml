        - 81 (`INSTALLMENT_DATE_EMPTY`): Installment date is not specified.
        - 82 (`INSTALLMENT_DATE_FORMAT`): Installment date format is invalid.
        - 84 (`INSTALLMENT_DATE_FUTURE`): Installment date is too deep in the future.
