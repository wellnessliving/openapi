            `null` until initialized.
        -
          name: i_session
          in: query
          required: true
          schema:
            $ref: '#/components/schemas/RsPurchaseItemSid'
          description: |-
            The number of sessions which are booked simultaneously.

            Required when `id_purchase_item` = [RsPurchaseItemSid::CLASS_PERIOD](#/components/schemas/RsPurchaseItemSid).
        -
          name: id_purchase_item
          in: query
          required: true
          schema:
            $ref: '#/components/schemas/RsPurchaseItemSid'
          description: 'The ID of the purchase item type. One of [RsPurchaseItemSid](#/components/schemas/RsPurchaseItemSid).'
        -
          name: k_class_period
          in: query
          required: true
          schema:
            type: string
          description: 'The key of the session to check for booking availability.'
        -
          name: k_id
          in: query
          required: true
          schema:
            type: string
          description: 'The key of the purchase item in the database.'
        -
          name: k_location
          in: query
