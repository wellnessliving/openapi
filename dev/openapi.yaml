        - 101 (`VOID_SUPPORT`): Void operation is not supported by the merchant processor.
        - 104 (`WAIT_TIMEOUT`): Timeout waiting for settlement.
        - 195 (`TENDER_TYPE_INVALID`): Incorrect payment card type specified.
