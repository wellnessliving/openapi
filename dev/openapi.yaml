                                    Is set only if `sid_image` equals to `image`.
                                sid_image_shape:
                                  type: string
                                  description: |-
                                    Shape name. String representation of one of [ImageShapeSid](#/components/schemas/Wl.Resource.Image.ImageShapeSid) constants.
                                    Is set only if `sid_image` equals to `shape`.
                                url:
