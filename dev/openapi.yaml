      summary: 'Returns the pricing breakdown (totals, taxes, and discounts) for the given list of purchase items.'
      description: |-
        Validates each item in `a_purchase_item` (type, key, installment eligibility, and prize applicability),
        applies discount codes, login-type discounts, and installment adjustments, then accumulates price, subtotal,
        discount, tax, and cost totals across all items and returns them as result fields.
      tags:
        - Booking
      parameters:
        -
          $ref: '#/components/parameters/X-Error-Rules'
        -
          name: a_purchase_item
          in: query
          required: true
          schema:
            type: array
            items:
              type: object
              properties:
                i_session:
                  type: integer
                  format: int32
                  description: |-
                    Number of sessions which are booked simultaneously.
                         Make sense only when `id_purchase_item` = [RsPurchaseItemSid::CLASS_PERIOD](#/components/schemas/RsPurchaseItemSid).
                id_purchase_item:
                  $ref: '#/components/schemas/RsPurchaseItemSid'
