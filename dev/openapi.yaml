        - 72 (`CARD_NSF`): Insufficient funds available.
        - 43 (`CARD_NX`): Chosen payment card does not exist.
        - 44 (`CARD_SELECT`): User has chosen payment card but he had no such rights.
        - 184 (`CARD_ISSUER_INVALID`): No such card issuer.
