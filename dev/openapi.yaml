  /Wl/Profile/Purchase/PurchaseElement.json:
    get:
      operationId: Wl.Profile.Purchase.PurchaseElementApi.get
      responses:
        '200':
          description: 'Successful response.'
          content:
            application/json:
              schema:
                type: object
                properties:
                  a_component:
                    type: array
                    items:
                      type: object
                      properties:
                        k_enrollment_book:
                          type: string
                          description: 'Key of enrollment book.'
                        k_login_product:
                          type: string
                          description: 'Key of product.'
                        k_login_promotion:
                          type: string
                          description: 'Key of promotion.'
                        k_session_pass:
                          type: string
                          description: 'Session key.'
                  a_logo:
                    type: array
                    items:
                      type: object
                      properties:
                        i_height:
                          type: integer
                          format: int32
                          description: 'The height of the image.'
                        i_width:
                          type: integer
                          format: int32
                          description: 'The width of the image.'
                        is_empty:
                          type: boolean
                          description: "If `true`, then the purchased item doesn't have image. If `false`, then the item has an image."
                        s_url:
                          type: string
                          description: 'The URL for the image.'
                      required:
                        - i_height
                        - i_width
                        - is_empty
                        - s_url
                  a_restrict:
                    type: array
                    items:
                      type: object
                      properties:
                        i_limit:
                          type: integer
                          format: int32
                          description: 'The number of sessions that may be booked during this period.'
                        i_remain:
                          type: integer
                          format: int32
                          description: 'The number of sessions that remain available.'
                        s_date:
                          type: string
                          description: 'The name of the period type.'
                      required:
                        - i_limit
                        - i_remain
                        - s_date
                  a_tax:
                    type: array
                    items:
                      type: object
                      properties:
                        f_tax_discount:
                          type: string
                          description: 'The amount of tax.'
                        s_tax:
                          type: string
                          description: 'The name of the tax.'
                      required:
                        - f_tax_discount
                        - s_tax
                  can_renew:
                    type: boolean
                    description: |-
                      This is `true` only if the purchased item is a promotion and the user can control the renewal of the promotion.
                      Otherwise, this will be `false`.
                  dl_purchase:
                    type: string
                    format: date
                    description: 'Local date of purchase in MySQL format.'
                  dl_start:
                    type: string
                    format: date
                    description: 'The start date of the promotion. This is used only if the purchased item is a promotion.'
                  dt_end:
                    type: string
                    format: date-time
                    description: 'The expiration date of the promotion. This is used only if the purchased item is a promotion.'
                  dt_hold_end:
                    type: string
                    format: date-time
                    description: |-
                      The end date of the promotion hold. This is used only for promotions on hold.
                      This may be empty if the hold is internal.
                  dt_hold_start:
                    type: string
                    format: date-time
                    description: 'The start date of the promotion hold. This is used only for promotions on hold.'
                  dt_purchase:
                    type: string
                    format: date-time
                    description: 'The purchase date of the purchased item. This is given in GMT in MySQL format.'
                  dt_send:
                    type: string
                    format: date-time
                    description: |-
                      The date for when the email regarding the gift card should be sent (or was sent) to the receiver.
                      This is only used for gift cards.
                  f_discount_login_type_percent:
                    type: number
                    format: float
                    description: "The percentage value of the discount for the client type. This is empty if this discount wasn't applied."
                  html_description:
                    type: string
                    description: 'The description of the purchased item.'
                  i_book:
                    type: integer
                    format: int32
                    description: |-
                      The number of sessions remaining for a promotion. This is used only for promotions.
                      This will be `0` if the purchased item isn't a promotion or if there are no remaining sessions.
                  i_buy:
                    type: integer
                    format: int32
                    description: |-
                      The number of purchased items bought at the time of purchase.
                      This field will be `0` for purchase items obtained via a redemption code or as a result of an old import.
                  i_discount_count:
                    type: integer
                    format: int32
                    description: "The percentage value of the discount given by a reward prize. This field will be `0` if a discount wasn't applied."
                  i_duration:
                    type: integer
                    format: int32
                    description: 'This field is only added for promotions. Duration of promotion. Measurement unit is `id_duration`.'
                  i_left:
                    type: integer
                    format: int32
                    description: 'The number of bookings remaining in this promotion. This value is used only for non-sequential promotions.'
                  i_limit:
                    type: integer
                    format: int32
                    description: 'The number of visits which can be made with this promotion. This is used only for promotions.'
                  i_payment_period:
                    type: integer
                    format: int32
                    description: 'The duration of the regular payments interval. This is used only for “membership” type promoti'
                  i_remain:
                    type: integer
                    format: int32
                    description: 'The number of remaining bookings for the promotion. This is used only for promotions.'
                  i_remain_duration:
                    type: integer
                    format: int32
                    description: |-
                      The number of minutes remaining for the promotion.
                      This is used only for promotions that work with a limited number of minutes.
                  i_renew:
                    type: integer
                    format: int32
                    description: 'Not `0` only for promotions. How many times promotion was updated.'
                  i_use:
                    type: integer
                    format: int32
                    description: 'This is used only for promotions. This is the number of visits that were attended for the promotion.'
                  id_activation:
                    $ref: '#/components/schemas/RsActivationSid'
                    description: 'Activation mode. One on [RsActivationSid](#/components/schemas/RsActivationSid) constants. This field is only added for promotions.'
                  id_discount_commission_type:
                    $ref: '#/components/schemas/RsCommissionTypeSid'
                    description: |-
                      The type of discount given via a reward prize.
                      One on the [RsCommissionTypeSid](#/components/schemas/RsCommissionTypeSid) constants.
                      This will be empty if this discount wasn't applied.
                  id_duration:
                    $ref: '#/components/schemas/RsDurationTypeSid'
                    description: |-
                      The type of duration for the promotion. This is used only for “membership” type promotions.
                      This determines whether the promotion lasts indefinitely, has a fixed duration, or ends on a specific date.
                      One of the [RsDurationTypeSid](#/components/schemas/RsDurationTypeSid) consta
                  id_program_type:
                    $ref: '#/components/schemas/RsProgramTypeSid'
                    description: |-
                      The ID of the promotion program.
                      One of the [RsProgramTypeSid](#/components/schemas/RsProgramTypeSid) constants.
                      This is used only for promotions.
                  id_purchase_item:
                    $ref: '#/components/schemas/RsPurchaseItemSid'
                    description: |-
                      The ID of the purchase item type.
                      One of the [RsPurchaseItemSid](#/components/schemas/RsPurchaseItemSid) constants.
                  id_sale:
                    $ref: '#/components/schemas/RsSaleSid'
                    description: |-
                      The ID of the sale category.
                      One of the [RsSaleSid](#/components/schemas/RsSaleSid) constants.
                  is_active:
                    type: boolean
                    description: "If `true`, then the purchase item is active. If `false`, then the purchase item isn't active."
                  is_component:
                    type: boolean
                    description: |-
                      If `true`, then the purchased item is a component of another purchase item, as is the case of a package.
                      If `false`, then the purchased item isn't a component of another purchase item.
                  is_convert:
                    type: boolean
                    description: |-
                      If `true`, then this promotion will be converted to a different promotion after it expires. It `false`, then the
                      promotion won't be converted to a different promotion after it expires. This can only be true for certain
                      promotions.
                  is_expire:
                    type: boolean
                    description: 'This is `true` only if the purchased item is an expired promotion. Otherwise, this will be `false`.'
                  is_hold:
                    type: boolean
                    description: |-
                      This is `true` only if the purchased item is a promotion placed on hold.
                      Otherwise, this will be `false`.
                  is_limit:
                    type: boolean
                    description: |-
                      If `true`, then the usage of this purchased item is disabled. If `false`, then the usage of this purchased item
                      is enabled.
                  is_login_type_member:
                    type:
                      - boolean
                      - 'null'
                    description: |-
                      If `true`, then the discount was applied for the member type. If `false`, then the discount was applied for the
                      pass holder type. If `null`, then the discount was applied for the prospect type (this won't be `null` only
                      if a discount based on a client type was applied).
                  is_mail:
                    type: boolean
                    description: |-
                      If `true`, then the gift card email notification will be sent to the receiver. This is `true` only if the
                      purchased item is a gift card. Otherwise, this will be `false`.
                  is_past:
                    type: boolean
                    description: |-
                      If `true`, then the gift card email notification has been sent. This can only be `true` if the purchased item is a
                      gift card. Otherwise, this will be `false`.
                  is_redeem:
                    type: boolean
                    description: |-
                      This is `true` if the gift card has been redeemed. This can only be true if the purchased item is a gift card.
                      Otherwise, this will be `false`.
                  is_renew:
                    type: boolean
                    description: |-
                      This is `true` if the promotion is auto-renewable. This can only be true if the purchased item is a promotion.
                      Otherwise, this will be `false`.
                  is_transfer:
                    type: boolean
                    description: |-
                      This is `true` if the promotion has been transferred. This can only be `true` if the purchased item is a promotion.
                      This is `false` if the promotion hasn't been transferred or in all other cases.
                  k_code_result:
                    type: string
                    description: |-
                      The key of the redemption code. This won't be `0` if the purchased item is obtained via a redemption code
                      or if it's a component of a package which is obtained via a redemption code.
                  k_currency:
                    type: string
                    description: 'The key of the currency used to make the purchase.'
                  k_login_promotion_result:
                    type: string
                    description: "The key of the purchased promotion. This won't be `0` only for promotions."
                  k_purchase_result:
                    type: string
                    description: 'The key of the whole purchase which includes the given purchased item.'
                  m_cost_item:
                    type: string
                    description: 'The cost of the purchased item.'
                  m_cost_total:
                    type: string
                    description: 'The total cost of the purchase, including taxes and fees.'
                  m_discount_amount:
                    type: string
                    description: "The amount of the discount given via a reward prize. This will be empty if the discount wasn't applied."
                  m_discount_login_type_amount:
                    type: string
                    description: "The amount of the discount for the client type. This will be empty if the discount wasn't applied."
                  m_discount_manual:
                    type: string
                    description: 'Amount of manual discount. Empty if this discount was not applied.'
                  m_period_price:
                    type: string
                    description: 'The amount to pay for each payment period. This is used only for promotions with the "membership" program type.'
                  m_price:
                    type: string
                    description: 'Source price of item.'
                  m_refund:
                    type: string
                    description: 'The amount refunded. This will be `0` if there are no refunds.'
                  s_code:
                    type: string
                    description: 'The redemption code. This is used only if the purchase is bought using a redemption code.'
                  s_gift_code:
                    type: string
                    description: |-
                      The code to redeem gift card. This won't be empty only for gift cards.

                      This can be auto-generated or custom (entered manually by the staff member during purchase).
                      The max length is 20 characters, which can include both numbers and letters.
                  s_gift_recipient:
                    type: string
                    description: "Name of gift recipient. This won't be empty only for gift cards."
                  s_limit_actor:
                    type: string
                    description: |-
                      The name of the staff member who disabled the usage of the purchased item.
                      This will be empty if the purchased item is enabled.
                  s_mail:
                    type: string
                    description: 'The email address the gift card was sent to. This is used only for gift cards.'
                  s_message:
                    type: string
                    description: |-
                      The text of the message sent to the gift card recipient. This is used only for gift cards.
                      This will be empty if an email notification shouldn't be sent.
                  s_payer:
                    type: string
                    description: 'The name of the user who paid for this purchase.'
                  s_promotion_convert:
                    type: string
                    description: |-
                      The title of the converted promotion. This is used only for promotions which must be converted to
                      another promotion after expiration.
                  s_purchase:
                    type: string
                    description: |-
                      The purchase ID number as it appears on the receipt.
                      This value will also include the leading 0s for the ID number.
                  s_recipient:
                    type: string
                    description: 'The name of the user who paid for this purchase.'
                  s_sender:
                    type: string
                    description: 'The name of the sender. This is used only for gift cards.'
                  s_title:
                    type: string
                    description: 'The name of the purchased item.'
                  sid_value:
                    type: string
                    description: 'The string ID of the purchased item. This ID may be used to change the view of the purchased item.'
                  uid_payer:
                    type: string
                    description: 'The key of the user who paid for this purchase.'
                  uid_recipient:
                    type: string
                    description: 'The key of the user who paid for this purchase.'
                required:
                  - a_component
