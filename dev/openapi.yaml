                        k_id:
                          type: string
                          description: |-
                            Primary key of the component.
                            <p>Special Notes:</p>
                            <ul>
                              <li>Zero means that all elements of this type are available.</li>
                              <li>For `id_purchase_item`=[RsPurchaseItemSid::CLASS_PERIOD](#/components/schemas/RsPurchaseItemSid) we store .`k_class` in the `k_id` field.</li>
                            </ul>
                        text_title:
                          type: string
                          description: 'Title of the component.'
                      required:
                        - id_purchase_item
                        - k_id
                        - text_title
                  a_login_type:
                    type: array
                    description: 'List of client types.'
                    items:
                      type: string
                  a_member_group:
                    type: array
                    description: 'List of client groups.'
                    items:
                      type: string
                  dl_end:
                    type:
                      - string
                      - 'null'
                    format: date
                    description: 'Expiration date. `null` if discount code is never expires.'
                  dl_start:
                    type: string
                    format: date
                    description: 'Activation date.'
                  f_value:
                    type: string
                    description: 'Value of the percentage or fixed discount.'
                  i_duration:
                    type: integer
                    format: int32
                    description: 'Count of calendar periods from `id_duration` before expiration.'
                  i_limit:
                    type: integer
                    format: int32
                    description: 'Maximum count of usage. Zero means unlimited usage.'
                  id_duration:
                    $ref: '#/components/schemas/ADurationSid'
                    description: 'Calendar periods for discount code duration from [ADurationSid](#/components/schemas/ADurationSid). Zero if discount code is never expires.'
                  id_duration_type:
                    $ref: '#/components/schemas/RsDurationTypeSid'
                    description: 'Type of the discount code duration from [RsDurationTypeSid](#/components/schemas/RsDurationTypeSid).'
                  is_active:
                    type: boolean
                    description: |-
                      `true` means discount code is active.
                      `false` means discount code is inactive.
                  is_auto_renew:
                    type: boolean
                    description: |-
                      `true` means membership will auto-renew at discounted rate.
                      `false` means membership will auto-renew at full rate.
                  is_coupon:
                    type: boolean
                    description: |-
                      `true` means discount code can reduce price of the gift cards.
                      `false` means discount code cannot reduce price of the gift cards.

                      If `is_purchase_all` is `true` this fields does not matter.
                  is_first_payment:
                    type: boolean
                    description: |-
                      `true` means discount code can be applied to first membership payment only.
                      `false` means discount code can be applied to all membership payments.
                  is_login_type:
                    type: boolean
                    description: |-
                      `true` means that only selected client types or groups can use this discount code.
                      `false` means that all client types and groups can use this discount code.
                  is_online:
                    type: boolean
                    description: |-
                      `true` if clients can use this discount code in online store,
                      `false` if discount code can be used only in point of sale.
                  is_percent:
                    type: boolean
                    description: |-
                      `true` means discount value is percent from the purchase amount.
                      `false` means discount value is fixed sum from the purchase amount.
