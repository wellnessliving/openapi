                        is_multiple:
                          type: boolean
                          description: '`true` if `i_size` is greater than 1, `false` otherwise.'
                        s_key:
                          type: string
                          description: 'SHA1 hash of the question text, used as a unique identifier for the question.'
                        s_question:
                          type: string
                          description: 'Question text.'
                      required:
                        - i_size
                        - is_multiple
                        - s_key
                        - s_question
                required:
                  - a_question
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '404':
          $ref: '#/components/responses/404'
        '422':
          $ref: '#/components/responses/422'
        '500':
          $ref: '#/components/responses/500'
      summary: 'Retrieves questions for the current service.'
      description: |-
        Returns the list of intake questions defined for the specified service that the client must
         answer before completing an appointment booking. Each question includes its text, a stable
         hash key for matching answers, and input size metadata.
      tags:
        - Appointments
      parameters:
        -
          $ref: '#/components/parameters/X-Error-Rules'
        -
          name: k_service
          in: query
          required: true
          schema:
            type: string
          description: 'The service key used for retrieving questions.'
      x-rate-limit:
        -
          limit: 200000
          period: 3600
