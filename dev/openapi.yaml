    Wl.Login.Promotion.GuestPass.Invite.InviteStatusEnum:
      type: integer
      format: int32
      description: |-
        Lifecycle state of a guest pass invitation.

        Last used: 7

        Values:
        - 9 (`ATTEND`): Guest attended the visit booked with the guest pass.
        - 8 (`BOOK`): Guest booked the visit booked with the guest pass.
        - 3 (`CHECKED_IN`): Guest attended the visit booked with the guest pass.
        - 6 (`GUEST_PASS_EXPIRED`): Guest accepted the invitation but did not attend within the pass expiration
           window. Distinct from [InviteStatusEnum::INVITE_EXPIRED](#/components/schemas/Wl.Login.Promotion.GuestPass.Invite.InviteStatusEnum): the pass has
           already been committed to the guest at acceptance, so it counts toward "Used"
           and is not refunded to the host's available quota.
        - 2 (`INVITE_ACCEPTED`): Guest claimed the invitation but the linked visit (if any) has not been
           completed yet. Pass is committed to the guest - it is no longer "Available"
           to the host and will not be refunded if the guest fails to attend.
        - 7 (`INVITE_EXPIRED`): Invitation expired before the guest claimed it. Pass returns to the host's
           available quota (refundable case).
        - 1 (`INVITE_SENT`): Invitation has been sent but the guest has not claimed it yet. Pass is held
           against the host's quota but can still be revoked by the host.
        - 5 (`LATE_CANCELLED`): Guest cancelled the visit too late and was penalised. Pass is consumed and
           counts toward "Used".
        - 4 (`NO_SHOW`): Guest accepted the invitation but did not show up for the visit. Pass is
           consumed and counts toward "Used".
      enum:
        - 9
        - 8
        - 3
        - 6
        - 2
        - 7
        - 1
        - 5
        - 4
  parameters:
    X-Error-Rules:
      name: X-Error-Rules
      in: header
      required: false
      schema:
        type: string
      description: |-
        Custom rules for mapping API error status codes to HTTP status codes.

        By default the API always returns HTTP 200, even when the response contains an error. Setting this header enables error-to-HTTP-code conversion: when the response status matches a rule, the corresponding 4xx code is returned instead of 200.

        Format: comma-separated entries of `{4xx_code} {pattern}[, ...]`. Pattern syntax:
        - `status` - exact status match.
        - `-suffix` - status ends with `-suffix`.
        - `-part-` - status contains `-part-`.
        - `prefix-` - status starts with `prefix-`.
        - `-` - catch-all for any non-ok status that did not match any other rule.

        The special entry `default` (no HTTP code prefix) expands to the built-in ruleset at that position: `400 -`, `403 -access access access-`, `404 -nx`. Rules listed before `default` override the built-in ones; rules after are fallbacks. Example: `401 access,403 access-,404 -nx,default`.

        Only standard 4xx codes are accepted.
  responses:
    '400':
      description: 'Client-side error: invalid input, failed validation, throttling, or other request error.'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
            description: 'Standard WellnessLiving API error response.'
    '401':
      description: 'Authentication required. The request lacks valid credentials or the session has expired.'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    '403':
      description: 'Access denied. Verify application credentials and required privileges.'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    '404':
      description: 'Requested resource not found.'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    '422':
      description: 'Unprocessable content. The request is syntactically valid but cannot be acted on - for example, a referenced resource does not exist or a field value violates a business constraint.'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    '500':
      description: 'Unexpected server error. Contact support with the `k_log` value from the response body.'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
