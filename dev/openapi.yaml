                    items:
                      $ref: '#/components/schemas/ACardSystemSid'
                  a_method_staff:
                    type: array
                    description: |-
                      A list of payment methods enabled for staff members.
                      The ID is one of [RsPayMethodSid](#/components/schemas/RsPayMethodSid) constants.
                      The value is always `true`.
                    items:
                      $ref: '#/components/schemas/RsPayMethodSid'
                  a_method_support:
                    type: array
                    items:
                      type: object
                      properties:
                        id_pay_method:
                          $ref: '#/components/schemas/RsPayMethodSid'
                          description: 'The ID of type of payment method. One of [RsPayMethodSid](#/components/schemas/RsPayMethodSid) constants.'
                        is_client:
                          type: boolean
                          description: 'Determines whether this method is available for clients. This field is only returned for custom payment methods.'
                        k_pay_method:
                          type:
                            - string
                            - 'null'
                          description: |-
                            The key of the custom payment method.
                            This will be `null` if this payment method isn't customized.
                        s_method:
                          type: string
                          description: 'The name of payment method. This field is only returned for custom payment methods.'
                      required:
                        - id_pay_method
                        - k_pay_method
                  a_mobile_config:
                    type:
                      - array
                      - 'null'
                    description: |-
                      The configuration array that's sent to mobile card reader plugin.
                      The structure of this array depends on the payment processor being used.
                      `null` when mobile card readers are not supported, or when actor has no access to them.
                  a_pay_processor:
                    type:
                      - array
                      - 'null'
                    items:
                      type: object
                      properties:
                        a_public_keys:
                          type:
                            - array
                            - 'null'
                          description: |-
                            Public keys configured for this payment processor.

                            `null` if this payment processor does not support public keys.
                        a_public_info:
                          type:
                            - array
                            - 'null'
                          description: |-
                            Public info configured for this payment processor.

                            `null` if this payment processor does not support public info.
                        hide_save_source:
                          type: boolean
                          description: 'Whether `save payment method` option should be hidden. `true` if hidden, `false` - otherwise.'
                        id_pay_processor:
                          $ref: '#/components/schemas/Thoth.PayProcessor.PayProcessorSid'
                          description: 'ID of the payment processor. One of [PayProcessorSid](#/components/schemas/Thoth.PayProcessor.PayProcessorSid) constants.'
                        is_enabled_3ds:
                          type:
                            - boolean
                            - 'null'
                          description: |-
                            `true` if 3DS should be performed, `false` if 3DS should not be performed. `null` if this is not defined for payment processor.
                            Only for [PayProcessorSid::NUVEI](#/components/schemas/Thoth.PayProcessor.PayProcessorSid)
                        is_test:
                          type:
                            - boolean
                            - 'null'
                          description: |-
                            `true` if the merchant is in a test mode, `false` otherwise.
                            `null` if this is not defined for payment processor.
                        k_business_merchant:
                          type: string
                          description: 'Key of the business merchant.'
                      required:
                        - a_public_keys
                        - a_public_info
                        - hide_save_source
                        - id_pay_processor
                        - is_enabled_3ds
                        - is_test
                        - k_business_merchant
                  dl_now:
                    type: string
                    format: date
                    description: |-
                      Current local date in current location [EnvironmentApi](/Thoth/WlPay/Form/Environment.json)
                      or business [EnvironmentApi](/Thoth/WlPay/Form/Environment.json) if not set location.
                  f_surcharge:
                    type:
                      - string
                      - 'null'
                    description: |-
                      Surcharge amount for payment with card represented as a percent of transaction amount.

                      This will be `null` if the percentage surcharge amount shouldn't be withdrawn.
                  f_surcharge_ach:
                    type:
                      - string
                      - 'null'
                    description: |-
                      Surcharge amount for payment with ACH represented as a percent of transaction amount.

                      This will be `null` if the percentage surcharge amount shouldn't be withdrawn.
                  id_locale:
                    $ref: '#/components/schemas/Core.Locale.LocaleSid'
                    description: 'The locale ID of the business.'
                  is_save_optional:
                    type: boolean
                    description: |-
                      `true` if clients can choose whether their banking and credit card information is saved at checkout,
                      `false` if this information is always saved.
                  is_save_source:
                    type: boolean
                    description: |-
                      Determines whether newly added payment sources should be saved. This will be `true` if payment sources should be saved,
                      `false` if otherwise.
                  is_tip:
                    type: boolean
                    description: 'Whether tips are accepted.'
                  m_surcharge:
                    type:
                      - string
                      - 'null'
                    description: |-
                      Surcharge amount for payment with card represented as a fixed amount.

                      This will be `null` if the fixed surcharge amount shouldn't be withdrawn.
                  m_surcharge_ach:
                    type:
                      - string
                      - 'null'
                    description: |-
                      Surcharge amount for payment with ACH represented as a fixed amount.

                      This will be `null` if the fixed surcharge amount shouldn't be withdrawn.
                required:
                  - a_card_system
                  - a_method_staff
                  - a_method_support
                  - dl_now
                  - is_save_optional
                  - is_save_source
                  - is_tip
