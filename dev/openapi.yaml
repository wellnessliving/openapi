      summary: 'Returns available purchase options, existing client promotions, session passes, and prizes for the specified session.'
      description: |-
        Loads all purchase options that can be used to book the specified class period for the given user, including
        existing login promotions with remaining session counts, new purchasable options, reward prizes, and login prizes.
        Returns pricing, image, program category, and availability data for each option.
      tags:
        - Booking
      parameters:
        -
          $ref: '#/components/parameters/X-Error-Rules'
        -
          name: a_login_promotion_group
          in: query
          required: true
          schema:
            type: array
            items:
              type: object
              properties:
                k_login_promotion:
                  type: string
                  description: 'Selected purchase option.'
                uid:
                  type: string
                  description: 'UID of the previous user.'
              required:
                - k_login_promotion
                - uid
          description: |-
            A list of existing purchase options that were selected for previous clients (group).

            Note:
            * It makes sense if for all clients the list is loaded within
                 the same pair `dt_date_gmt` and `k_class_period`.
            * If promotions are shared, the system will try to determine if there are enough sessions left for the next
                 client who has the same promotion.
            * A very simple check is carried out based on a comparison of the remaining sessions for the promotion
                 with the number of times it was selected.
            * Can affect the list of available login promotions `a_login_promotion`.
                 If a given client is eligible for such a promotion, but the remaining sessions (minus those previously
                 selected) in it do not allow it to be applied to the selected session, then such promotion will simply
                 not be returned for the client.
            * The order of clients across all APIs must be the same to guarantee their results.

            Each element has the following structure:
        -
          name: a_session
          in: query
          required: true
          schema:
            type: array
            items:
              type: string
          description: |-
            The list of sessions being booked.

            Keys are class period keys. 
            Values are index arrays of date/time strings when the session occurred, in MySQL format and in GMT.
        -
          name: a_session_wait_list_unpaid
          in: query
          required: true
          schema:
            type: array
            items:
              type: string
          description: |-
            The selected sessions on the wait list that are unpaid.

            Keys are class period keys. 
            Values are index arrays of date/time strings when the session occurred, in MySQL format and in GMT.
        -
          name: dt_date_gmt
          in: query
          required: true
          schema:
            type: string
            format: date-time
          description: 'Date/time to which session is booked.'
        -
          name: i_image_height
          in: query
          required: true
          schema:
            type: integer
            format: int32
          description: |-
            The image height in pixels. Specify this value if you need image to be returned in specific size.
            The returned image will have the default thumbnail size if this value isn't specified.
        -
          name: i_image_width
          in: query
          required: true
          schema:
            type: integer
            format: int32
          description: |-
            The image width in pixels. Specify this value if you need image to be returned in specific size.
            The returned image will have the default thumbnail size if this value isn't specified.
        -
          name: id_mode
          in: query
          required: true
          schema:
            $ref: '#/components/schemas/Wl.Mode.ModeSid'
          description: 'The mode type. One of the [ModeSid](#/components/schemas/Wl.Mode.ModeSid) constants.'
        -
          name: is_backend
          in: query
          required: true
          schema:
            type: boolean
          description: |-
            `true` if action is performed as a staff member; `false` otherwise.

            If `true` is sent, access to the business and to the client will be checked.
            If `false` is sent, user can book only for himself or for relatives if this is allowed in business settings.
        -
          name: is_card_authorize
          in: query
          required: true
          schema:
            type: boolean
          description: 'Determines if the client must authorize the credit card.'
        -
          name: is_credit_card_check
          in: query
          required: true
          schema:
            type: boolean
          description: |-
            Checking whether the client has a credit card (if configured in the business) will be skipped if this flag is set to `false`.

            Use this field with caution.
            The final booking will not use this flag, and the check will still be performed.
        -
          name: k_business
          in: query
          required: false
          schema:
            type:
              - string
              - 'null'
          description: |-
            The business key.

            `null` if business key was not passed.
        -
          name: k_class_period
          in: query
          required: true
          schema:
            type: string
          description: 'Key of session which is booked.'
        -
          name: show_relation
          in: query
          required: true
          schema:
            type: boolean
          description: '`true` to show "book for" option in booking wizard. `false` for default behavior.'
        -
          name: uid
          in: query
          required: true
          schema:
            type: string
          description: 'The client key for which the booking is being made.'
      deprecated: true
      x-deprecated: 'Use {@link Wl\Book\Process\Purchase\Purchase56Api} instead.'
      x-rate-limit:
        -
          limit: 200000
          period: 3600
