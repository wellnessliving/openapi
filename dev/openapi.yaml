                  id_virtual_provider:
                    $ref: '#/components/schemas/Wl.Virtual.VirtualProviderSid'
                    description: |-
                      The virtual provider ID. One of the [VirtualProviderSid](#/components/schemas/Wl.Virtual.VirtualProviderSid) constants.

                      This will be `null` for non-virtual services.
                  id_visit:
                    $ref: '#/components/schemas/Wl.Visit.VisitSid'
                    description: |-
                      The visit type ID. One of the [VisitSid](#/components/schemas/Wl.Visit.VisitSid) constants.

                      This will be `null` if not loaded yet.
                  is_checkin:
                    type: boolean
                    description: "If `true`, then this visit is ready to be checked in. If `false`, then this visit can't be checked in."
                  is_enable_client_cancel:
                    type: boolean
