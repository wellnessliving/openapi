  /Wl/Visit/VisitStatus.json:
    get:
      operationId: Wl.Visit.VisitStatusApi.get
      responses:
        '200':
          description: 'Successful response.'
          content:
            application/json:
              schema:
                type: object
                properties:
                  a_cancel:
                    type: array
                    items:
                      type: object
                      properties:
                        a_penalty:
                          type:
                            - object
                            - 'null'
                          description: '`null` if penalty must be not applied.'
                          properties:
                            is_flat:
                              type: boolean
                              description: '`true` in a case of flat penalty type; `false` in a case of percentage penalty type.'
                            k_currency:
                              type: string
                              description: 'Currency .'
                            m_amount:
                              type: string
                              description: 'Penalty amount.'
                          required:
                            - is_flat
                            - k_currency
                            - m_amount
                        can_cancel:
                          type: boolean
                          description: '`true` if the booking can be canceled online by the specified user, `false` otherwise.'
                        is_flag:
                          type: boolean
                          description: "`true` if the client's account will be flagged instead of charging a monetary fee, `false` otherwise."
                        is_late:
                          type: boolean
                          description: '`true` if the cancellation would be considered a late cancel, `false` otherwise.'
                        is_refund:
                          type: boolean
                          description: |-
                            `true` if the visit credit (from the purchase option used to book) will be returned
                               to the user's profile after cancellation, `false` otherwise.
                      required:
                        - a_penalty
                        - can_cancel
                        - is_flag
                        - is_late
                        - is_refund
                  a_resource:
                    type:
                      - array
                      - 'null'
                    description: |-
                      An array of service resources.

                      The key refers to the `k_resource_type`. 
                      The value is an array with the following key: `k_resource`. .
                      The array element contains a nested array with `i_index` and `i_quantity`. .

                      This will be empty if not set yet.
                    items:
                      type: string
                  a_resource_alias:
                    type:
                      - array
                      - 'null'
                    items:
                      type: object
                      properties:
                        k_resource:
                          type: string
                          description: 'Resource .'
                        k_resource_type:
                          type: string
                          description: 'Resource type .'
                        i_index:
                          type: integer
                          format: int32
                          description: 'Index of the resource on the layout.'
                        i_quantity:
                          type: integer
                          format: int32
                          description: 'Quantity of the resource on the layout.'
                        text_alias:
                          type: string
                          description: "Resource's custom name (alias) on the layout."
                        text_title:
                          type: string
                          description: "Resource's title."
                      required:
                        - k_resource
                        - k_resource_type
                        - i_index
                        - i_quantity
                        - text_alias
                        - text_title
                  a_staff:
                    type: array
                    deprecated: true
                    x-deprecated: 'This field is deprecated. Use `a_uid_staff` instead.'
                    description: 'The list of keys of staff members that conduct the class.'
                    items:
                      type: string
                  a_uid_staff:
                    type: array
                    description: 'The list of user IDs of staff members that conduct the class.'
                    items:
                      type: string
                  dt_date:
                    type: string
                    format: date-time
                    description: 'The visit date and time in UTC and in MySQL format.'
                  dtl_date:
                    type: string
                    format: date-time
                    description: "The visit date in the location's time zone and in MySQL format."
                  i_duration:
                    type: integer
                    format: int32
                    description: 'The service duration (in minutes).'
                  i_wait_spot:
                    type: integer
                    format: int32
                    description: "The client's place in a waiting list."
                  id_mode:
                    $ref: '#/components/schemas/Wl.Mode.ModeSid'
                    description: |-
                      The source of the visit or the visit change.
                      One of the [ModeSid](#/components/schemas/Wl.Mode.ModeSid) constants.
                      If you're unsure about the value to use, keep the default value.
                  id_visit:
                    $ref: '#/components/schemas/Wl.Visit.VisitSid'
                    description: |-
                      The status of the visit.
                      One of the [VisitSid](#/components/schemas/Wl.Visit.VisitSid) constants.
                  is_event:
                    type: boolean
                    description: 'Determines whether the visit is from an event.'
                  is_request:
                    type: boolean
                    description: |-
                      Whether this visit is requested and requires staff confirmation.

                      * `true` - visit is requested.
                      * `false` - visit is confirmed or denied or this is a system request.
                  k_class:
                    type: string
                    description: 'The class key.'
                  k_class_period:
                    type: string
                    description: 'The class period key.'
                  k_location:
                    type: string
                    description: 'The key of the location where visit provides.'
                  k_service:
                    type:
                      - string
                      - 'null'
                    description: |-
                      The service key.
                      If 'null', the visit isn't from an appointment.
                  k_staff:
                    type:
                      - string
                      - 'null'
                    deprecated: true
                    x-deprecated: 'This field is deprecated. Use `uid_staff` instead.'
                    description: |-
                      The key of the staff providing the appointment.
                      If `null`, the visit isn't from an appointment (for example, the visit is from an asset).
                  s_calendar_file_content:
                    type: string
                    description: 'The .ics file for adding the service to a phone calendar.'
                  text_abbr_timezone:
                    type: string
                    description: 'The text abbreviation of the time zone.'
                  text_location:
                    type: string
                    description: 'The full address of the location for the visit (not the name of the location).'
                  text_staff:
                    type: string
                    description: |-
                      The full name of the staff member who conducts this visit.
                      If there are several staff members conducting the visit, their names will all be listed and separated by commas.
                  text_title:
                    type: string
                    description: 'The service title.'
                  uid:
                    type:
                      - string
                      - 'null'
                    description: |-
                      User key who made a visit.
                      `null` for a guest visit.
                  uid_staff:
                    type:
                      - string
                      - 'null'
                    description: |-
                      The ID of the user who is the staff providing the appointment.
                      If `null`, the visit isn't from an appointment (for example, the visit is from an asset).
                  url_book_referral:
                    type:
                      - string
                      - 'null'
                    description: |-
                      The direct link to start class/event booking on the WellnessLiving website.
                      `null` for appointments/events/gym visits.
                  url_book_referral_short:
                    type:
                      - string
                      - 'null'
                    description: |-
                      The shortened direct link to start class/event booking on the WellnessLiving website.
                      `null` for appointments/events/gym visits.
                  url_virtual_service:
                    type: string
                    description: 'URL of virtual service. Empty if the visit is not virtual.'
                required:
                  - a_cancel
                  - a_staff
                  - a_uid_staff
                  - dt_date
                  - dtl_date
                  - i_duration
                  - i_wait_spot
                  - id_mode
                  - id_visit
                  - is_event
                  - is_request
                  - k_class
                  - k_class_period
                  - k_location
                  - s_calendar_file_content
                  - text_abbr_timezone
                  - text_location
                  - text_staff
                  - text_title
                  - url_virtual_service
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
