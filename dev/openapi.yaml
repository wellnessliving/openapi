                      - s_value
                a_repeat:
                  type:
                    - array
                    - 'null'
                  items:
                    type: object
                    properties:
                      a_day:
                        type: array
                        description: |-
                          The days of week when the appointment repeat.One of the [ADateWeekSid](#/components/schemas/ADateWeekSid) constants.
                          Should be passed for any type of repetition.
                        items:
                          type: integer
                          format: int32
                      dt_from:
                        type: string
                        description: |-
                          Date to start recurring booking.
                          Expected for `id_repeat_end` = [RsRepeatEndSid::DATE](#/components/schemas/RsRepeatEndSid).
                      dt_to:
                        type: string
                        description: |-
                          Date to complete recurring booking.
                          Expected for `id_repeat_end` = [RsRepeatEndSid::DATE](#/components/schemas/RsRepeatEndSid).
                      i_count:
                        type: integer
                        format: int32
                        description: |-
                          The number of occurrences after which the appointment's repeat cycle stops.
                          Should be empty if the repeat cycle doesn't stop after a certain number of occurrences.
                          Expected for `id_repeat_end` = [RsRepeatEndSid::COUNT](#/components/schemas/RsRepeatEndSid).
                      i_duration:
                        type: integer
                        format: int32
                        description: 'Count of days\weeks\months between recurring bookings.'
                      id_duration:
                        $ref: '#/components/schemas/ADurationSid'
                        description: |-
                          The measurement unit of `i_period`. One of the [ADurationSid](#/components/schemas/ADurationSid) constants.
                          Available duration units are: [ADurationSid::DAY](#/components/schemas/ADurationSid), [ADurationSid::WEEK](#/components/schemas/ADurationSid), [ADurationSid::MONTH](#/components/schemas/ADurationSid).
                      id_repeat_end:
                        $ref: '#/components/schemas/RsRepeatEndSid'
                        description: 'Possible ways to stop repeatable events. One of the [RsRepeatEndSid](#/components/schemas/RsRepeatEndSid) constants.'
                    required:
                      - a_day
                      - i_duration
                      - id_duration
                      - id_repeat_end
                a_resource:
                  type: array
                  items:
                    type: object
                    properties:
                      i_index:
                        type: integer
                        format: int32
                        description: 'The order number of the asset (from 1 to the asset quantity).'
                      k_resource:
                        type: string
                        description: 'The asset key.'
                    required:
                      - i_index
                      - k_resource
                a_session_pass:
                  type: array
                  description: |-
                    A list of existing session passes (drop-in, full-event) which are selected by a group of clients.

                    This session passes will be checked to determine if it can be applied to the current class or event.

                    Keys are UIDs of clients, values are session pass keys.
                  items:
                    type: string
                a_session_select:
                  type: array
                  description: |-
                    A list of sessions which are selected by a group of clients.

                    Keys are UIDs of clients, values are arrays of class period keys mapped to index arrays of
                     dates/times when the session occurred (MySQL format; UTC).
                  items:
                    type: array
                    items:
                      type: array
                      items:
                        type: string
                a_session_wait_list_unpaid:
                  type: array
                  description: |-
                    A list of wait list (unpaid) sessions which are selected by a group of clients.

                    Keys are UIDs of clients, values are arrays of class period keys mapped to index arrays of
                     dates/times when the session occurred (MySQL format; UTC).
                  items:
                    type: array
                    items:
                      type: array
                      items:
                        type: string
                is_force_pay_later:
                  type: boolean
                  description: |-
                    `true` if user pressed 'Pay later'.
                    `false` if user pressed 'Pay now'.
              required:
                - a_login_promotion
                - a_purchase_item_check
                - a_resource
                - a_session_pass
                - a_session_select
                - a_session_wait_list_unpaid
                - is_force_pay_later
