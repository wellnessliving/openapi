                        - is_empty
                        - k_resource
                        - sid_image
                        - sid_image_icon
                        - sid_image_shape
                        - url
                  a_staff:
                    type: array
                    items:
                      type: object
                      properties:
                        k_staff:
                          type: string
                          description: 'The staff member key.'
                        s_family:
                          type: string
                          description: 'The surname of the staff member.'
                        s_name:
                          type: string
                          description: 'The first name of the staff member.'
                      required:
                        - k_staff
                        - s_family
                        - s_name
                  dt_cancel:
                    type: string
                    format: date-time
                    description: 'The latest date and time for when the visit can be canceled without penalty.'
                  dt_date_global:
                    type: string
                    format: date-time
                    description: 'The date and time of the visit in UTC.'
                  dt_date_local:
                    type: string
                    format: date-time
                    description: 'The date and time of the visit in the local time zone.'
                  dtl_location:
                    type: string
                    format: date-time
                    description: 'Session date/time in timezone of the location where it takes place.'
                  html_description:
                    type: string
                    description: 'The description of the service.'
                  html_special:
                    type: string
                    description: 'The special instructions for the service.'
