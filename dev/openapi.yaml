                  a_penalty:
                    type:
                      - array
                      - 'null'
                    items:
                      type: object
                      properties:
                        is_flat:
                          type: boolean
                          description: '`true` in a case of flat penalty type; `false` in a case of percentage penalty type.'
                        k_currency:
                          type: string
                          description: 'Currency key.'
                        m_amount:
                          type: string
                          description: 'Penalty amount.'
                      required:
                        - is_flat
                        - k_currency
                        - m_amount
                  can_cancel:
                    type: boolean
                    description: |-
                      `true` if the booking can be canceled online by the specified user, `false` otherwise.

                      Cancellation is possible only if the current visit status is [VisitSid::BOOK](#/components/schemas/Wl.Visit.VisitSid) or [VisitSid::WAIT](#/components/schemas/Wl.Visit.VisitSid).
                  is_flag:
                    type: boolean
                    description: |-
                      `true` if the client's account will be flagged instead of charging a monetary fee, `false` otherwise.

                      Meaningful only when `is_late` is `true`.
                  is_late:
                    type: boolean
                    description: |-
                      `true` if the cancellation would be considered a late cancel, `false` otherwise.

                      Late cancel applies only to bookings with status [VisitSid::BOOK](#/components/schemas/Wl.Visit.VisitSid).
                      Wait-list bookings ([VisitSid::WAIT](#/components/schemas/Wl.Visit.VisitSid)) are never subject to late cancellation rules.
                  is_refund:
                    type: boolean
                    description: |-
                      `true` if the visit credit (from the purchase option used to book) will be returned
                      to the user's profile after cancellation, `false` otherwise.

                      For regular (non-late) cancellations, the credit is always returned when the booking
                      was made with a purchase option.

                      For late cancellations, return depends on the business's Payment Return Policy.
