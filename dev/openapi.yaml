                                - i_height
                                - i_width
                                - is_empty
                                - sid_image
                                - url
                            i_index:
                              type: integer
                              format: int32
                              description: 'The asset number. Actual for assets with a quantity more than `1`.'
                            i_quantity:
                              type: integer
                              format: int32
                              description: 'Total number of the asset spots.'
                            i_use:
                              type: integer
                              format: int32
                              description: 'Number of already used asset units.'
                            is_current:
                              type: boolean
                              description: 'City for the off-site location.'
                            k_city:
                              type: string
                              description: '`true` means that this asset is selected by client, `false` - otherwise.'
                            k_resource:
                              type: string
                              description: 'The key of the asset in database.'
                            s_resource:
                              type: string
                              description: 'The title of the asset.'
                            text_address:
                              type: string
                              description: 'Address for the off-site location.'
                            text_guide:
                              type: string
                              description: 'Additional address tips for the off-site location.'
                            text_postal:
                              type: string
                              description: 'Postal code for the off-site location.'
                          required:
                            - a_class_period
                            - a_image
                            - i_index
                            - i_quantity
                            - i_use
                            - is_current
                            - k_city
                            - k_resource
                            - s_resource
                            - text_address
                            - text_guide
                            - text_postal
