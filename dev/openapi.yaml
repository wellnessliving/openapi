                    $ref: '#/components/schemas/Wl.Classes.RequirePaySid'
                    description: |-
                      The purchase rule ID.
                      One of the [RequirePaySid](#/components/schemas/Wl.Classes.RequirePaySid) constants.
                  id_pay_require_option:
                    $ref: '#/components/schemas/Wl.Classes.RequirePaySid'
                    description: |-
                      Default required value for [RequirePaySid::ADVANCE](#/components/schemas/Wl.Classes.RequirePaySid) payment mode,
                       one of [RequirePaySid::ONLINE](#/components/schemas/Wl.Classes.RequirePaySid) or [RequirePaySid::VISIT](#/components/schemas/Wl.Classes.RequirePaySid).

                      `null` means default value not selected.
                  id_virtual_provider:
                    $ref: '#/components/schemas/Wl.Virtual.VirtualProviderSid'
                    description: |-
                      The virtual provider ID. One of the [VirtualProviderSid](#/components/schemas/Wl.Virtual.VirtualProviderSid) constants.

                      `null` if an in-person event.
                  is_age_restrict:
                    type: boolean
                    description: |-
                      Whether the event is age restricted.
                      `true` if the event is age restricted, `false` if the event is not.
                  is_availability_checked:
                    type: boolean
                    description: |-
                      `true` if the event availability was checked; `false` if the event has too many sessions, and calculating
                       the availability of each one takes a lot of time.
                  is_book:
                    type: boolean
                    description: "`true` if the event is already booked; `false` if the event isn't booked."
                  is_bookable:
                    type: boolean
                    description: "`true` If the event is bookable; `false` if the event isn't bookable."
                  is_full:
                    type: boolean
                    description: |-
                      `true` if there are no free spots in the event; booking is available only into the wait list.
                      `false` otherwise.
                  is_makeup:
                    type: boolean
                    description: |-
                      `true` if the selected session can be a make up session.
                      `false` otherwise.
                  is_past:
                    type: boolean
                    description: |-
                      `true` if the selected session has already started and do not available to book.
                      `false` otherwise.
                  is_policy_custom:
                    type: boolean
                    description: |-
                      `true` if the `a_business_policy` contains the custom policies from the event.
                      `false` otherwise.
                  is_promotion_only:
                    type: boolean
                    description: |-
                      `true` if the event can be paid with a Purchase Option only.
                      `false` if full event purchases or single session purchases are permitted.
                  is_prorate:
                    type: boolean
                    description: |-
                      `true` if clients, when they book event, which has been started, can pay only for the sessions in the future.
                      `false` if clients, when they book event, have to pay for the entire event and the number of lefts in the future sessions
                      does not matter.
                  is_single_session_buy:
                    type: boolean
                    description: 'Determines whether this event allows paying for a single session.'
                  is_virtual:
                    type: boolean
                    description: '`true` if event is virtual; `false` otherwise.'
                  k_book_class_period:
                    type: string
                    description: 'The ID of the session which should be used to go to the booking wizard.'
                  m_price:
                    type: string
                    description: 'The price of a single session of the event.'
                  m_price_total:
                    type: string
                    description: 'The price of the all sessions of the event.'
                  m_price_total_early:
                    type:
                      - string
                      - 'null'
                    description: 'Price of the full event should be used as full price while `dt_early` is actual.'
                  s_deny_reason:
                    type: string
                    description: |-
                      The reason why the event can't be booked.
                      Empty if `k_book_class_period` isn't empty.
                  s_title:
                    type:
                      - string
                      - 'null'
                    description: 'The title of the event.'
                  show_special_instructions:
                    type: boolean
                    description: |-
                      `true` if special instructions can be public,
                      `false` if they should be shown only to the clients, who booked the class.
                  text_end:
                    type: string
                    description: 'End date of the event in user-friendly format.'
                  text_start:
                    type: string
                    description: 'Start date of the event in user-friendly format.'
                  url_book:
                    type:
                      - string
                      - 'null'
                    description: |-
                      Link to the start of the booking wizard to book the closed session from this event or the entire event.

                      Can be `null` if there is no available for booking sessions.
                  xml_description:
                    type:
                      - string
