        -
          name: is_phone
          in: query
          required: true
          schema:
            type: boolean
          description: |-
            Whether OTP code will be sending to user via email.
             `true` if OTP code is sending through phone number,
             `false` if OTP code is sending through email.
        -
          name: k_business
          in: query
          required: true
          schema:
            type: string
          description: 'Business key.'
        -
          name: uid
