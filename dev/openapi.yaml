      summary: "Return data about appointment's add-ons."
      description: |-
        Returns the current list of add-ons attached to the specified appointment along with the full
         catalog of available add-ons for the service. The caller must have view access to the appointment.
      tags:
        - Appointments
      parameters:
        -
          $ref: '#/components/parameters/X-Error-Rules'
        -
          name: a_uid
          in: query
          required: true
          schema:
            type: array
            items:
              type: string
          description: |-
            List of user keys to get add-ons for. Not empty only when getting add-ons for new appointment
            (`k_appointment` is null). User key '-1' means walk-in, user key '0' means new user
            (user will be created together with appointment).
        -
          name: k_appointment
          in: query
          required: true
          schema:
            type: string
          description: 'The appointment key.'
        -
          name: k_business
          in: query
          required: true
          schema:
            type: string
          description: 'The business key. This will be an empty string if not set yet.'
        -
          name: k_location
          in: query
          required: true
          schema:
            type: string
          description: |-
            Location key.
            Not empty only when getting add-ons for new appointment (`k_appointment` is null).
        -
          name: k_service
          in: query
          required: true
          schema:
            type: string
          description: |-
            Service key.
            Not empty only when getting add-ons for new appointment (`k_appointment` is null).
      x-rate-limit:
        -
          limit: 200000
          period: 3600
    put:
      operationId: Wl.Appointment.Edit.AddonUpdateApi.put
      responses:
        '200':
          description: 'Successful response.'
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '404':
          $ref: '#/components/responses/404'
        '422':
          $ref: '#/components/responses/422'
        '500':
          $ref: '#/components/responses/500'
      summary: 'Replaces the add-ons for the appointment with the provided list, optionally updating the appointment duration.'
      description: |-
        Removes all existing add-ons from the appointment and attaches the provided set in their place.
         When add-ons with a duration are included, the appointment end time is recalculated accordingly.
         The operation runs inside a database transaction to ensure consistency.
      tags:
        - Appointments
      parameters:
        -
          $ref: '#/components/parameters/X-Error-Rules'
        -
          name: k_appointment
          in: query
          required: true
          schema:
            type: string
          description: 'The appointment key.'
        -
          name: k_business
          in: query
          required: true
          schema:
            type: string
          description: 'The business key. This will be an empty string if not set yet.'
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                a_addon:
                  type: object
                  properties:
                    i_product:
                      type: integer
                      format: int32
                      description: 'The add-on count. Max value is 255.'
                    i_use:
                      type: integer
                      format: int32
                      description: 'The add-on use count. Max value is 255. Not set means same value as add-on count.'
                    k_shop_product_option:
                      type: string
                      description: 'The add-on key.'
                  required:
                    - i_product
                    - k_shop_product_option
                is_duration_update:
                  type: boolean
                  description: 'Determines whether the appointment duration needs to be updated.'
              required:
                - a_addon
                - is_duration_update
      x-rate-limit:
        -
          limit: 200000
          period: 3600
