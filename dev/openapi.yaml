      summary: |-
        Gets schedule of business `k_business` for day
        `dt_date`.
      description: |-
        Returns all classes and appointments scheduled for the given business on the specified date,
        sorted chronologically. Supports both single-day and date-range modes, and includes full
        session details such as staff, visit counts, assets, and class images.
      tags:
        - Schedule
      parameters:
        -
          $ref: '#/components/parameters/X-Error-Rules'
        -
          name: a_config
          in: query
          required: true
          schema:
            type: array
            items:
              type: object
              properties:
                is_appointment_cancel_recurring:
                  type: boolean
                  description: 'If needed to show recurring canceled appointments on schedule.'
                is_appointment_cancel_single:
                  type: boolean
                  description: 'If needed to show single canceled appointments on schedule.'
                is_class_cancel:
                  type: boolean
                  description: 'If needed to show canceled classes on schedule.'
              required:
                - is_appointment_cancel_recurring
                - is_appointment_cancel_single
                - is_class_cancel
          description: |-
            Configuration options for schedule.
            Key is option name, value is boolean.

            May contain the following keys:
        -
          name: dl_end
          in: query
          required: true
          schema:
            type: string
            format: date
          description: |-
            The end date of the range from which the list of schedule sessions should be retrieved.

            This will be `null` if the range has no end date. If this value is used,
            `dt_date` should not be set.
        -
          name: dl_start
          in: query
          required: true
          schema:
            type: string
            format: date
          description: |-
            The start date of the range from which the list of scheduled sessions should be retrieved.

            This will be `null` if the range has no start date. If this value is used,
            `dt_date` should not be set.
        -
          name: dt_date
          in: query
          required: true
          schema:
            type: string
            format: date-time
          description: |-
            The date of the sessions in Coordinated Universal Time (UTC) and MySQL format.

            If this value is used, then
            `dl_end` and
            `dl_start` should not be set.
        -
          name: k_business
          in: query
          required: true
          schema:
            type: string
          description: 'Business key.'
        -
          name: uid
          in: query
          required: true
          schema:
            type: string
          description: 'User key.'
      x-rate-limit:
        -
          limit: 200000
          period: 3600
