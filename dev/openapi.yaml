                        description: 'Payment method. One of [RsPayMethodSid](#/components/schemas/RsPayMethodSid) constants.'
                      is_hide:
                        type: boolean
                        description: 'Whether this payment method is hidden.'
                      is_success:
                        type: boolean
                        description: 'Whether this source was successfully charged.'
                      m_fee:
                        type: string
                        description: 'Fee amount for this payment source.'
                      m_surcharge:
                        type: string
                        description: 'Surcharge amount for this payment source.'
                      pa:
                        type: object
                        description: |-
                          Payer authentication data. Element may not present for payment sources that do not support payer authentication,
                           or payer authentication is not implemented by this payment processor.

                           This array is represented by
                           `namespace.Wl/Pay/Processor/ProcessorInterface/PayerAuthenticationForm.xml`
                           at browser side.

                           Structure of the array:
                        properties:
                          json_data:
                            type: string
                            description: |-
                              Additional payer authentication data.

                               Copy of value set with
                               `Wl_Pay_Processor_ProcessorInterface_Abstract.paDataSet()`.

                               An empty string (or element not passed) if this payment processor does not provide additional payer
                               authentication data, or payer authentication was not performed.
                          m_amount:
                            type: string
                            description: |-
                              Authenticated payment amount.

                               Copy of value set with
                               `Wl_Pay_Processor_ProcessorInterface_Abstract.paAmountSet()`.

                               An empty string (or element not passed) if payer authentication was not performed.
                          k_pay_transaction:
                            type: string
                            description: |-
                              Key of the payment transaction that was created during payer authentication.
                               In this case, payment transaction should be attached to this transaction.

                               An empty string (or element not passed) if transaction was not created during payer authentication, or payer
                               authentication was not executed.
                      s_index:
                        type: string
                        description: 'Index of this form. This corresponds the key this item is written in this array with.'
                    required:
                      - f_amount
                      - id_pay_method
                      - is_hide
                      - s_index
                a_payment_data:
                  type: array
                  items:
                    type: object
                    properties:
                      id_purchase_item:
                        $ref: '#/components/schemas/RsPurchaseItemSid'
                        description: 'The purchase item type. One of the [RsPurchaseItemSid](#/components/schemas/RsPurchaseItemSid) constants.'
                      k_id:
                        type: string
                        description: 'The promotion or appointment key, depending on `id_purchase_item` in this array.'
                      k_login_promotion:
                        type: string
                        description: 'The login promotion key.'
                      text_discount_code:
                        type: string
                        description: 'The discount code.'
                    required:
                      - id_purchase_item
                      - k_id
                      - k_login_promotion
                      - text_discount_code
                a_purchase_item:
                  type: array
                  description: |-
                    The purchase items keys.
                    This will be empty if no purchases have been made for the appointment booking.

                    Keys refer to provider indexes.
                    Value is array of item keys.
                  items:
                    type: array
                    items:
                      type: string
                a_quiz_response:
                  type: array
                  description: |-
                    The list of quiz response keys.
                    Key is quiz key.
                    Value is quiz response key.
                  items:
                    type: string
                id_mode:
                  $ref: '#/components/schemas/Wl.Mode.ModeSid'
                  description: 'The mode type. One of the [ModeSid](#/components/schemas/Wl.Mode.ModeSid) constants.'
                is_back_to_back:
                  type: boolean
                  description: 'Determines whether multiple appointments have been booked in back-to-back mode.'
                is_try:
                  type: boolean
                  description: |-
                    This will be `true` when trying to make a test booking and rollback should be applied.
                    Otherwise, this will be `false`.

                    If the flag is set to `true`, credit card requirement will be ignored during this check.
                s_id:
                  type: string
                  description: 'Unique identifier of the wizard.'
              required:
                - a_answer
                - a_book_data
                - a_notification
                - a_paid
                - a_pay_form
                - a_payment_data
                - a_purchase_item
                - a_quiz_response
                - id_mode
                - is_back_to_back
                - is_try
                - s_id
