                    i_period:
                      type: integer
                      format: int32
                      description: "The frequency of the appointment's repeat cycle."
                    id_period:
                      $ref: '#/components/schemas/ADurationSid'
                      description: 'The measurement unit of `i_period`. One of the [ADurationSid](#/components/schemas/ADurationSid) constants.'
                    is_month:
                      type: boolean
                      description: |-
                        `true` if the appointment repeats monthly on the same date.
                        `false` if the appointment repeats monthly on the same day of the week.
                        `null` if the appointment doesn't repeat monthly.
                  required:
                    - i_period
                    - id_period
                a_resource:
                  type: object
                  description: |-
                    A list of assets for the appointment booking.
                    Keys refer to asset categories.  Values refer to arrays with the next keys:

                    Specify this only for the appointment booking.
                  properties:
                    i_index:
                      type: integer
                      format: int32
                      description: 'The asset index on the layout. Specify this only if the asset category has a layout.'
                    k_resource:
                      type: string
                      description: 'The asset.'
                  required:
                    - k_resource
                dt_date:
                  type: string
                  description: "The date/time for the booking in MySQL format in the location's time zone."
                i_duration:
                  type: integer
                  format: int32
                  description: 'The duration of asset booking in minutes. Specify this for separate asset bookings only.'
                i_index:
                  type: integer
                  format: int32
                  description: |-
                    The asset index on the layout.
