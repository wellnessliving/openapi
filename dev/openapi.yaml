                  description: |-
                    A list of answers for the questions from [QuestionApi](/Wl/Appointment/Book/Question/Question.json).

                    1st dimension - provider index.
                    2nd dimension - keys refer to hashes of the questions. Values refer to answers for the questions.
                  items:
                    type: array
                    items:
                      type: string
                a_book_data:
                  type: array
                  items:
                    type: object
                    properties:
                      id_class_tab:
                        $ref: '#/components/schemas/Wl.Classes.Tab.TabSid'
                        description: 'The booking service type. One of the [TabSid](#/components/schemas/Wl.Classes.Tab.TabSid) constants.'
                      a_provider:
                        type: object
                        description: 'A list of providers and their booking details. Every element has next keys:'
                        properties:
                          a_conflict:
                            type: object
                            description: 'Information about booking conflicts. Keys are bookings dates/times in MySQL format in UTC. Values are arrays with next keys:'
                            properties:
                              dt_date_local:
                                type: string
                                description: 'New appointment date/time in MySQL in locale timezone.'
                              i_duration:
                                type: integer
                                format: int32
                                description: 'New asset booking duration.'
                              i_index:
