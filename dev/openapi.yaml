          in: query
          required: true
          schema:
            type: array
            items:
              $ref: '#/components/schemas/RsAppointmentPaySid'
          description: |-
            The payment type for the appointment. One of the [RsAppointmentPaySid](#/components/schemas/RsAppointmentPaySid) constants.

            Keys refer to provider indexes.
        -
          name: a_uid
          in: query
          required: true
          schema:
            type: array
            items:
              type: string
          description: |-
            List of user keys to book appointments.
            There may be empty values in this list, which means that this is a walk-in.
        -
          name: a_user
          in: query
          required: true
          schema:
            type: array
            items:
              type: object
              properties:
                a_note:
                  type: array
                  description: "The list of notes to add to the new user's profile."
                  items:
                    type: string
                text_mail:
                  type: string
                  description: "The new user's email address."
                text_name_first:
                  type: string
                  description: "The new user's first name."
                text_name_last:
                  type: string
                  description: "The new user's last name."
                text_phone:
                  type: string
                  description: "The new user's mobile phone number."
              required:
                - a_note
                - text_mail
                - text_name_first
                - text_name_last
                - text_phone
          description: |-
            Data to create new users.
            Specify this if `$uid` is empty.
            The data must contain the next keys:
        -
          name: is_walk_in
          in: query
          required: true
          schema:
            type: boolean
          description: 'If `true`, the client is a walk-in. Otherwise, this will be `false`.'
        -
          name: k_appointment
          in: query
          required: true
          schema:
            type: string
          description: |-
            The appointment key.
            Specify this to reschedule a certain appointment.
        -
          name: k_business
          in: query
          required: true
          schema:
            type: string
          description: 'The business key.'
        -
          name: k_location
          in: query
          required: true
          schema:
            type: string
          description: 'Location to show available appointment booking schedule.'
        -
          name: uid
          in: query
          required: true
          schema:
            type: string
          description: |-
            The user key.

            This field is used if the client books for himself or for the relative.

            This field is incorrect to use for guest booking since in this case the client will be checked as a relative.

            In case of a group booking or a guest booking, the key of the client who is making the booking is set here.
