                is_wait_list_unpaid:
                  type: boolean
                  description: 'If `true`, appointment waits unpaid.'
                k_login_prize:
                  type: string
                  description: "The user's prize."
                k_login_promotion:
                  type: string
                  description: |-
                    The user's pass (for example, a membership or a package).
