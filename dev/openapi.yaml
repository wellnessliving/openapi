          description: 'Successful response.'
          content:
            application/json:
              schema:
                type: object
                properties:
                  k_purchase:
                    type: string
                    description: |-
                      The ID of the purchase that was created during payment.
                      This value is only returned in cases where a purchase was created.
                      A new purchase is created when `id_pay_account_charge` equals [RsPayAccountChargeSid::AUTO](#/components/schemas/RsPayAccountChargeSid).
                required:
                  - k_purchase
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '404':
          $ref: '#/components/responses/404'
        '422':
          $ref: '#/components/responses/422'
        '500':
          $ref: '#/components/responses/500'
      summary: 'Refills the user account balance by the specified payment amount or adjusts it manually.'
      description: |-
        Accepts the payment amount, account key or user-and-business identifiers, charge mode, and payment form
        data. Processes the payment through the configured payment environment and returns the purchase key
        when a new purchase is created (for the automatic charge mode).
      tags:
        - Payments
      parameters:
        -
          $ref: '#/components/parameters/X-Error-Rules'
        -
          name: id_pay_account_charge
          in: query
          required: true
          schema:
            $ref: '#/components/schemas/RsPayAccountChargeSid'
          description: |-
            The account charge mode.

            One of the [RsPayAccountChargeSid](#/components/schemas/RsPayAccountChargeSid) constants.
        -
          name: is_staff
          in: query
          required: true
          schema:
            type: boolean
          description: 'If `true`, the account is filled by a staff member in the backend. Otherwise, this will be `false`.'
        -
          name: k_business
          in: query
          required: true
          schema:
            type: string
          description: |-
            The ID of the business the user account belongs to.

            This shouldn't be passed if a user account has already been created.
            In such cases, `k_pay_account` should be passed instead.

            If both the business ID and account ID passed, the system checks if the given business is the owner of the specified account.
        -
          name: k_pay_account
          in: query
          required: true
          schema:
            type: string
          description: |-
            The ID of the user account to refill.

            This may be 0 if a user account hasn't been created yet.
            In such cases, `k_business` and `uid` should be passed instead.

            If not passed, the currency of account equals the default business currency.
        -
          name: uid
          in: query
          required: true
          schema:
            type: string
          description: |-
            The ID of the user whose account is being refilled.

            This shouldn't be passed if a user account has already been created.
            In such cases, `k_pay_account` should be passed instead.

            If both the user ID and account ID passed, the system checks if the given user is the owner of the specified account.
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                a_pay_form:
                  type: array
                  items:
                    type: object
                    properties:
                      a_pay_card:
                        type: object
                        description: 'The payment card information:'
                        properties:
                          a_pay_address:
                            type: object
                            description: 'The payment address:'
                            properties:
                              is_new:
                                type: boolean
                                description: 'Set this value to `1` to add a new payment address or to `0` to use a saved payment address.'
                              k_geo_country:
                                type: string
                                description: 'The key of the country used for the payment address. Specify this to add a new address.'
                              k_geo_region:
                                type: string
                                description: 'The key of the region for the payment address. Specify this to add a new address.'
                              k_pay_address:
                                type: string
                                description: 'The key of the saved payment address. Specify this to use a saved address.'
                              s_city:
                                type: string
                                description: 'The city used for the payment address. Specify this to add a new address.'
                              s_name:
                                type: string
                                description: 'The card name. Specify this to add a new address.'
                              s_phone:
                                type: string
                                description: 'The payment phone. Specify this to add a new address.'
                              s_postal:
                                type: string
                                description: 'The postal code for the payment address. Specify this to add a new address.'
                              s_street1:
                                type: string
                                description: 'The payment address. Specify this to add a new address.'
                              s_street2:
                                type: string
                                description: 'The optional payment address. Specify this to add a new address.'
                            required:
                              - is_new
                          i_csc:
                            type: integer
                            format: int32
                            description: 'The credit card CSC. Specify this to add a new card.'
                          i_month:
                            type: integer
                            format: int32
                            description: 'The credit card expiration month. Specify this to add a new card.'
                          i_year:
                            type: integer
                            format: int32
                            description: 'The credit card expiration year. Specify this to add a new card.'
                          is_new:
                            type: boolean
                            description: 'Specify `1` to add a new card, or `0` to use a saved card.'
                          k_pay_bank:
                            type: string
                            description: 'The key of the credit card. Specify this to use saved card.'
                          s_comment:
                            type: string
                            description: 'Optional comment(s). Specify this to add a new card.'
                          s_number:
                            type: string
                            description: 'The card number. Specify this to add a new card.'
                        required:
                          - a_pay_address
                          - is_new
                      f_amount:
                        type: string
                        description: 'The amount of money to withdraw with this payment source.'
                      is_hide:
                        type: boolean
                        description: "Whether payment method should be saved to user's account."
                      is_save:
                        type: boolean
                        description: 'Determines whether this payment method is hidden.'
                      is_success:
                        type: boolean
                        description: 'Identifies whether this source was successfully charged.'
                      m_surcharge:
                        type: string
                        description: 'The client-side calculated surcharge.'
                      s_index:
                        type: string
                        description: 'The index of this form (optional).'
                      sid_pay_method:
                        type: string
                        description: 'The payment method ID.'
                    required:
                      - f_amount
                      - sid_pay_method
                id_mode:
                  $ref: '#/components/schemas/Wl.Mode.ModeSid'
                  description: 'The source mode key. One of the [ModeSid](#/components/schemas/Wl.Mode.ModeSid) constants.'
                m_amount:
                  type: string
                  description: 'The payment amount.'
                s_comment:
                  type: string
                  description: 'The transaction comment.'
              required:
                - a_pay_form
                - id_mode
                - m_amount
                - s_comment
      x-rate-limit:
        -
          limit: 200000
          period: 3600
