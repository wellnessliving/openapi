  /Wl/Profile/Attach/AttachList.json:
    get:
      operationId: Wl.Profile.Attach.AttachListApi.get
      responses:
        '200':
          description: 'Successful response.'
          content:
            application/json:
              schema:
                type: object
                properties:
                  a_list:
                    type: array
                    items:
                      type: object
                      properties:
                        dtu_create:
                          type: string
                          description: 'Date and time of creation in UTC MySQL format.'
                        dtu_edit:
                          type: string
                          description: 'Date and time of the last edit in UTC MySQL format.'
                        i_height:
                          type:
                            - integer
                            - 'null'
                          format: int32
                          description: 'Image height in pixels. `null` if not an image or dimensions are unavailable.'
                        i_show_delete:
                          type: integer
                          format: int32
                          description: |-
                            Flag indicating whether to show the delete button. `'1'` to show, `'0'` to hide.
                            Only present in backend mode.
                        i_width:
                          type:
                            - integer
                            - 'null'
                          format: int32
                          description: 'Image width in pixels. `null` if not an image or dimensions are unavailable.'
                        id_preview:
                          $ref: '#/components/schemas/Wl.Profile.Attach.AttachPreviewSid'
                          description: 'Preview type identifier. One of [AttachPreviewSid](#/components/schemas/Wl.Profile.Attach.AttachPreviewSid) constants.'
                        is_private:
                          type: boolean
                          description: |-
                            `true` if the attachment is private (not visible to the client); `false` otherwise.
                            Only present in backend mode.
                        k_attach:
                          type: string
                          description: 'Attachment key.'
                        k_business:
                          type: string
                          description: 'Business key.'
                        k_quiz_response:
                          type:
                            - string
                            - 'null'
                          description: |-
                            Quiz response key. `null` if the attachment is not from a quiz response.

                            Only present in backend mode.
                        text_description:
                          type:
                            - string
                            - 'null'
                          description: 'Attachment description. `null` if no description. Only present in backend mode.'
                        text_filename:
                          type: string
                          description: 'Attachment file name.'
                        text_filesize:
                          type: string
                          description: 'Human-readable file size (for example, "1.2 MB").'
                        text_filetype:
                          type: string
                          description: 'File extension in lowercase (for example, "pdf", "jpg").'
                        text_source:
                          type: string
                          description: |-
                            Source description (for example, quiz title or "Uploaded by staff").
                            Only present in backend mode.
                        text_uploaded_by:
                          type: string
                          description: 'Name of the user who uploaded the attachment. Empty string if unknown.'
                        text_uploaded_date:
                          type: string
                          description: 'Formatted upload date in the business locale.'
                        url_file:
                          type: string
                          description: 'URL to download the attachment file.'
                        url_preview:
                          type:
                            - string
                            - 'null'
                          description: 'URL to a preview image (50x50). `null` if preview is not available for this file type.'
                      required:
                        - dtu_create
                        - dtu_edit
                        - i_height
                        - i_show_delete
                        - i_width
                        - id_preview
                        - is_private
                        - k_attach
                        - k_business
                        - k_quiz_response
                        - text_description
                        - text_filename
                        - text_filesize
                        - text_filetype
                        - text_source
                        - text_uploaded_by
                        - text_uploaded_date
                        - url_file
                        - url_preview
                required:
                  - a_list
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '404':
          $ref: '#/components/responses/404'
        '422':
          $ref: '#/components/responses/422'
        '500':
          $ref: '#/components/responses/500'
      summary: 'Returns the list of file attachments for the specified client in the given business.'
      description: |-
        Returns all file attachments uploaded to the client's profile. In backend mode the result
         also includes private attachments that are hidden from the client-facing view, with
         additional metadata such as source, description, and a delete permission flag.
      tags:
        - Profile
      parameters:
        -
          $ref: '#/components/parameters/X-Error-Rules'
        -
          name: is_backend
          in: query
          required: true
          schema:
            type: boolean
          description: 'If `true`, the API is being used from backend. Otherwise, this will be `false`.'
        -
          name: k_business
          in: query
          required: true
          schema:
            type: string
          description: 'Business key.'
        -
          name: text_search
          in: query
          required: true
          schema:
            type: string
          description: 'The filter phrase to filter attach by name.'
        -
          name: uid
          in: query
          required: true
          schema:
            type: string
          description: 'Business key.'
      x-rate-limit:
        -
          limit: 200000
          period: 3600
