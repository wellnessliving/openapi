      summary: 'Resets the event list cache for the specified business and user.'
      description: |-
        Call this after modifying event data to force the next request to rebuild the schedule from the
        database. Can also conditionally reset without parameters if the caller determines a reset is needed.
      tags:
        - Events
      parameters:
        -
          $ref: '#/components/parameters/X-Error-Rules'
        -
          name: k_business
          in: query
          required: false
          schema:
            type:
              - string
              - 'null'
          description: |-
            The event business key to retrieve a list of all event sessions in business.

            `null` to retrieve events from `k_location`.
        -
          name: uid
          in: query
          required: false
          schema:
            type:
              - string
              - 'null'
          description: |-
            The user key.
            Required to apply specific user rules such as age restrictions.
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                is_cache_reset:
                  type: boolean
                  description: 'Model cache reset flag.'
              required:
                - is_cache_reset
      x-rate-limit:
        -
          limit: 200000
          period: 3600
