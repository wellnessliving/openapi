        -
          name: id_pay
          in: query
          required: true
          schema:
            $ref: '#/components/schemas/RsAppointmentPaySid'
          description: 'The payment type ID for the appointment. One of the [RsAppointmentPaySid](#/components/schemas/RsAppointmentPaySid) constants.'
        -
          name: is_walk_in
