                      The video level key.
                      This will be `0` if `All Levels` is selected.
                  s_preview_video_key:
                    type:
                      - string
                      - 'null'
                    description: |-
                      The string representation of the video's key.

                      This will be `null` if the video doesn't have a thumbnail image.
                  show_calorie:
                    type: boolean
                    description: 'If `false`, the calorie count for videos is hidden. Otherwise, this will be `true`.'
                  show_level:
                    type: boolean
                    description: 'If `false`, video levels are hidden. Otherwise, this will be `true`.'
                  show_view:
                    type: boolean
                    description: 'If `false`, the number of views for videos is hidden. Otherwise, this will be `true`.'
                  text_level_title:
                    type: string
                    description: 'The video level name.'
                  text_title:
                    type: string
                    description: 'The video name.'
                  url_thumbnail:
                    type: string
                    description: 'The URL of the video thumbnail.'
                  url_video:
                    type:
                      - string
                      - 'null'
                    description: |-
                      The URL of the video file.

                      This URL return with domain which you use when you call this API.
                      In case when you make request to local domain and video is
                      `is_converted` links in file will have global domain and for correct
                      work you must replace global domain to local.

                      Example for `videojs` player you can override method `beforeRequest`: <code>
                       videojs.Vhs.xhr.beforeRequest = function(options)
                       {
                         if (options.uri.startsWith('https://www.'))
                         {
                           options.uri = options.uri.replace('https://www.', 'https://us.');
                         }
                         return options;
                       }
                      </code>
                  url_video_direct:
                    type: string
                    description: 'The direct URL of the video.'
                  url_video_frame:
                    type: string
                    description: 'The direct URL of the video for iframe.'
                  xml_description:
                    type: string
                    description: 'The video description.'
