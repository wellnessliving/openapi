  /Wl/Book/Process/ProcessGroup.json:
    post:
      operationId: Wl.Book.Process.ProcessGroupApi.post
      responses:
        '200':
          description: 'Successful response.'
          content:
            application/json:
              schema:
                type: object
                properties:
                  a_book_error:
                    type: array
                    items:
                      type: object
                      properties:
                        text_code:
                          type: string
                          description: 'Error code identifying the type of error that occurred.'
                        text_message:
                          type: string
                          description: 'Human-readable error message describing the booking failure.'
                      required:
                        - text_code
                        - text_message
                  a_login_activity_book:
                    type: array
                    description: "Primary keys of users' activity that correspond to bookings made."
                    items:
                      type: string
                  a_visit:
                    type: array
                    description: 'Primary keys of bookings made.'
                    items:
                      type: string
                  k_login_activity_purchase:
                    type:
                      - string
                      - 'null'
                    description: |-
                      The key of the user's activity corresponding to the purchase made.
                      `null` if no purchase was made.
                required:
                  - a_book_error
                  - a_login_activity_book
                  - a_visit
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '404':
          $ref: '#/components/responses/404'
        '422':
          $ref: '#/components/responses/422'
        '500':
          $ref: '#/components/responses/500'
      summary: 'Processes the group booking: validates input, collects payment, books sessions, and sends confirmation emails.'
      description: |-
        Accepts a list of clients with their purchase items, resources, sessions, and quiz responses, then validates
        capacity and eligibility, processes payment for all clients at once, creates booking records, and dispatches
        confirmation emails. Returns visit keys, activity keys, and purchase activity key upon success.
      tags:
        - Booking
      parameters:
        -
          $ref: '#/components/parameters/X-Error-Rules'
        -
          name: dt_date_gmt
          in: query
          required: true
          schema:
            type: string
            format: date-time
          description: 'Date/time to which session is booked.'
        -
          name: id_mode
          in: query
          required: true
          schema:
            $ref: '#/components/schemas/Wl.Mode.ModeSid'
          description: 'The mode type. One of the [ModeSid](#/components/schemas/Wl.Mode.ModeSid) constants.'
        -
          name: is_backend
          in: query
          required: true
          schema:
            type: boolean
          description: |-
            `true` if action is performed as a staff member; `false` otherwise.

            If `true` is sent, access to the business and to the client will be checked.
            If `false` is sent, user can book only for himself or for relatives if this is allowed in business settings.
        -
          name: is_credit_card_check
          in: query
          required: true
          schema:
            type: boolean
          description: |-
            Checking whether the client has a credit card (if configured in the business) will be skipped if this flag is set to `false`.

            Use this field with caution.
            The final booking will not use this flag, and the check will still be performed.
        -
          name: k_class_period
          in: query
          required: true
          schema:
            type: string
          description: 'Key of session which is booked.'
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                a_client:
                  type: array
                  items:
                    type: object
                    properties:
                      a_event_session:
                        type: object
                        description: |-
                          List of event sessions to book. Required for only for event that allows to select sessions to book.
                              Each element has next keys:
                        properties:
                          dtu_date:
                            type: string
                            description: 'Session date/time.'
                          k_class_period:
                            type: string
                            description: 'Session key.'
                        required:
                          - dtu_date
                          - k_class_period
                      a_purchase_item:
                        type: object
                        description: 'Purchase option information. Required if the service requires online payment. Elements have next keys:'
                        properties:
                          i_count:
                            type: integer
                            format: int32
                            description: 'Number of options to purchase. Specify only if you want to pay a class booking by Drop-In.'
                          id_purchase_item:
                            $ref: '#/components/schemas/RsPurchaseItemSid'
                            description: |-
                              Kind of option to purchase. One of [RsPurchaseItemSid](#/components/schemas/RsPurchaseItemSid) constants.
                                       Specify only if you want to purchase a new option.
                          is_renew:
                            type: boolean
                            description: |-
                              `true` if you want to enable auto-renewal for new purchase option. `false` otherwise.
                                       Specify only if you want to purchase a new option.
                          is_owner:
                            type: boolean
                            description: |-
                              `true` if client is owner of this purchase option.
                                       This means that this purchase option will be purchased for this client, even if another client
                                       can share a similar purchase option.
                          k_id:
                            type: string
                            description: 'Specify only if you want to purchase a new option.'
                          k_login_prize:
                            type: string
                            description: "Specify if you want to pay by user's prize."
                          k_reward_prize:
                            type: string
                            description: 'Specify if you want to redeem a prize for payment.'
                          s_signature:
                            type: string
                            description: |-
                              Signature of the client in base64 format.
                                       Specify only if you want to buy a purchase option that requires signature.
                      a_quiz_response:
                        type: array
                        description: |-
                          Answers for questions.
                              Required if the service requires answers for questions.
                              Keys are quiz keys. 
                              Values are response keys. 
                              Or the `skip` to skip the quiz.
                        items:
                          type: string
                      a_repeat:
                        type: object
                        description: |-
                          Recurring booking configuration:
                              
                              You can test this key only in a case of `1` client.
                        properties:
                          a_day:
                            type: array
                            description: |-
                              The days of week when the session repeats. One of the [ADateWeekSid](#/components/schemas/ADateWeekSid) constants.
                                  Should be passed for any type of repetition.
                            items:
                              type: integer
                              format: int32
                          dt_from:
                            type: string
                            description: |-
                              Date to start recurring booking.
                                  Expected for `id_repeat_end` = [RsRepeatEndSid::DATE](#/components/schemas/RsRepeatEndSid).
                          dt_to:
                            type: string
                            description: |-
                              Date to complete recurring booking.
                                  Expected for `id_repeat_end` = [RsRepeatEndSid::DATE](#/components/schemas/RsRepeatEndSid).
                          i_count:
                            type: integer
                            format: int32
                            description: |-
                              The number of occurrences after which the appointment's repeat cycle stops.
                                   Should be empty if the repeat cycle doesn't stop after a certain number of occurrences.
                                   Expected for `id_repeat_end` = [RsRepeatEndSid::COUNT](#/components/schemas/RsRepeatEndSid).
                          i_duration:
                            type: integer
                            format: int32
                            description: 'Count of days\weeks\months between recurring bookings.'
                          id_duration:
                            $ref: '#/components/schemas/ADurationSid'
                            description: |-
                              The measurement unit of `i_duration`. One of the [ADurationSid](#/components/schemas/ADurationSid) constants.
                                  Available duration units are: [ADurationSid::DAY](#/components/schemas/ADurationSid), [ADurationSid::WEEK](#/components/schemas/ADurationSid), [ADurationSid::MONTH](#/components/schemas/ADurationSid).
                          id_repeat_end:
                            $ref: '#/components/schemas/RsRepeatEndSid'
                            description: 'Possible ways to stop repeatable events. One of the [RsRepeatEndSid](#/components/schemas/RsRepeatEndSid) constants.'
                        required:
                          - a_day
                          - i_duration
                          - id_duration
                          - id_repeat_end
                      a_resource:
                        type: object
                        description: 'Asset information. Required if the service requires asset booking. Each element has next keys:'
                        properties:
                          i_index:
                            type: integer
                            format: int32
                            description: 'Order number of the asset.'
                          k_resource:
                            type: string
                            description: 'Asset key.'
                        required:
                          - i_index
                          - k_resource
                      k_login_promotion:
                        type: string
                        description: |-
                          Login promotion key.
                              Specify only if you want to pay by already purchased option.
                      k_login_promotion_guest_pass:
                        type: string
                        description: |-
                          Guest pass login promotion key.
                              Specify only if you want to pay with guest pass granted by this login promotion.
                      k_session_pass:
                        type: string
                        description: 'Session pass to be used to book a session.'
                      uid:
                        type: string
                        description: 'User key.'
                    required:
                      - uid
                a_pay_form:
                  type: array
                  items:
                    type: object
                    properties:
                      a_pay_card:
                        type: object
                        description: 'The payment card information:'
                        properties:
                          a_pay_address:
                            type: object
                            description: 'The payment address:'
                            properties:
                              is_new:
                                type: boolean
                                description: 'Set this value to `1` to add a new payment address or to `0` to use a saved payment address.'
                              k_geo_country:
                                type: string
                                description: 'The key of the country used for the payment address. Specify this to add a new address.'
                              k_geo_region:
                                type: string
                                description: 'The key of the region for the payment address. Specify this to add a new address.'
                              k_pay_address:
                                type: string
                                description: 'The key of the saved payment address. Specify this to use a saved address.'
                              s_city:
                                type: string
                                description: 'The city used for the payment address. Specify this to add a new address.'
                              s_name:
                                type: string
                                description: 'The card name. Specify this to add a new address.'
                              s_phone:
                                type: string
                                description: 'The payment phone. Specify this to add a new address.'
                              s_postal:
                                type: string
                                description: 'The postal code for the payment address. Specify this to add a new address.'
                              s_street1:
                                type: string
                                description: 'The payment address. Specify this to add a new address.'
                              s_street2:
                                type: string
                                description: 'The optional payment address. Specify this to add a new address.'
                            required:
                              - is_new
                          i_csc:
                            type: integer
                            format: int32
                            description: 'The credit card CSC. Specify this to add a new card.'
                          i_month:
                            type: integer
                            format: int32
                            description: 'The credit card expiration month. Specify this to add a new card.'
                          i_year:
                            type: integer
                            format: int32
                            description: 'The credit card expiration year. Specify this to add a new card.'
                          is_new:
                            type: boolean
                            description: 'Specify `1` to add a new card, or `0` to use a saved card.'
                          k_pay_bank:
                            type: string
                            description: 'The key of the credit card. Specify this to use saved card.'
                          s_comment:
                            type: string
                            description: 'Optional comment(s). Specify this to add a new card.'
                          s_number:
                            type: string
                            description: 'The card number. Specify this to add a new card.'
                        required:
                          - a_pay_address
                          - is_new
                      f_amount:
                        type: string
                        description: 'The amount of money to withdraw with this payment source.'
                      is_hide:
                        type: boolean
                        description: "Whether payment method should be saved to user's account."
                      is_save:
                        type: boolean
                        description: 'Determines whether this payment method is hidden.'
                      is_success:
                        type: boolean
                        description: 'Identifies whether this source was successfully charged.'
                      m_surcharge:
                        type: string
                        description: 'The client-side calculated surcharge.'
                      s_index:
                        type: string
                        description: 'The index of this form (optional).'
                      sid_pay_method:
                        type: string
                        description: 'The payment method ID.'
                    required:
                      - f_amount
                      - sid_pay_method
                is_force_pay_later:
                  type: boolean
                  description: |-
                    `true` if user pressed 'Pay later'.
                    `false` if user pressed 'Pay now'.
                k_pay_installment_template:
                  type:
                    - string
                    - 'null'
                  description: |-
                    The installment template primary key.
                    `null` to not use installment template.
                text_discount_code:
                  type: string
                  description: 'The discount code to be applied to the purchase.'
              required:
                - a_client
                - a_pay_form
                - is_force_pay_later
                - text_discount_code
      x-rate-limit:
        -
          limit: 200000
          period: 3600
