      summary: 'Returns the list of events matching the specified filter parameters.'
      description: |-
        Used to display the event schedule on business and location pages. Supports filtering by location,
        date range, staff, and booking status. Results are cached per business and user context; the cache
        is invalidated automatically when events are modified.
      tags:
        - Events
      parameters:
        -
          $ref: '#/components/parameters/X-Error-Rules'
        -
          name: a_class_filter
          in: query
          required: false
          schema:
            type:
              - array
              - 'null'
            items:
              type: string
          description: 'List of class keys applied by filter.'
        -
          name: a_day
          in: query
          required: false
          schema:
            type:
              - array
              - 'null'
            items:
              $ref: '#/components/schemas/ADateWeekSid'
          description: 'List of day the week applied by filter [ADateWeekSid](#/components/schemas/ADateWeekSid).'
        -
          name: a_enrollment_block_filter
          in: query
          required: false
          schema:
            type:
              - array
              - 'null'
            items:
              type: string
          description: 'List of enrollment blocks keys applied by filter.'
        -
          name: a_location
          in: query
          required: false
          schema:
            type:
              - array
              - 'null'
            items:
              type: string
          description: 'List of location keys applied by filter.'
        -
          name: a_staff
          in: query
          required: false
          schema:
            type:
              - array
              - 'null'
            items:
              type: string
          description: 'List of staff keys applied by filter.'
        -
          name: a_time
          in: query
          required: false
          schema:
            type:
              - array
              - 'null'
            items:
              $ref: '#/components/schemas/RsScheduleTimeSid'
          description: 'List of time day applied by filter [RsScheduleTimeSid](#/components/schemas/RsScheduleTimeSid).'
        -
          name: a_virtual
          in: query
          required: false
          schema:
            type:
              - array
              - 'null'
            items:
              type: string
          description: |-
            List of IDs to include/exclude virtual events.
            If the only ID is [YesNoSid::YES](#/components/schemas/Core.Sid.YesNoSid), only virtual events are included.
            If the only ID is [YesNoSid::NO](#/components/schemas/Core.Sid.YesNoSid), only in-person events are included.
            Otherwise, no filtering is done.
        -
          name: dl_end
          in: query
          required: false
          schema:
            type:
              - string
              - 'null'
            format: date
          description: |-
            The end date of the range from which a list of events should be retrieved.

            `null` if the range has no end date.
        -
          name: dl_start
          in: query
          required: false
          schema:
            type:
              - string
              - 'null'
            format: date
          description: |-
            The start date of the range from which a list of events should be retrieved.

            `null` if the range has no start date.
        -
          name: id_flag
          in: query
          required: true
          schema:
            $ref: '#/components/schemas/AFlagSid'
          description: |-
            Defines how the event availability flag filter should be applied.

            One of [AFlagSid](#/components/schemas/AFlagSid) constants.

            * [AFlagSid::ON](#/components/schemas/AFlagSid) to show only available events.
            * [AFlagSid::OFF](#/components/schemas/AFlagSid) to show only unavailable events.
            * [AFlagSid::ALL](#/components/schemas/AFlagSid) to show all events (available and unavailable).
        -
          name: is_backend
          in: query
          required: true
          schema:
            type: boolean
          description: 'Determines whether the endpoint is used for backend mode.'
        -
          name: is_ignore_requirement
          in: query
          required: true
          schema:
            type: boolean
          description: '`true` to show even event restricted by booking policies; `false` to show available events only.'
        -
          name: is_tab_all
          in: query
          required: true
          schema:
            type: boolean
          description: |-
            Determines whether you need to retrieve a list of event sessions regardless of the tab specified in `k_class_tab`.

            * `true` - retrieves a list regardless of the specified tab.
            * `false` - retrieves a list only for the specific tab.
        -
          name: k_business
          in: query
          required: false
          schema:
            type:
              - string
              - 'null'
          description: |-
            The event business key to retrieve a list of all event sessions in business.

            `null` to retrieve events from `k_location`.
        -
          name: k_class
          in: query
          required: false
          schema:
            type:
              - string
              - 'null'
          description: |-
            The event class key to retrieve a list of all event sessions of a specific class.
            `null` to retrieve a list of event sessions of all classes.
        -
          name: k_class_tab
          in: query
          required: true
          schema:
            type: string
          description: |-
            The class tab key to retrieve a list of event sessions from a specific tab only.
            An empty value to retrieve a list of event sessions that don't belong to any tab.

            Will be ignored in next cases:
            * `k_skin` specified.
            * `is_tab_all` is `true`.
        -
          name: k_location
          in: query
          required: false
          schema:
            type:
              - string
              - 'null'
          description: |-
            The event location key to retrieve a list of all event sessions in a specific location.

            Required if `k_business` isn't specified.
            `null` if you need to retrieve a list of event sessions in all locations of `k_business`.
        -
          name: k_skin
          in: query
          required: true
          schema:
            type: string
          description: |-
            The skin key if an event list is used for widget mode.

            `k_class_tab` will be ignored for widget mode.
        -
          name: text_search
          in: query
          required: true
          schema:
            type: string
          description: 'Search string to filter events by name.'
        -
          name: uid
          in: query
          required: false
          schema:
            type:
              - string
              - 'null'
          description: |-
            The user key.
            Required to apply specific user rules such as age restrictions.
      x-rate-limit:
        -
          limit: 200000
          period: 3600
    put:
