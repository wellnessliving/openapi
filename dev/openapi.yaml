                      The appointment key.
                      This will be set only if the visit is an appointment.

                      If the visit is a class or event, this will be `null`.
                  k_class:
                    type:
                      - string
                      - 'null'
                    description: |-
                      The class key. This will be set only if the visit is a class or an event.
