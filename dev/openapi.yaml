                    `0` if not specified.
                id_lead_source:
                  $ref: '#/components/schemas/Wl.Mode.ModeSid'
                  description: |-
                    Lead source ID.

                    One of the [ModeSid](#/components/schemas/Wl.Mode.ModeSid) constants.
                    `0` if not specified.
                id_vaccination_status:
                  $ref: '#/components/schemas/Wl.Login.Member.VaccinationStatus.VaccinationStatusSid'
                  description: |-
                    Vaccination status ID.

