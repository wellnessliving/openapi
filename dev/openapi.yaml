  /Wl/Integration/Autymate/Report.json:
    get:
      operationId: Wl.Integration.Autymate.ReportApi.get
      responses:
        '200':
          description: 'Successful response.'
          content:
            application/json:
              schema:
                type: object
                properties:
                  a_field:
                    type: array
                    description: |-
                      The list of fields in this report.

                      This array is effectively a title row for table that is returned in `a_row`.
                    items:
                      type: string
                  a_row:
                    type: array
                    description: |-
                      The report data.

                      This is an indexed array in which one row is an indexed array also.

                      Indexes of the columns correspond to columns in `a_field`.
                    items:
                      type: array
                      items:
                        type: string
                  a_warning:
                    type: array
                    description: 'The warning list of the report, if applicable.'
                    items:
                      type: string
                  dtu_complete:
                    type:
                      - string
                      - 'null'
                    format: date-time
                    description: |-
                      The date and time when this report has completed generation.

                      `null` if generation of this report isn't completed.
                  dtu_queue:
                    type:
                      - string
                      - 'null'
                    format: date-time
                    description: |-
                      The date and time when this report was put in the generation queue.

                      Effectively, this is the time when a user clicked to view this report or the report for this day was first called.
                  dtu_start:
                    type:
                      - string
                      - 'null'
                    format: date-time
                    description: |-
                      The date and time when generation of this report was started.

                      `null` if generation of this report hasn't started.
                  id_report_status:
                    $ref: '#/components/schemas/Wl.Report.Generator.ReportGeneratorStatusSid'
                    description: |-
                      The status of the report.

                      One of the [ReportGeneratorStatusSid](#/components/schemas/Wl.Report.Generator.ReportGeneratorStatusSid) constants.
                  is_more:
                    type: boolean
                    description: 'If `true` then there are more report rows to get. Otherwise, `false` if all rows have been sent.'
                  is_report_complete:
                    type: boolean
                    description: |-
                      Determines whether this report is complete. If this report is accessed on the current day, or is returning
                      a result that was cached on the current day it could be incomplete as not all the transactions for the day
                      are present.

                      If `true` then this report will be complete.

                      If `false` then this report could be incomplete.
                required:
                  - a_field
                  - a_row
                  - a_warning
                  - id_report_status
                  - is_more
                  - is_report_complete
