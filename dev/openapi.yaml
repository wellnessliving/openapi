  /Wl/Catalog/Cart/Cart.json:
    get:
      operationId: Wl.Catalog.Cart.CartApi.get
      responses:
        '200':
          description: 'Successful response.'
          content:
            application/json:
              schema:
                type: object
                properties:
                  a_discount_item:
                    type: array
                    description: |-
                      The list of discounts for each item.

                      Keys refer to unique item keys, and values refer to discount amounts for the item.
                    items:
                      type: string
                  a_item:
                    type: array
                    items:
                      type: object
                      properties:
                        dl_client_prorate:
                          type: string
                          description: "The client prorate date. This will be `null` in cases where the client prorate date hasn't passed."
                        i_quantity:
                          type: integer
                          format: int32
                          description: 'The quantity of sale items.'
                        id_sale:
                          $ref: '#/components/schemas/RsSaleSid'
                          description: 'The sale item type, one of the [RsSaleSid](#/components/schemas/RsSaleSid) constants.'
                        k_id:
                          type: string
                          description: |-
                            The sale item key.
                              Note:
                                 
                                 You need to specify the product option key in the `k_shop_product_option` field or the first available
                                     option will be used automatically.
                        k_login_prize:
                          type:
                            - string
                            - 'null'
                          description: 'Key of login prize used on item.'
                        k_shop_product_option:
                          type: string
                          description: |-
                            Note:
                                 Used for products only `id_sale` = [RsSaleSid::PRODUCT](#/components/schemas/RsSaleSid).
                                 If empty the first available option will be used automatically.
                      required:
                        - dl_client_prorate
                        - i_quantity
                        - id_sale
                        - k_id
                  a_prize_propose:
                    type: array
                    items:
                      type: object
                      properties:
                        i_score:
                          type: integer
                          format: int32
                          description: 'Amount of points needed to redeem the prize.'
                        k_reward_prize:
                          type: string
                          description: 'Reward prize key.'
                        text_discount:
                          type: string
                          description: "Reward prize discount, e.g. '$10.00 off', '10% off'."
                        text_title:
                          type: string
                          description: "Reward prize title, e.g. 'on any item', 'on Water bottle', 'on any Appointment Pass or Membership Purchase Option'."
                      required:
                        - i_score
                        - k_reward_prize
                        - text_discount
                        - text_title
                  a_reward_item:
                    type: array
                    items:
                      type: object
                      properties:
                        i_quantity:
                          type: integer
                          format: int32
                          description: 'The quantity of sale items.'
                        id_sale:
                          $ref: '#/components/schemas/RsSaleSid'
                          description: 'The sale item type, one of the [RsSaleSid](#/components/schemas/RsSaleSid) constants.'
                        is_login_prize_used:
                          type: boolean
                          description: 'Whether selected login prize discount applied to item.'
                        k_id:
                          type: string
                          description: 'The sale item key.'
                        k_shop_product_option:
                          type: string
                          description: 'The shop product option. If `null`, the sale item has no options.'
                      required:
                        - i_quantity
                        - id_sale
                        - is_login_prize_used
                        - k_id
                        - k_shop_product_option
                  a_reward_propose:
                    type: array
                    items:
                      type: object
                      properties:
                        k_login_prize:
                          type: string
                          description: 'Login prize key.'
                        text_discount:
                          type: string
                          description: "Reward prize discount, e.g. '$10.00 off', '10% off'."
                        text_discount_applied:
                          type: string
                          description: "Applied login prize discount title, e.g. '10% discount'."
                        text_discount_purpose:
                          type: string
                          description: "Purpose login prize discount title, e.g. 'Apply 10% off'."
                        text_title:
                          type: string
                          description: "Reward prize title, e.g. 'on any item', 'on Water bottle', 'on any Appointment Pass or Membership Purchase Option'."
                      required:
                        - k_login_prize
                        - text_discount
                        - text_discount_applied
                        - text_discount_purpose
                        - text_title
                  a_tax_list:
                    type: array
                    description: |-
                      Values derived for individual tax rates.

                      Keys refer to tax keys, values refer to the amount of tax in the cart.
                    items:
                      type: string
                  i_score:
                    type:
                      - integer
                      - 'null'
                    format: int32
                    description: "Amount of client's reward points."
                  m_discount:
                    type:
                      - string
                      - 'null'
                    description: |-
                      The full discount of the cart.

                      If `null`, the discount isn't calculated yet.
                  m_discount_total:
                    type: string
                    description: 'The total discount amount.'
                  m_subtotal:
                    type:
                      - string
                      - 'null'
                    description: |-
                      The total amount in the catalog cart without tax.

                      If `null`, the total amount isn't set yet.
                  m_tax:
                    type:
                      - string
                      - 'null'
                    description: |-
                      The tax amount.

                      If `null`, the tax amount isn't set yet.
                  m_tip_purchase:
                    type:
                      - string
                      - 'null'
                    description: 'The amount of appointment tips.'
                  m_total:
                    type:
                      - string
                      - 'null'
                    description: |-
                      The total amount in the catalog cart.

                      If `null`, the total amount isn't set yet.
                required:
                  - a_discount_item
                  - a_item
                  - a_prize_propose
                  - a_reward_item
                  - a_reward_propose
                  - a_tax_list
                  - m_discount_total
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '404':
          $ref: '#/components/responses/404'
        '422':
          $ref: '#/components/responses/422'
        '500':
          $ref: '#/components/responses/500'
      summary: 'Gets purchase cost data.'
      description: |-
        Used in the client-facing checkout flow to show a live price summary before the client submits
        payment. Calculates the full breakdown - subtotal, taxes, applied discounts, reward redemptions,
        and tips - so the client can review the total before confirming.
      tags:
        - Catalog
      parameters:
        -
          $ref: '#/components/parameters/X-Error-Rules'
        -
          name: a_item
          in: query
          required: true
          schema:
            type: array
            items:
              type: object
              properties:
                dl_client_prorate:
                  type: string
                  description: "The client prorate date. This will be `null` in cases where the client prorate date hasn't passed."
                i_quantity:
                  type: integer
                  format: int32
                  description: 'The quantity of sale items.'
                id_sale:
                  $ref: '#/components/schemas/RsSaleSid'
                  description: 'The sale item type, one of the [RsSaleSid](#/components/schemas/RsSaleSid) constants.'
                k_id:
                  type: string
                  description: |-
                    The sale item key.
                      Note:
                         
                         You need to specify the product option key in the `k_shop_product_option` field or the first available
                             option will be used automatically.
                k_login_prize:
                  type:
                    - string
                    - 'null'
                  description: 'Key of login prize used on item.'
                k_shop_product_option:
                  type: string
                  description: |-
                    Note:
                         Used for products only `id_sale` = [RsSaleSid::PRODUCT](#/components/schemas/RsSaleSid).
                         If empty the first available option will be used automatically.
              required:
                - dl_client_prorate
                - i_quantity
                - id_sale
                - k_id
          description: 'The list of items in the cart.'
        -
          name: is_auto_apply_prize
          in: query
          required: true
          schema:
            type: boolean
          description: 'Whether selected login prize should be auto applied to first applicable item.'
        -
          name: k_location
          in: query
          required: true
          schema:
            type: string
          description: 'The location key.'
        -
          name: k_login_prize
          in: query
          required: true
          schema:
            type: string
          description: 'The login prize key.'
        -
          name: text_discount_code
          in: query
          required: false
          schema:
            type:
              - string
              - 'null'
          description: |-
            The discount code.

            If `null`, the discount code has been reset.
        -
          name: uid
          in: query
          required: true
          schema:
            type: string
          description: |-
            The user key.

            This will be `0` for guests.
      x-rate-limit:
        -
          limit: 200000
          period: 3600
  /Wl/Catalog/Cart/LimitQuantity.json:
    get:
      operationId: Wl.Catalog.Cart.LimitQuantityApi.get
      responses:
        '200':
          description: 'Successful response.'
          content:
            application/json:
              schema:
                type: object
                properties:
                  i_purchase_already:
                    type:
                      - integer
                      - 'null'
                    format: int32
                    description: |-
                      The quantity if promotions have already been purchased by the current user.

                      If `true`, the quantity exceeded. Otherwise, this will be `false`.

                      This will be `null` if not set yet, there's no limit quantity, or the limit quantity isn't exceeded.
                  i_purchase_current:
                    type:
                      - integer
                      - 'null'
                    format: int32
                    description: |-
                      The current quantity of a promotion with the quantity limit in the cart.

                      This will be `null` if not set yet, there's no limit quantity, or the limit quantity isn't exceeded.
                  i_quantity_limit:
                    type:
                      - integer
                      - 'null'
                    format: int32
                    description: |-
                      The quantity limit of the promotion.

                      This will be `null` if not set yet or if there's no limit quantity.
                  is_limit_exceeded:
                    type:
                      - boolean
                      - 'null'
                    description: |-
                      Determines whether the limit quantity has been exceeded.

                      If `true`, the limit quantity has been exceeded. Otherwise, this will be `false`.

                      This will be `null` if not set yet.
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '404':
          $ref: '#/components/responses/404'
        '422':
          $ref: '#/components/responses/422'
        '500':
          $ref: '#/components/responses/500'
      summary: 'Checks limit quantity and whether a promotion can be added to the cart.'
      description: |-
        Used in the checkout flow to prevent a client from purchasing more passes than the promotion allows.
        Returns the limit, how many the client has already bought, and how many are currently in the cart so
        the UI can display a clear message if the limit would be exceeded.
      tags:
        - Catalog
      parameters:
        -
          $ref: '#/components/parameters/X-Error-Rules'
        -
          name: a_item
          in: query
          required: true
          schema:
            type: array
            items:
              type: object
              properties:
                i_quantity:
                  type: integer
                  format: int32
                  description: 'The quantity of sale items.'
                id_sale:
                  $ref: '#/components/schemas/RsSaleSid'
                  description: 'The sale item type. One of the [RsSaleSid](#/components/schemas/RsSaleSid) constants.'
                k_id:
                  type: string
                  description: 'The sale item ID.'
                k_shop_product_option:
                  type: string
                  description: 'The shop product option. `null` if the sale item has no options.'
              required:
                - i_quantity
                - id_sale
                - k_id
                - k_shop_product_option
          description: 'The cart items list with the next structure:'
        -
          name: k_business
          in: query
          required: true
          schema:
            type: string
          description: 'The business in which the purchase will be made.'
        -
          name: k_promotion
          in: query
          required: true
          schema:
            type: string
          description: 'The promotion key to add to the cart.'
        -
          name: uid
          in: query
          required: true
          schema:
            type: string
          description: 'The user key.'
      x-rate-limit:
        -
          limit: 200000
          period: 3600
  /Wl/Promotion/Index/PromotionIndex.json:
    get:
      operationId: Wl.Promotion.Index.PromotionIndexApi.get
      responses:
        '200':
          description: 'Successful response.'
          content:
            application/json:
              schema:
                type: object
                properties:
                  a_promotion:
                    type: array
                    items:
                      type: object
                      properties:
                        a_access:
                          type: object
                          description: 'Information about services that can be attended with this pass or membership.'
                          properties:
                            a_class:
                              type: object
                              description: 'A list of available classes.'
                              properties:
                                k_class:
                                  type: string
                                  description: 'Key of the class.'
                              required:
                                - k_class
                            a_event:
                              type: object
                              description: 'A list of available events.'
                              properties:
                                k_class:
                                  type: string
                                  description: 'Key of the event.'
                              required:
                                - k_class
                            a_resource:
                              type: object
                              description: 'A list of available assets.'
                              properties:
                                k_resource:
                                  type: string
                                  description: 'Key of the asset.'
                              required:
                                - k_resource
                            a_service:
                              type: object
                              description: 'A list of available appointment types.'
                              properties:
                                k_service:
                                  type: string
                                  description: 'Key of the appointment type.'
                              required:
                                - k_service
                            is_class_all:
                              type: boolean
                              description: |-
                                If `true`, any class in the business can be visited with this Purchase Option. If `false`, only selected classes can be visited.
                                Selected classes can be found in the list of available classes and events.
                            is_event_all:
                              type: boolean
                              description: |-
                                If `true`, if any event in the business can be visited with this Purchase Option. If `false`, if only selected events can be visited.
                                Selected events can be found in the list of available classes and events.
                          required:
                            - a_class
                            - a_event
                            - a_resource
                            - a_service
                            - is_class_all
                            - is_event_all
                        a_component:
                          type: object
                          description: |-
                            A list of components included in the Purchase Option if this Purchase Option is a package.
                            If it's not a package, the list will be always empty.
                            If it's a package, the list can still be empty if all its components were deactivated.
                            This means that this array can't be used to determine whether this is a package or not (check `id_program` or `id_program_type`
                            value instead).
                            There can be three types of components: events, Purchase Options, and products.
                            Some fields can be different depending on type of the component, but each element of the array includes:
                          properties:
                            id_purchase_item:
                              $ref: '#/components/schemas/RsPurchaseItemSid'
                              description: |-
                                The type of the component.
                                 One of [RsPurchaseItemSid](#/components/schemas/RsPurchaseItemSid) constants.
                                 This can only be: <ul>
                                     <li>[RsPurchaseItemSid::ENROLLMENT](#/components/schemas/RsPurchaseItemSid)</li>
                                     <li>[RsPurchaseItemSid::PROMOTION](#/components/schemas/RsPurchaseItemSid)</li>
                                     <li>[RsPurchaseItemSid::PRODUCT](#/components/schemas/RsPurchaseItemSid)</li>
                                 </ul>
                            k_id:
                              type: string
                              description: |-
                                The primary key of the component in the related table. This depends on the type of the component.
                                The key of the event for [RsPurchaseItemSid::ENROLLMENT](#/components/schemas/RsPurchaseItemSid), the key of the Purchase Option for the
                                [RsPurchaseItemSid::PROMOTION](#/components/schemas/RsPurchaseItemSid), the key of the product option for the [RsPurchaseItemSid::PRODUCT](#/components/schemas/RsPurchaseItemSid).
                                Full information about events can be taken from the [EventListApi](/Wl/Event/EventList.json). Purchase Options from the [PromotionIndexApi](/Wl/Promotion/Index/PromotionIndex.json).
                                Full information about products are not available at this moment though API.
                            i_quantity:
                              type: integer
                              format: int32
                              description: 'The quantity. If empty, it means the quantity is 1.'
                            text_title:
                              type: string
                              description: 'The name of the component.'
                          required:
                            - id_purchase_item
                            - k_id
                            - i_quantity
                            - text_title
                        a_image:
                          type: object
                          description: |-
                            This will be an empty array if the Purchase Option doesn't have image.
                            Otherwise, this will display the following information about the Purchase Option image:
                          properties:
                            i_height:
                              type: string
                              description: 'The height of the image.'
                            i_width:
                              type: string
                              description: 'The width of the image.'
                            url-thumbnail:
                              type: string
                              description: 'The link to the image.'
                          required:
                            - i_height
                            - i_width
                            - url-thumbnail
                        a_visit_limit:
                          type: object
                          description: |-
                            Attendance restrictions, if available. If unavailable, this will be an empty array. Every element has a key, which is a type of
                            the time period [ADurationSid::DAY](#/components/schemas/ADurationSid), [ADurationSid::WEEK](#/components/schemas/ADurationSid), [ADurationSid::MONTH](#/components/schemas/ADurationSid),
                            [ADurationSid::YEAR](#/components/schemas/ADurationSid).
                            The values are:
                          properties:
                            i_limit:
                              type: integer
                              format: int32
                              description: 'The quantity of sessions every `i_period`.'
                            i_period:
                              type: integer
                              format: int32
                              description: 'The duration of the time period. This depends on a key of `a_visit_limit` array.'
                            i_roll_over_cap:
                              type: integer
                              format: int32
                              description: 'The limit number of rollover sessions.'
                            i_roll_over_expire:
                              type: integer
                              format: int32
                              description: 'The duration of the time period after which rolled over session will expire.'
                            id_roll_over_expire:
                              $ref: '#/components/schemas/ADurationSid'
                              description: |-
                                The type of `i_roll_over_expire`.
                                One of [ADurationSid](#/components/schemas/ADurationSid) contantant.
                                This can only be: <ul>
                                    <li>[ADurationSid::DAY](#/components/schemas/ADurationSid)</li>
                                    <li>[ADurationSid::WEEK](#/components/schemas/ADurationSid)</li>
                                    <li>[ADurationSid::MONTH](#/components/schemas/ADurationSid)</li>
                                    <li>[ADurationSid::YEAR](#/components/schemas/ADurationSid)</li>
                                </ul>
                            id_limit_cycle:
                              $ref: '#/components/schemas/Wl.Promotion.Edit.Limit.Cycle.Sid'
                              description: 'The type of the limit cycle [Sid](#/components/schemas/Wl.Promotion.Edit.Limit.Cycle.Sid).'
                            is_reconcile_visit:
                              type: boolean
                              description: 'Determines whether to reconcile unpaid sessions on restrictions reset.'
                            is_roll_over_expire:
                              type: boolean
                              description: 'Determines if the rolled over session is expired.'
                            is_roll_over_renew:
                              type: boolean
                              description: 'Determines whether to rollover sessions upon auto-renew.'
                            is_rollup:
                              type: boolean
                              description: 'Determines Whether to rollover sessions.'
                            is_visit_conversion:
                              type: boolean
                              description: 'Determines whether to convert remaining visits.'
                          required:
                            - i_limit
                            - i_period
                            - i_roll_over_cap
                            - i_roll_over_expire
                            - id_roll_over_expire
                            - id_limit_cycle
                            - is_reconcile_visit
                            - is_roll_over_expire
                            - is_roll_over_renew
                            - is_rollup
                            - is_visit_conversion
                        dl_expire:
                          type: string
                          description: |-
                            The local expiration date. This is the last day of the Purchase Option's active status.
                            This is used only for the 'Expires on a certain date' duration type. Otherwise, this should be ignored.
                        i_duration:
                          type: integer
                          format: int32
                          description: |-
                            The number of periods for the "Period" duration type.
                            For example, if the duration of the Purchase Option is 12 months, this field will be 12.
                        i_limit:
                          type: integer
                          format: int32
                          description: |-
                            The number of visits that the owner of the Purchase Option can use.
                            This will be `0` if the Purchase Option has unlimited visits.
                        i_limit_duration:
                          type: integer
                          format: int32
                          description: 'The maximum number of minutes or hours depending on `id_limit_duration` that the current promotion can be used in.'
                        id_limit_duration:
                          $ref: '#/components/schemas/ADurationSid'
                          description: |-
                            The type of `i_limit_duration`.
                            One of [ADurationSid](#/components/schemas/ADurationSid) contantant.
                            This can only be: <ul>
                                <li>[ADurationSid::MINUTE](#/components/schemas/ADurationSid)</li>
                                <li>[ADurationSid::HOUR](#/components/schemas/ADurationSid)</li>
                                <li>[ADurationSid::MONTH](#/components/schemas/ADurationSid)</li>
                                <li>[ADurationSid::YEAR](#/components/schemas/ADurationSid)</li>
                            </ul>
                        id_duration:
                          $ref: '#/components/schemas/ADurationSid'
                          description: |-
                            The type of periods for the duration type "Period".
                            For example, if the duration of the Purchase Option is 12 months, this field will be the ID of the month.
                            See all the possible options here: [ADurationSid](#/components/schemas/ADurationSid).
                        id_duration_type:
                          $ref: '#/components/schemas/RsDurationTypeSid'
                          description: |-
                            The type of the duration. This can be "Without End", "Expires on a certain date", "Period".
                            See more information here: [RsDurationTypeSid](#/components/schemas/RsDurationTypeSid).
                        id_program:
