                                  format: int32
                                  description: 'Height of the image in pixels.'
                                i_width:
                                  type: integer
                                  format: int32
                                  description: 'Width of the image in pixels.'
                                is_empty:
                                  type: boolean
                                  description: '`true` if no image was uploaded, `false` otherwise.'
                                sid_image:
                                  type: string
                                  description: 'Image kind. One of [ImageSid](#/components/schemas/Wl.Resource.Image.ImageSid) string constants.'
                                sid_image_icon:
                                  type: string
                                  description: |-
                                    Icon name. One of [ImageIconSid](#/components/schemas/Wl.Resource.Image.ImageIconSid) string constants.
                                    Set only when `sid_image` equals 'icon'.
                                sid_image_shape:
                                  type: string
                                  description: |-
                                    Shape name. One of [ImageShapeSid](#/components/schemas/Wl.Resource.Image.ImageShapeSid) string constants.
                                    Set only when `sid_image` equals 'shape'.
                                url:
                                  type: string
                                  description: 'Thumbnail image URL.'
