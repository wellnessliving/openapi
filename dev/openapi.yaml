                            is_notify_request_accept:
                              type: boolean
                              description: '`true` means that the client will receive a notification, if appointment will be confirmed by the staff.'
                            is_notify_request_deny:
                              type: boolean
                              description: '`true` means that the client will receive a notification, if appointment will be denied by the staff.'
                            is_request:
                              type: boolean
                              description: '`true` means that appointment was requested, but not confirmed by the staff.'
                          required:
                            - id_visit
                            - is_confirmed
                            - is_deny
                            - is_notify_request_accept
                            - is_notify_request_deny
                            - is_request
                        a_resource:
                          type: array
                          description: 'A list of assets involved in the session.'
                          items:
                            type: string
                        a_resource_removed:
                          type: array
                          description: 'List of removed assets involved in the session.'
                          items:
                            type: string
                        a_staff:
                          type: array
                          description: |-
                            A list of staff members who will conduct the session.

                            Deprecated. Returned only for applications in the `APPS_USE_OLD_K_STAFF` allow-list.
                            New applications should use `a_uid_staff` instead.
                          items:
                            type: string
                        a_uid_staff:
                          type: array
                          description: 'A list of staff members who will conduct the session.'
                          items:
                            type: string
                        a_staff_info:
                          type: object
                          description: |-
                            Information about staff members who conduct this session.
                            For applications in the `APPS_USE_OLD_K_STAFF` allow-list, keys are .
                            For other applications, keys are .
                            Values are array with data:
                          properties:
                            text_staff:
                              type: string
                              description: 'Staff full name.'
                            is_staff_change:
                              type: boolean
                              description: '`true` means staff is substituted, `false` simple staff member.'
                            k_staff:
                              type: string
                              description: |-
                                Staff key. 
                                Returned only for applications in the `APPS_USE_OLD_K_STAFF` allow-list.
                            uid_staff:
                              type: string
                              description: 'Staff user key.'
                          required:
                            - text_staff
                            - is_staff_change
                            - k_staff
                            - uid_staff
                        a_user:
                          type: array
                          description: 'For appointments, this is a list of the names of users who are scheduled to attend the session.'
                          items:
                            type: string
                        a_virtual_location:
                          type: array
                          description: 'List of virtual locations. Each value is .'
                          items:
                            type: string
                        dt_date:
                          type: string
                          description: 'The date/time of the session in UTC.'
                        dt_date_cancel:
                          type: string
                          description: 'The date/time when the session was canceled in UTC. Only used for appointments.'
                        dt_date_local:
                          type: string
                          description: 'The date/time of the session in local time.'
                        has_quiz_uncompleted:
                          type: boolean
                          description: '`true` if has uncompleted quizzes, `false` otherwise.'
                        i_addon:
                          type: integer
                          format: int32
                          description: |-
                            The number of addons for the current appointment.
                            Set only if the current session is an appointment.
                        i_book:
                          type: integer
                          format: int32
                          description: 'The number of clients booked into the session.'
                        i_capacity:
                          type: integer
                          format: int32
                          description: 'The maximum capacity of the session.'
                        i_duration:
                          type: integer
                          format: int32
                          description: 'The duration of the session in minutes.'
                        i_padding_after:
                          type: integer
                          format: int32
                          description: 'The padding time after the session in minutes. Only used for appointments.'
                        i_padding_before:
                          type: integer
                          format: int32
                          description: 'The padding time before the session in minutes. Only used for appointments.'
                        i_start:
                          type: integer
                          format: int32
                          description: |-
                            The start time in minutes after midnight.
                            For example, a class starting at 10:30 in the morning local time will have an `i_start` value of 630.
                        i_wait:
                          type: integer
                          format: int32
                          description: 'Count clients on waitlist.'
                        id_option:
                          $ref: '#/components/schemas/Wl.Schedule.Design.OptionSid'
                          description: |-
                            Appointment title display style.
                             Set only for appointments, for others it will be equal to 0.
                             Constants from [OptionSid](#/components/schemas/Wl.Schedule.Design.OptionSid).
                        id_service:
                          $ref: '#/components/schemas/RsServiceSid'
                          description: 'The ID of the service type. One of [RsServiceSid](#/components/schemas/RsServiceSid) constants.'
                        is_arrive:
                          type: boolean
                          description: |-
                            For appointments: `true` if user has checked-in; `false` otherwise.
                            For classes always `null`.
                        is_pay:
                          type: boolean
                          description: |-
                            For appointments: `true` if appointment is paid; `false` otherwise.
                            For classes always `null`.
                        is_repeat:
                          type: boolean
                          description: |-
                            For appointments: `true` if appointment is recurring; `false` otherwise.
                            For classes always `null`.
                        k_appointment:
                          type: string
                          description: |-
                            The appointment key. 
                            If the session isn't an appointment, this will be `0`.
                        dt_confirm:
                          type: string
                          description: |-
                            Confirmation date for appointment in MySQL format. Will be zero date + time in case appointment
                            is not yet confirmed by client.
                        k_class:
                          type: string
                          description: |-
                            The class key. 
                            If the session isn't a class, this will be `0`.
                        k_class_period:
                          type: string
                          description: |-
                            The class period key. 
                            If the session isn't a class, this will be `0`.
                        k_location:
                          type: string
                          description: 'The location key for where the session takes place.'
                        k_service:
                          type: string
                          description: |-
