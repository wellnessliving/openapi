                      id_period:
                        $ref: '#/components/schemas/ADurationSid'
                        description: 'Deprecated, use `id_duration` instead! One of [ADurationSid](#/components/schemas/ADurationSid) constants.'
                      id_repeat_end:
                        $ref: '#/components/schemas/RsRepeatEndSid'
                        description: 'Possible ways to stop repeatable events. One of the [RsRepeatEndSid](#/components/schemas/RsRepeatEndSid) constants.'
                    required:
                      - a_day
                      - a_week
                      - i_duration
                      - i_period
                      - id_duration
                      - id_period
                      - id_repeat_end
                a_resource:
                  type: array
                  items:
                    type: object
                    properties:
                      i_index:
                        type: integer
                        format: int32
                        description: 'The number of asset(s). The actual number is returned for assets with a quantity greater than `1`.'
                      k_resource:
                        type: string
                        description: 'The key of the asset.'
                    required:
                      - i_index
                      - k_resource
                a_session:
                  type: array
                  description: |-
