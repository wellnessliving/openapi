      operationId: Wl.Profile.Activity.ElementApi.get
      responses:
        '200':
          description: 'Successful response.'
          content:
            application/json:
              schema:
                type: object
                properties:
                  a_credit_score:
                    type: array
                    description: 'Messages with description what did user do to get account credits as reward points.'
                    items:
                      type: string
                  a_reward_score:
                    type: array
                    description: 'Messages with description what did user do to get points.'
                    items:
                      type: string
                  can_profile:
                    type: boolean
                    description: 'Verifies that current user can view the specified profile.'
                  dt_date_gmt:
                    type: string
                    format: date-time
                    description: 'The date of the activity in GMT.'
                  dt_date_local:
                    type: string
                    format: date-time
                    description: "The date of the activity in the client's time zone."
                  html_message:
                    type: string
                    description: 'Description of the action, who and what did.'
                  i_credit_score:
                    type: integer
                    format: int32
                    description: 'Total amount of account credits user got for `k_login_activity`.'
                  i_score:
                    type: integer
                    format: int32
                    description: 'The total amount of rewards points the client received for the activity.'
                  i_spend:
                    type: integer
                    format: int32
                    description: 'The rewards points used to redeem a prize.'
                  id_icon:
                    $ref: '#/components/schemas/Wl.Design.IconSid'
                    description: |-
                      The ID of the icon that should be shown for this activity. One of [IconSid](#/components/schemas/Wl.Design.IconSid) constants.

                      This will be `null` is no special icon for this activity.
                  id_type:
                    $ref: '#/components/schemas/RsLoginActivityTypeSid'
                    description: 'The ID of the activity item returned by this endpoint. One of [RsLoginActivityTypeSid](#/components/schemas/RsLoginActivityTypeSid) constants.'
                  k_id:
                    type: string
                    description: 'Object ID, for example, class period ID for books and visits.'
                  s_message:
                    type: string
                    description: 'The description of the activity. This should include the nature of the activity and the people involved.'
                  url_link:
                    type: string
                    description: 'Link to share activity with social networks.'
                required:
                  - a_credit_score
                  - a_reward_score
                  - can_profile
                  - dt_date_gmt
                  - dt_date_local
                  - html_message
                  - i_credit_score
                  - i_score
                  - i_spend
                  - id_type
                  - k_id
                  - s_message
                  - url_link
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '404':
          $ref: '#/components/responses/404'
        '422':
          $ref: '#/components/responses/422'
        '500':
          $ref: '#/components/responses/500'
      summary: 'Retrieves information about activity item.'
      description: |-
        Loads a single activity record by `k_login_activity`, validates access via profile privileges,
         and returns the activity message, icon, type, reward and credit scores, activity dates in UTC
         and local time, spend amount, and a share URL.
      tags:
        - Profile
      parameters:
        -
          $ref: '#/components/parameters/X-Error-Rules'
        -
          name: k_login_activity
          in: query
          required: true
          schema:
            type: string
          description: 'The key of the activity item represented by this endpoint.'
      x-rate-limit:
        -
          limit: 200000
          period: 3600
  /Wl/Profile/Alert/Alert.json:
    get:
      operationId: Wl.Profile.Alert.AlertApi.get
      responses:
        '200':
          description: 'Successful response.'
          content:
            application/json:
              schema:
                type: object
                properties:
                  a_alert:
                    type: array
                    items:
                      type: object
                      properties:
                        dt_date:
                          type:
                            - string
                            - 'null'
                          description: |-
                            The date and time in MySQL format in local time when the alert was last modified.
                            This will be `null` if the date isn't available for this alert.
                        is_today:
                          type: boolean
                          description: 'This will be `true` if the alert was added today. Otherwise, this will be `false`.'
                        id_profile_note:
                          $ref: '#/components/schemas/RsProfileNoteSid'
                          description: 'ID of alert type. One of [RsProfileNoteSid](#/components/schemas/RsProfileNoteSid) constants.'
                        k_pay_account:
                          type: string
                          description: "The key of the client's account."
                        k_purchase_item:
                          type: string
                          description: 'The key of the purchase item.'
                        s_text:
                          type: string
                          description: "The alert's text."
                      required:
                        - dt_date
                        - is_today
                        - id_profile_note
                        - s_text
                  a_warning:
                    type: array
                    items:
                      type: object
                      properties:
                        a_location_flag:
                          type: array
                          description: 'The list of location keys where this note is flagged.'
                          items:
                            type: string
                        dt_create:
                          type: boolean
                          description: 'The date and time in MySQL format in local time when the warning was created.'
                        dt_date:
                          type: boolean
                          description: 'The date and time in MySQL format in local time when the warning was last modified.'
                        is_book_restricted:
                          type: boolean
                          description: '`true` means that client is restricted to make bookings, `false` - otherwise.'
                        is_flag:
                          type: boolean
                          description: 'This will be `true` if the client is flagged. Otherwise, this will be `false`.'
                        is_purchase_restricted:
                          type: boolean
                          description: '`true` means that client is restricted to make purchases. Otherwise, this will be `false`.'
                        is_today:
                          type: boolean
                          description: 'This will be `true` if the warning was added today. Otherwise, this will be `false`.'
                        s_text:
                          type: string
                          description: 'The text of the warning.'
                        text_author:
                          type: string
                          description: 'Staff name, who created a note.'
                        text_editor:
                          type: string
                          description: 'Staff name, who edited a note last time.'
                      required:
                        - a_location_flag
                        - dt_create
                        - dt_date
                        - is_book_restricted
                        - is_flag
                        - is_purchase_restricted
                        - is_today
                        - s_text
                        - text_author
                        - text_editor
                required:
                  - a_alert
                  - a_warning
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '404':
          $ref: '#/components/responses/404'
        '422':
          $ref: '#/components/responses/422'
        '500':
          $ref: '#/components/responses/500'
      summary: "Retrieves a list of notices to show in user's profile."
      description: |-
        Returns `a_alert` (system alerts including unconfirmed contracts) and `a_warning` (login notes
         and flags with author and editor information) for the specified user in the given business.
      tags:
        - Profile
      parameters:
        -
          $ref: '#/components/parameters/X-Error-Rules'
        -
          name: is_backend
          in: query
          required: true
          schema:
            type: boolean
          description: 'If `true`, the API is being used from backend. Otherwise, this will be `false`.'
        -
          name: k_business
          in: query
          required: true
          schema:
            type: string
          description: 'The key of the business.'
        -
          name: uid
          in: query
          required: true
          schema:
            type: string
          description: 'The key of the user to show information for.'
      x-rate-limit:
        -
          limit: 200000
          period: 3600
  /Wl/Profile/Alert/AlertEdit.json:
    delete:
      operationId: Wl.Profile.Alert.AlertEditApi.delete
      responses:
        '200':
          description: 'Successful response.'
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '404':
          $ref: '#/components/responses/404'
        '422':
          $ref: '#/components/responses/422'
        '500':
          $ref: '#/components/responses/500'
      summary: 'Deletes existing note.'
      description: |-
        Permanently removes the login note specified by `k_login_note` from the business, requiring
         backend access for the current user.
      tags:
        - Profile
      parameters:
        -
          $ref: '#/components/parameters/X-Error-Rules'
        -
          name: k_business
          in: query
          required: true
          schema:
            type: string
          description: 'Key of current business.'
        -
          name: k_login_note
          in: query
          required: true
          schema:
            type: string
          description: |-
            Login note key to edit or get info for.
            Empty if new entry is being added.
      x-rate-limit:
        -
          limit: 200000
          period: 3600
    get:
      operationId: Wl.Profile.Alert.AlertEditApi.get
      responses:
        '200':
          description: 'Successful response.'
          content:
            application/json:
              schema:
                type: object
                properties:
                  a_login_note_data:
                    type: array
                    items:
                      type: object
                      properties:
                        a_location:
                          type: object
                          description: 'List of locations the note applies to. Each element:'
                          properties:
                            html_title:
                              type: string
                              description: 'HTML-escaped location title.'
                            is_select:
                              type: boolean
                              description: '`true` if this location is selected for the flag; `false` otherwise.'
                            k_id:
                              type: string
                              description: 'Location key.'
                            text_title:
                              type: string
                              description: 'Location title.'
                          required:
                            - html_title
                            - is_select
                            - k_id
                            - text_title
                        can_flag:
                          type: boolean
                          description: '`true` if the current user can flag the client; `false` otherwise.'
                        id_login_note_access:
                          $ref: '#/components/schemas/RsLoginNoteAccessSid'
                          description: 'Login note access type. One of [RsLoginNoteAccessSid](#/components/schemas/RsLoginNoteAccessSid) constants.'
                        id_login_note_flag:
                          $ref: '#/components/schemas/RsLoginNoteFlagSid'
                          description: 'Login note flag type. One of [RsLoginNoteFlagSid](#/components/schemas/RsLoginNoteFlagSid) constants.'
                        id_source:
                          $ref: '#/components/schemas/Wl.Location.Flag.FlagSourceEnum'
                          description: |-
                            Flag source identifier.
                            One of [FlagSourceEnum](#/components/schemas/Wl.Location.Flag.FlagSourceEnum) constant.
                            `null` if the flag was created manually.
                        is_automated:
                          type: boolean
                          description: '`true` if the note was created by an automated process; `false` if created manually.'
                        is_book:
                          type: boolean
                          description: '`true` if the flagged client is allowed to book; `false` otherwise.'
                        is_flag:
                          type: boolean
                          description: '`true` if the client is currently flagged; `false` otherwise.'
                        is_icon:
                          type: boolean
                          description: '`true` if a flag icon should be displayed; `false` otherwise.'
                        is_location_multiple:
                          type: boolean
                          description: '`true` if the business has multiple locations; `false` otherwise.'
                        is_purchase:
                          type: boolean
                          description: '`true` if the flagged client is allowed to make purchases; `false` otherwise.'
                        is_remove:
                          type: boolean
                          description: '`true` if the note is marked for removal; `false` otherwise.'
                        k_business:
                          type: string
                          description: 'Business key.'
                        k_login_note:
                          type: string
                          description: 'Login note key.'
                        s_text:
                          type: string
                          description: 'Note text content.'
                        text_flag_description:
                          type: string
                          description: 'Description of the flag source for display.'
                        text_flag_disable:
                          type: string
                          description: 'Text explaining how to disable the automated flag. Empty string if the flag is manual.'
                        uid:
                          type: string
                          description: 'User key of the flagged client.'
                        url_action:
                          type: string
                          description: 'URL to submit the login note edit form.'
                      required:
                        - a_location
                        - can_flag
                        - id_login_note_access
                        - id_login_note_flag
                        - id_source
                        - is_automated
                        - is_book
                        - is_flag
                        - is_icon
                        - is_location_multiple
                        - is_purchase
                        - is_remove
                        - k_business
                        - k_login_note
                        - s_text
                        - text_flag_description
                        - text_flag_disable
                        - uid
                        - url_action
                required:
                  - a_login_note_data
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '404':
          $ref: '#/components/responses/404'
        '422':
          $ref: '#/components/responses/422'
        '500':
          $ref: '#/components/responses/500'
      summary: 'Retrieves login note data.'
      description: |-
        Loads a single login note for editing, including its text, access type, flag settings,
         booking and purchase restrictions, and location flags. Used to populate the edit form before
         saving changes.
      tags:
        - Profile
      parameters:
        -
          $ref: '#/components/parameters/X-Error-Rules'
        -
          name: k_business
          in: query
          required: true
          schema:
            type: string
          description: 'Key of current business.'
        -
          name: k_login_note
          in: query
          required: true
          schema:
            type: string
          description: |-
            Login note key to edit or get info for.
            Empty if new entry is being added.
        -
          name: uid
          in: query
          required: true
          schema:
            type: string
          description: 'Key of a user to show information or post a note for.'
      x-rate-limit:
        -
          limit: 200000
          period: 3600
    post:
      operationId: Wl.Profile.Alert.AlertEditApi.post
      responses:
        '200':
          description: 'Successful response.'
          content:
            application/json:
              schema:
                type: object
                properties:
                  k_login_note:
                    type: string
                    description: |-
                      Login note key to edit or get info for.
                      Empty if new entry is being added.
                required:
                  - k_login_note
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '404':
          $ref: '#/components/responses/404'
        '422':
          $ref: '#/components/responses/422'
        '500':
          $ref: '#/components/responses/500'
      summary: 'Creates new text note or updates the existing one.'
      description: |-
        Creates or updates a login note on the client's profile, setting its text, access
         restrictions, booking and purchase flags, and the locations where the note applies. Used by
         staff to attach internal notes or warnings that appear on check-in and booking flows.
      tags:
        - Profile
      parameters:
        -
          $ref: '#/components/parameters/X-Error-Rules'
        -
          name: k_business
          in: query
          required: true
          schema:
            type: string
          description: 'Key of current business.'
        -
          name: k_login_note
          in: query
          required: true
          schema:
            type: string
          description: |-
            Login note key to edit or get info for.
            Empty if new entry is being added.
        -
          name: uid
          in: query
          required: true
          schema:
            type: string
          description: 'Key of a user to show information or post a note for.'
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                a_location:
                  type: array
                  description: 'The list of location keys to flag client in.'
                  items:
                    type: string
                id_login_note_access:
                  $ref: '#/components/schemas/RsLoginNoteAccessSid'
                  description: 'Login note access type ID.'
                is_book:
                  type: boolean
                  description: 'Whether flagged user can book. Does not matter if `is_flag` is `false`.'
                is_flag:
                  type: boolean
                  description: 'Whether to flag the user.'
                is_purchase:
                  type: boolean
                  description: 'Whether flagged user can make purchases. Does not matter if `is_flag` is `false`.'
                text_note:
                  type: string
                  description: 'Note text.'
              required:
                - a_location
                - id_login_note_access
                - is_book
                - is_flag
                - is_purchase
                - text_note
      x-rate-limit:
        -
          limit: 200000
          period: 3600
  /Wl/Profile/PurchaseList/PurchaseList.json:
    get:
      operationId: Wl.Profile.PurchaseList.PurchaseListApi.get
      responses:
        '200':
          description: 'Successful response.'
          content:
            application/json:
              schema:
                type: object
                properties:
                  a_purchase:
                    type: array
                    items:
                      type: object
                      properties:
                        a_active:
                          type: array
                          description: "The value of `a_purchase['is_active']`. For packages, this also contains the values of `a_purchase['is_active']` of every component."
                          items:
                            type: boolean
                        a_sale:
                          type: array
                          description: "The value of `a_purchase['id_sale']`. For packages, this also contains the values of `a_purchase['id_sale']` of every component."
                          items:
                            type: integer
                            format: int32
                        dt_add:
                          type: string
                          description: 'The date that the purchase was added.'
                        id_purchase_item:
                          $ref: '#/components/schemas/RsPurchaseItemSid'
                          description: 'The ID of the purchase type. One of the constants [RsPurchaseItemSid](#/components/schemas/RsPurchaseItemSid).'
                        id_sale:
                          $ref: '#/components/schemas/RsSaleSid'
                          description: 'The ID of the sale category in the store. One of the constants [RsSaleSid](#/components/schemas/RsSaleSid).'
                        is_active:
                          type: boolean
                          description: 'If `true`, then the purchase item is active. Otherwise, this will be `false`.'
                        is_component:
                          type: boolean
                          description: 'If `true`, then the purchase item is a package component. Otherwise, this will be `false`.'
                        is_package:
                          type: boolean
                          description: 'If `true`, then the purchase item is a package, `false` otherwise.'
                        k_appointment:
                          type: string
                          description: 'Appointment key.'
                        k_code:
                          type: string
                          description: |-
                            The redemption code key that was used to make a purchase.
                            This is used only if `k_login_promotion` and `k_purchase` are empty.
                        k_enrollment_book:
                          type: string
                          description: |-
                            The key of an event that requires clients to book every session at once.
                            This is used only if the event is part of a package.
                        k_id:
                          type: string
                          description: 'The key of the purchase type referring to different types of keys depending on the value of `id_sale`.'
                        k_login_product:
                          type: string
                          description: |-
                            The key of the purchased product.
                            This is used only if the event is part of a package.
                        k_login_promotion:
                          type: string
                          description: |-
                            The key of the user's existing purchase options.
                            This is used only if `k_code` and `k_purchase` are empty.
                        k_purchase:
                          type: string
                          description: |-
                            The key of a purchase where no special case rules are in effect.
                            This is used only used if `k_code` is empty.
                        k_purchase_item:
                          type: string
                          description: |-
                            The key of a purchase item where no special case rules are in effect.
                            This is used only if `k_code` is empty.
                        k_service:
                          type: string
                          description: 'Service key.'
                        k_session_pass:
                          type: string
                          description: |-
                            In certain cases a session can be canceled and makeup sessions can be granted to a client in lieu of
                            other compensation. This is the key of one of the makeup sessions used to attend an event. This is also
                            present for a repeat purchase of an event.
                        s_title:
                          type: string
                          description: 'The name of the purchase item.'
                        uid:
                          type: string
                          description: 'The ID of the purchase owner.'
                      required:
                        - a_active
                        - a_sale
                        - dt_add
                        - id_purchase_item
                        - id_sale
                        - is_active
                        - is_package
                        - k_appointment
                        - k_code
                        - k_id
                        - k_login_promotion
                        - k_purchase
                        - k_purchase_item
                        - k_service
                        - s_title
                        - uid
                required:
                  - a_purchase
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '404':
          $ref: '#/components/responses/404'
        '422':
          $ref: '#/components/responses/422'
        '500':
          $ref: '#/components/responses/500'
      summary: "Retrieves a list of user's purchase items to show in user profile."
      description: |-
        Returns the complete purchase history for the client in the given business, covering all
         item types such as memberships, redemption codes, enrollments, products, appointments, and
         gift cards. Package components are resolved and included inline beside their parent item.
      tags:
        - Profile
      parameters:
        -
          $ref: '#/components/parameters/X-Error-Rules'
        -
          name: k_business
          in: query
          required: true
          schema:
            type: string
          description: 'The key of a business to show information for.'
        -
          name: uid
          in: query
          required: true
          schema:
            type: string
          description: 'The key of a user to show information for.'
      x-rate-limit:
        -
          limit: 200000
          period: 3600
  /Wl/Profile/PurchaseList/PurchaseListElement.json:
    get:
      operationId: Wl.Profile.PurchaseList.PurchaseListElementApi.get
      responses:
        '200':
          description: 'Successful response.'
          content:
            application/json:
              schema:
                type: object
                properties:
                  a_component:
                    type: array
                    items:
                      oneOf:
                        -
                          type: object
                          properties:
                            k_enrollment_book:
                              type: string
                              description: 'The booking enrollment key.'
                            k_login_product:
                              type: string
                              description: 'The key referencing the product a user purchased.'
                            k_login_promotion:
                              type: string
                              description: "The key of a user's Purchase Option."
                            k_session_pass:
                              type: string
                              description: "The key of a user's session pass."
                        -
                          type: object
                          properties:
                            id_purchase_item:
                              $ref: '#/components/schemas/RsPurchaseItemSid'
                              description: 'Purchase item type. One of [RsPurchaseItemSid](#/components/schemas/RsPurchaseItemSid) constants.'
                            k_id:
                              type: string
                              description: 'ID of the item. Will be different for different [RsPurchaseItemSid](#/components/schemas/RsPurchaseItemSid) constants.'
                            text_title:
                              type: string
                              description: 'Title of the coupon component.'
                          required:
                            - id_purchase_item
                            - k_id
                            - text_title
                  a_logo:
                    type:
                      - array
                      - 'null'
                    items:
                      type: object
                      properties:
                        i_height:
                          type: integer
                          format: int32
                          description: 'The height of the image.'
                        i_width:
                          type: integer
                          format: int32
                          description: 'The width of the image.'
                        is_empty:
                          type: boolean
                          description: "If `true`, then the purchased item doesn't have an image. If `false`, then the item has an image."
                      required:
                        - i_height
                        - i_width
                        - is_empty
                  a_restrict:
                    type: array
                    items:
                      type: object
                      properties:
                        i_limit:
                          type: integer
                          format: int32
                          description: 'The number of sessions that may be booked during this period.'
                        i_remain:
                          type: integer
                          format: int32
                          description: 'The number of sessions that remain available.'
                        text_date:
                          type: string
                          description: 'The name of the period type.'
                      required:
                        - i_limit
                        - i_remain
                        - text_date
                  a_tax:
                    type: array
                    items:
                      type: object
                      properties:
                        f_tax_discount:
                          type: string
                          description: 'The amount of tax.'
                        s_tax:
                          type: string
                          description: 'The name of the tax.'
                      required:
                        - f_tax_discount
                        - s_tax
                  can_renew:
                    type: boolean
                    description: |-
                      This is `true` only if the purchased item is a promotion and the user can control the renewal of the promotion.
                      Otherwise, this will be `false`.
                  dl_cancel:
                    type: string
                    format: date
                    description: 'The cancellation date of the promotion. Only available if the item is a promotion and has been canceled.'
                  dl_end:
                    type: string
                    format: date
                    description: 'The expiration date of the promotion. Only available if the item is a promotion.'
                  dl_purchase:
                    type: string
                    format: date
                    description: 'The local date of the purchase in MySQL format.'
                  dl_send:
                    type: string
                    format: date
                    description: |-
                      The local date in MySQL format when mail about purchasing was sent (or will be sent) to the user.
                      This won't be empty only for gift cards.
                  dl_start:
                    type: string
                    format: date
                    description: 'The start date of the promotion. Only available if the item is a promotion.'
                  dt_cancel:
                    type: string
                    format: date-time
                    description: 'The local date of cancellation in MySQL format. Only available if the item is a membership.'
                  dt_hold_end:
                    type: string
                    format: date-time
                    description: |-
                      The end date of the promotion hold. This is used only for promotions on hold.
                      This value may be empty if the hold is eternal.
                  dt_hold_start:
                    type: string
                    format: date-time
                    description: 'The start date of the promotion hold. Only available if the item is a promotion and on hold.'
                  dt_purchase:
                    type: string
                    format: date-time
                    description: 'The purchase date of the purchased item. This is given in UTC in MySQL format.'
                  dt_redeem:
                    type: string
                    format: date-time
                    description: 'The date in MySQL format when gift card was redeemed. Only available if the item is a gift card.'
                  f_discount_login_type_percent:
                    type: number
                    format: float
                    description: "The percentage value of the discount for the client type. This will be empty if a discount wasn't applied."
                  html_description:
                    type: string
                    description: 'The description of the purchased item.'
                  i_book:
                    type: integer
                    format: int32
                    description: |-
                      The number of sessions remaining for a promotion. This value is used only for promotions. This value will be `0` if
                      the purchased item isn't a promotion or if there are no remaining sessions.
                  i_book_duration:
                    type: integer
                    format: int32
                    description: "Displays the number of minutes of sessions that were booked by this promotion. This isn't `0` only for promotions."
                  i_buy:
                    type: integer
                    format: int32
                    description: |-
                      The number of purchased items bought at the time of purchase.
                      This will be `0` for purchase items obtained via a redemption code or as a result of an import.
                  i_client_cancel_notice_days:
                    type: integer
                    format: int32
                    description: 'The number of days notice before the client is able to set cancel date.'
                  i_discount_count:
                    type: integer
                    format: int32
                    description: "The percentage value of the discount given by a reward prize. This will be `0` if a discount wasn't applied."
                  i_duration:
                    type: integer
                    format: int32
                    description: 'The duration of the promotion. The measurement unit is `id_duration`. This field is only added for promotions.'
                  i_left:
                    type: integer
                    format: int32
                    description: 'The number of bookings left with this promotion. This value is used only for non-sequential promotions.'
                  i_limit:
                    type: integer
                    format: int32
                    description: 'The number of visits that can be made with this promotion. This value is used only for promotions.'
                  i_payment_period:
                    type: integer
                    format: int32
                    description: 'The interval duration of the regular payments. This value is used only for membership-type promotions.'
                  i_remain:
                    type: integer
                    format: int32
                    description: 'The number of remaining bookings for the promotion. This is used only for promotions.'
                  i_remain_duration:
                    type: integer
                    format: int32
                    description: |-
                      The number of minutes remaining for the promotion.
                      This is used only for promotions that work with a limited number of minutes.
                  i_renew:
                    type: integer
                    format: int32
                    description: "Displays how many times promotion was updated. This isn't `0` only for promotions."
                  i_use:
                    type: integer
                    format: int32
                    description: 'The number of visits that were attended for the promotion. This is used only for promotions.'
                  i_use_duration:
                    type: integer
                    format: int32
                    description: "The number of minutes the user has already used with this purchase of this promotion. This isn't `0` only for promotions."
                  id_activation:
                    $ref: '#/components/schemas/RsActivationSid'
                    description: 'The activation mode. One of the [RsActivationSid](#/components/schemas/RsActivationSid) constants. This field is only added for promotions.'
                  id_discount_commission_type:
                    $ref: '#/components/schemas/RsCommissionTypeSid'
                    description: |-
                      The type of discount given via a reward prize. One of the [RsCommissionTypeSid](#/components/schemas/RsCommissionTypeSid) constants. This will be empty
                      if this discount wasn't applied.
                  id_duration:
                    $ref: '#/components/schemas/RsDurationTypeSid'
                    description: |-
                      The type of duration for the promotion. This is used only for membership-type promotions. This determines
                      whether the promotion lasts indefinitely, has a fixed duration, or ends on a specific date. The measurement unit
                      for key `i_payment_period`. One of the [RsDurationTypeSid](#/components/schemas/RsDurationTypeSid) constants.
                  id_program_type:
                    $ref: '#/components/schemas/RsProgramTypeSid'
                    description: |-
                      The ID of the promotion program. This is used only for promotions.
                      The measurement unit for key `i_payment_period`. The ID of promotion program type.
                      One of the [RsProgramTypeSid](#/components/schemas/RsProgramTypeSid) constants.
                  id_purchase_item:
                    $ref: '#/components/schemas/RsPurchaseItemSid'
                    description: |-
                      The ID of the purchase item type. The measurement unit for key `i_payment_period`.
                      The ID of purchase item type. One of the [RsPurchaseItemSid](#/components/schemas/RsPurchaseItemSid) constants.
                  id_sale:
                    $ref: '#/components/schemas/RsSaleSid'
                    description: 'The ID of the sale category. One of the constants [RsSaleSid](#/components/schemas/RsSaleSid).'
                  is_active:
                    type: boolean
                    description: "If `true`, then the purchase item is active. If `false`, then the purchase item isn't active."
                  is_asset:
                    type: boolean
                    description: 'Whether the purchase item is asset.'
                  is_cancel_pending:
                    type: boolean
                    description: 'If `true`, then a promotion is pending cancellation. Otherwise, this will be `false`.'
                  is_client_cancel_allow:
                    type: boolean
                    description: 'If `true`, then a promotion can be canceled by a client. Otherwise, this will be `false`.'
                  is_component:
                    type: boolean
                    description: |-
                      If `true`, then the purchased item is a component of another purchase item, as is the case of a package.
                      If `false`, then the purchased item isn't a component of another purchase item.
                  is_convert:
                    type: boolean
                    description: |-
                      If `true`, then this promotion will be converted to a different promotion after it expires. If `false`, then the
                      promotion won't be converted to a different promotion after it expires. This can only be true for certain
                      promotions.
                  is_event:
                    type: boolean
                    description: '`true` if the purchase item is an event; `false` otherwise.'
                  is_expire:
                    type: boolean
                    description: |-
                      This is `true` only if the purchased item is a promotion that has expired. Otherwise, this will be `false`
                      in all other cases.
                  is_hold:
                    type: boolean
                    description: |-
                      This is `true` only if the purchased item is a promotion and has been placed on hold.
                      Otherwise, this is `false` in all other cases.
                  is_limit:
                    type: boolean
                    description: |-
                      If `true`, then the usage of this purchased item is disabled.
                      If `false`, then the usage of this purchased item is enabled.
                  is_login_type_member:
                    type:
                      - boolean
                      - 'null'
                    description: |-
                      If `true`, then the discount was applied for the member type.
                      If `false`, then the discount was applied for the pass holder type.
                      If `null`, then the discount was applied for the prospect type. This won't be `null` only if a discount based
                      on a client type was applied.
                  is_mail:
                    type: boolean
                    description: |-
                      If `true`, then the gift card email notification will be sent to the receiver. This is `true` only if the
                      purchased item is a gift card. Otherwise, this will be `false` in all other cases.
                  is_past:
                    type: boolean
                    description: |-
                      If `true`, then the gift card email notification has been sent. This can only be `true` if the purchased item
                      is a gift card. Otherwise, this will be `false` in all other cases.
                  is_redeem:
                    type: boolean
                    description: |-
                      This is `true` if the gift card has been redeemed.
                      This can only be `true` if the purchased item is a gift card. Otherwise, this will be `false` in all other cases.
                  is_renew:
                    type: boolean
                    description: |-
                      This is `true` if the promotion is auto-renewable. This can only be `true` if the purchased item is a promotion.
                      Otherwise, this will be `false` in all other cases.
                  is_transfer:
                    type: boolean
                    description: |-
                      This is `true` if the promotion has been transferred. This can only be true if the purchased item is a promotion.
                      This is `false` if the promotion hasn't been transferred or in all other cases.
                  k_code_result:
                    type: string
                    description: |-
                      The key of the redemption code. This value will not be `0` if the purchased item is obtained via a redemption
                      code or if it's a component of a package obtained via a redemption code.
                  k_currency:
                    type: string
                    description: 'The key of the currency used to make the purchase.'
                  k_id:
                    type: string
                    description: 'The key of the item. This can correspond to one of many values depending on `id_sale`.'
                  k_login_promotion_result:
                    type: string
                    description: "The key of the purchased promotion. This won't be `0` only for promotions."
                  k_purchase_result:
                    type: string
                    description: 'The key of the whole purchase, including the given purchased item.'
                  m_cost_item:
                    type: string
                    description: 'The cost of the purchased item.'
                  m_cost_total:
                    type: string
                    description: 'The total cost of the purchase, including taxes and fees.'
                  m_discount_amount:
                    type: string
                    description: "The amount of the discount via prize. This will be empty if this discount wasn't applied."
                  m_discount_login_type_amount:
                    type: string
                    description: "The amount of the discount for the client type. This value will be empty if the discount wasn't applied."
                  m_discount_manual:
                    type: string
                    description: "The amount of the manual discount. This will be empty if this discount wasn't applied."
                  m_period_price:
                    type: string
                    description: 'The amount to pay for each payment period. This is used only for promotions with the membership program type.'
                  m_price:
                    type: string
                    description: 'The source price of item.'
                  m_refund:
                    type: string
                    description: 'The amount refunded. This will be `0` if there are no refunds.'
                  m_terminate_fee:
                    type:
                      - string
                      - 'null'
                    description: |-
                      Cancellation fee amount.

                      `null` if no need charge fee.
                  s_code:
                    type: string
                    description: 'The redemption code. This value is used only if the purchase is bought via a redemption code.'
                  s_gift_code:
                    type: string
                    description: |-
                      The code to redeem the gift card. This isn't empty only for gift cards.

                      This can be auto-generated or custom (entered manually by the staff member during purchase).
                      The max length is 20 characters, including numbers and letters.
                  s_gift_recipient:
                    type: string
                    description: "The name of gift recipient. This isn't empty only for gift cards."
                  s_limit_actor:
                    type: string
                    description: |-
                      The name of the staff member who disabled the usage of the purchased item.
                      This will be empty if the purchased item is enabled.
                  s_mail:
                    type: string
                    description: 'The email address to which the gift card was sent. This is used only for gift cards.'
                  s_message:
                    type: string
                    description: |-
                      The test of the message sent to the gift card recipient. This is used only for gift cards.
                      This will be empty if an email notification shouldn't be sent.
                  s_payer:
                    type: string
                    description: 'The name of the user who paid for this purchase.'
                  s_promotion_convert:
                    type: string
                    description: |-
                      The title of the converted promotion. This value is used only for promotions that must be converted to another
                      promotion after expiration.
                  s_purchase:
                    type: string
                    description: 'The purchase ID number as it appears on the receipt. This value will also include the leading 0s for the ID number.'
                  s_recipient:
                    type: string
                    description: 'The name of the user who paid for this purchase.'
                  s_sender:
                    type: string
                    description: 'The name of the sender. This value is used only for gift cards.'
                  s_title:
                    type: string
                    description: 'The name of the purchased item.'
                  sid_value:
                    type: string
                    description: 'The string ID of the purchased item. This ID may be used to change the view of the purchased item.'
                  text_expire:
                    type: string
                    description: 'Expire conditions for the purchased item (only for promotion).'
                  text_guest_pass:
                    type: string
                    description: 'Text describing guest passes available for the purchased promotion.'
                  uid_payer:
                    type:
                      - string
                      - 'null'
                    description: |-
                      The key of the user who paid for this purchase.
                      `null` in a case when there was no money transaction.
                  uid_recipient:
                    type: string
                    description: 'The key of the user who paid for this purchase.'
                required:
                  - a_component
                  - a_restrict
                  - a_tax
                  - can_renew
                  - dl_cancel
                  - dl_end
                  - dl_purchase
                  - dl_send
                  - dl_start
                  - dt_cancel
                  - dt_hold_end
                  - dt_hold_start
                  - dt_purchase
                  - dt_redeem
                  - f_discount_login_type_percent
                  - html_description
                  - i_book
                  - i_book_duration
                  - i_buy
                  - i_client_cancel_notice_days
                  - i_discount_count
                  - i_duration
                  - i_left
                  - i_limit
                  - i_payment_period
                  - i_remain
                  - i_remain_duration
                  - i_renew
                  - i_use
                  - i_use_duration
                  - id_activation
                  - id_discount_commission_type
                  - id_duration
                  - id_program_type
                  - id_purchase_item
                  - id_sale
                  - is_active
                  - is_asset
                  - is_cancel_pending
                  - is_client_cancel_allow
                  - is_component
                  - is_convert
                  - is_event
                  - is_expire
                  - is_hold
                  - is_limit
                  - is_mail
                  - is_past
                  - is_redeem
                  - is_renew
                  - is_transfer
                  - k_code_result
                  - k_currency
                  - k_id
                  - k_login_promotion_result
                  - k_purchase_result
                  - m_cost_item
                  - m_cost_total
                  - m_discount_amount
                  - m_discount_login_type_amount
                  - m_discount_manual
                  - m_period_price
                  - m_price
                  - m_refund
                  - s_code
                  - s_gift_code
                  - s_gift_recipient
                  - s_limit_actor
                  - s_mail
                  - s_message
                  - s_payer
                  - s_promotion_convert
                  - s_purchase
                  - s_recipient
                  - s_sender
                  - s_title
                  - sid_value
                  - text_expire
                  - text_guest_pass
                  - uid_recipient
