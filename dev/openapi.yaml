          description: 'Successful response.'
          content:
            application/json:
              schema:
                type: object
                properties:
                  a_dynamic:
                    type: array
                    description: |-
                      A list of dynamic fields in this report.

                      Copy of result of [ReportGeneratorReportAbstract::generatorDynamic()](#/components/schemas/Thoth.ReportCore.Generator.ReportGeneratorReportAbstract).
                    items:
                      type: object
                      properties:
                        a_cell:
                          type: array
                          items:
                            type: object
                        a_customization_element:
                          type: array
                          items:
                            type: array
                        a_type:
                          type: array
                        is_dynamic:
                          type: boolean
                        is_export:
                          type:
                            - boolean
                            - 'null'
                        is_hide_by_default:
                          type: boolean
                        is_hide_if_empty:
                          type: boolean
                        is_null:
                          type: boolean
                        is_order:
                          type:
                            - boolean
                            - 'null'
                        is_show:
                          type: boolean
                        is_store:
                          type: boolean
                        s_cast:
                          type:
                            - string
                            - 'null'
                        s_class:
                          type:
                            - object
                            - 'null'
                        s_class_css:
                          type: string
                        s_format:
                          type:
                            - string
                            - 'null'
                        s_name:
                          type: string
                        s_sort:
                          type: string
                        s_type:
                          type: string
                        text_title:
                          type:
                            - string
                            - 'null'
                        text_title_export:
                          type:
                            - string
                            - 'null'
                        text_title_info:
                          type:
                            - string
                            - 'null'
                      required:
                        - a_cell
                        - a_customization_element
                        - a_type
                        - is_dynamic
                        - is_hide_by_default
                        - is_hide_if_empty
                        - is_null
                        - is_show
                        - is_store
                        - s_class_css
                        - s_name
                        - s_sort
                        - s_type
                  a_field:
                    type: array
                    description: |-
                      A list of fields in this report.

                      This array is effectively a title row for table that is returned in [QueryApi](/Thoth/ReportCore/Generator/Query.json).
                    items:
                      type: string
                  a_row:
                    type: array
                    description: |-
                      Report data.

                      This is an indexed array in which one row is an indexed array also.

                      Indexes of the columns correspond columns in [QueryApi](/Thoth/ReportCore/Generator/Query.json).
                    items:
                      type: array
                      items:
                        type: string
                  a_stale:
                    type: array
                    description: |-
                      A list of stale rows.

                      This array is only filled in when report is being updated now, or due to some other reasons contains mixed version
                      data (some data from the latest generation, and other from one of previous generations).

                      Value is index in [QueryApi](/Thoth/ReportCore/Generator/Query.json).

                      If a row is not listed here, it is of the latest version.
                    items:
                      type: integer
                      format: int32
