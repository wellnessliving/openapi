      summary: 'Retrieves a list of classes and class information for the given business and date range.'
      description: |-
        Returns upcoming class sessions for a business, with optional filtering by location,
        day of week, time of day, staff member, and virtual or in-person mode. The result includes
        per-session details such as staff, capacity, booking counts, and virtual locations, as well as
        a calendar map indicating which dates have at least one scheduled session.
      tags:
        - Schedule
      parameters:
        -
          $ref: '#/components/parameters/X-Error-Rules'
        -
          name: a_class
          in: query
          required: true
          schema:
            type: array
            items:
              type: string
          description: |-
            The list of classes keys to filter.
            Return sessions with matching class IDs.

            If it's empty, all classes/events will be returned.
        -
          name: a_day
          in: query
          required: true
          schema:
            type: array
            items:
              $ref: '#/components/schemas/ADateWeekSid'
          description: |-
            Class filter by day of the week.
            Array of number representing the days of the week.
            Return sessions matching the given weekdays.
            (7 = Sunday, 1 = Monday, ..., 6 = Saturday)

            Empty array means no filtering.
        -
          name: a_location
          in: query
          required: true
          schema:
            type: array
            items:
              type: string
          description: |-
            The list of location keys to filter results.
            If it's empty, schedule for all locations will be returned.
            All given locations should be from the same business, which is sent in `k_business`.
        -
          name: a_time
          in: query
          required: true
          schema:
            type: array
            items:
              type: object
              properties:
                tl_start:
                  type: string
                  description: "Time when the session starts. Example: value `'06:00'`."
                tl_end:
                  type: string
                  description: "Time when the session ends. Example: value `'14:00'`."
              required:
                - tl_start
                - tl_end
          description: |-
            Class filter by time of day.
            List of arrays with start and end time in "HH:MM" format (24h).
            Include sessions that start between the specified time range.

            Each value is array with time parameters:


            Empty array means no filtering.
        -
          name: dt_date
          in: query
          required: true
          schema:
            type: string
            format: date-time
          description: 'The list start date in UTC and in MySQL format.'
        -
          name: dt_end
          in: query
          required: true
          schema:
            type: string
            format: date-time
          description: 'The list end date in UTC and in MySQL format.'
        -
          name: is_response_short
          in: query
          required: true
          schema:
            type: boolean
          description: |-
            `true` means to not generate `a_session` result.
