                k_resource:
                  type: string
                  description: 'The asset booking. Specify this for separate asset bookings only.'
                k_service:
                  type: string
                  description: 'The appointment booking. Specify this for appointment bookings only.'
                k_session_pass:
                  type: string
                  description: "The user's pass."
                k_staff:
                  type: string
                  description: |-
                    The staff member conducting the appointment.
