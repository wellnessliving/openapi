                                type: array
                                description: |-
                                  The days of the week when the appointment repeats. One of the constants of the [ADateWeekSid](#/components/schemas/ADateWeekSid) class.
                                  This will be empty if the appointment doesn't repeat weekly.
                                items:
                                  type: integer
                                  format: int32
