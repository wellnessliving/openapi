    Wl.Mail.Domain.DomainVerifyStatusSid:
      type: integer
      format: int32
      description: |-
        Statuses of domain verification.
        Based on the statuses that return Amazon SES API.

        Last used ID: 3.

        Values:
        - 2 (`FAIL`): Domain is not verified.
        - 1 (`PENDING`): Domain verification is pending.
          This is the initial state of the domain verification.
          After state should be changed to [DomainVerifyStatusSid::FAIL](#/components/schemas/Wl.Mail.Domain.DomainVerifyStatusSid) or [DomainVerifyStatusSid::SUCCESS](#/components/schemas/Wl.Mail.Domain.DomainVerifyStatusSid).
        - 3 (`SUCCESS`): Domain is verified.
      enum:
        - 2
        - 1
        - 3
    Wl.Mail.Verify.MailVerifyStatusSid:
      type: integer
      format: int32
      description: |-
        Statuses of mail verification. Based on statuses that returns Amazon SES API.
        It is necessary for sending email through Amazon SES. Amazon SES can send email only from verified email addresses.

        Last used ID: 4.

        Values:
        - 4 (`FAIL`): Email is not verified.
        - 1 (`NONE`): Verification request is not running.
        - 3 (`VERIFY`): Email is verified.
        - 2 (`WAIT_FOR_VERIFY`): Verification in progress.
      enum:
        - 4
        - 1
        - 3
        - 2
