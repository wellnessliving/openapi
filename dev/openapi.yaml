                          dt_date:
                            type: string
                            description: "The date/time for the booking in MySQL format in the location's time zone."
                          i_duration:
                            type: integer
                            format: int32
                            description: 'The duration for the asset booking in minutes. Specify this for separate asset bookings only.'
                          i_index:
                            type: integer
                            format: int32
                            description: |-
                              The asset index on the layout.
                              Specify this for separate asset bookings only and for cases when the asset category only has the layout.
                          id_gender_staff:
                            $ref: '#/components/schemas/AGenderSid'
                            description: |-
                              The gender of the staff member conducting the appointment. One of the [AGenderSid](#/components/schemas/AGenderSid) constants.
                              Specify this for appointment bookings only.
                          id_purchase_item:
                            $ref: '#/components/schemas/RsPurchaseItemSid'
                            description: 'Type of the purchase item. One of the [RsPurchaseItemSid](#/components/schemas/RsPurchaseItemSid) constants.'
