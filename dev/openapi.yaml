                      description: "The recipient's email."
                    s_message:
                      type: string
                      description: 'The message.'
                    s_recipient:
                      type: string
                      description: "The recipient's name."
                    s_sender:
                      type: string
                      description: "The sender's name."
                    m_prorate_custom:
                      type: string
                      description: 'The amount of money for the prorate period. This should only be passed in the case of manual entry.'
                    k_coupon:
                      type: string
                      description: 'The coupon key.'
                    k_coupon_amount:
                      type: string
                      description: 'The coupon amount key.'
                  required:
                    - is_mail
                    - s_recipient
                    - s_sender
                    - m_prorate_custom
                    - k_coupon
                    - k_coupon_amount
                a_tax_custom:
                  type: object
                  description: |-
                    Information about taxes. If not passed, no custom taxes have been applied to the sale item.
                    If a record is present, the tax is custom using the next structure:
                  properties:
