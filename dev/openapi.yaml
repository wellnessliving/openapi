paths:
  /Core/Request/Example.json:
    get:
      operationId: Core.Request.ExampleApi.get
      responses:
        '200':
          description: 'Successful response.'
          content:
            application/json:
              schema:
                type: object
                properties:
                  i_result:
                    type: integer
                    format: int32
                    description: 'Example result.'
                  s_log:
                    type: string
                    description: 'Key of the log record written by the API controller.'
                required:
                  - i_result
                  - s_log
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '404':
          $ref: '#/components/responses/404'
        '422':
          $ref: '#/components/responses/422'
        '500':
          $ref: '#/components/responses/500'
      summary: 'Returns the example result for debugging.'
      description: |-
        A diagnostic endpoint used to verify that a given API connection is working correctly. Increments
        the input argument by one (confirming round-trip data flow), records a debug log entry with the
        current session and authentication context, and returns the log key so the caller can inspect it.
      tags:
        - Application
      parameters:
        -
          $ref: '#/components/parameters/X-Error-Rules'
        -
          name: i_argument
          in: query
          required: true
          schema:
            type: integer
            format: int32
          description: 'Example argument.'
      x-rate-limit:
        -
          limit: 200000
          period: 3600
  /Core/Geo/Combobox.json:
    get:
      operationId: Core.Geo.ComboboxApi.get
      responses:
        '200':
          description: 'Successful response.'
          content:
            application/json:
              schema:
                type: object
                properties:
                  a_list:
                    type: array
                    items:
                      type: object
                      properties:
                        s_value:
                          type: string
                          description: 'The human-readable name of the city, including the state/province and country.'
                        s_key:
                          type: string
                          description: 'The `k_city` value for the city.'
                      required:
                        - s_value
                        - s_key
                required:
                  - a_list
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '404':
          $ref: '#/components/responses/404'
        '422':
          $ref: '#/components/responses/422'
        '500':
          $ref: '#/components/responses/500'
      summary: 'Returns a list of cities to show in combobox list.'
      description: |-
        Powers city autocomplete dropdowns in address forms. Returns up to 100 cities whose names start with
        the given fragment, each labelled as "City, Region, Country". Pass a locale to restrict results to a
        single country, or omit it to search worldwide.
      tags:
        - Geo
      parameters:
        -
          $ref: '#/components/parameters/X-Error-Rules'
        -
          name: id_locale
          in: query
          required: true
          schema:
            $ref: '#/components/schemas/Core.Locale.LocaleSid'
          description: |-
            The locale ID used as a filter. The locale is generally a country.

            One of the [LocaleSid](#/components/schemas/Core.Locale.LocaleSid) constants.

            This will be `0` if all locations are searched.
        -
          name: s_value
          in: query
          required: true
          schema:
            type: string
          description: 'The city name (or a fragment of the city name) used for the search.'
      x-rate-limit:
        -
          limit: 200000
          period: 3600
  /Core/Google/GoogleCaptcha.json:
    put:
      operationId: Core.Google.GoogleCaptchaApi.put
      responses:
        '200':
          description: 'Successful response.'
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '404':
          $ref: '#/components/responses/404'
        '422':
          $ref: '#/components/responses/422'
        '500':
          $ref: '#/components/responses/500'
      summary: 'Saves the user CAPTCHA token for the current session.'
      description: |-
        Accepts the CAPTCHA version, the action name, and the user token obtained from the Google reCAPTCHA widget,
        and stores them in the session so that subsequent API requests requiring CAPTCHA verification can use them.
      tags:
        - Google
      parameters:
        -
          $ref: '#/components/parameters/X-Error-Rules'
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                id_version:
                  $ref: '#/components/schemas/Core.Google.Captcha.CaptchaVersionSid'
                  description: 'Captcha version ID.'
                text_action:
                  type: string
                  description: |-
                    The action name.

                    Used to determine the place where the CAPTCHA is needed in documentation for endpoints that used
                    the CAPTCHA.
                text_token:
                  type: string
                  description: 'The user token CAPTCHA.'
              required:
                - id_version
                - text_action
                - text_token
      deprecated: true
      x-deprecated: 'Use {@link Core\Google\Captcha\GoogleCaptchaApi} instead of this.'
      x-rate-limit:
        -
          limit: 200000
          period: 3600
  /Core/WebSocket/Subscribe.json:
    post:
      operationId: Core.WebSocket.SubscribeApi.post
      responses:
        '200':
          description: 'Successful response.'
          content:
            application/json:
              schema:
                type: object
                properties:
                  a_message_broadcast:
                    type: array
                    items:
                      oneOf:
                        -
                          type: object
                          title: 'Parameters for `1921`'
                          properties:
                            k_visit:
                              type: string
                              description: 'Key of a book/visit.'
                          required:
                            - k_visit
                        -
                          type: object
                          title: 'Parameters for `1869`'
                          properties:
                            i_overdue:
                              type: integer
                              format: int32
                              description: 'Number of overdue tasks.'
                            id_task_status:
                              $ref: '#/components/schemas/Wl.Task.TaskStatusSid'
                              description: |-
                                New task status of the changed task.

                                One of [TaskStatusSid](#/components/schemas/Wl.Task.TaskStatusSid).
                            k_task:
                              type: string
                              description: 'Key of the changed task.'
                          required:
                            - i_overdue
                            - id_task_status
                            - k_task
                        -
                          type: object
                          title: 'Parameters for `1583`'
                          properties:
                            a_data:
                              type: object
                              description: 'New information for messenger.'
                              properties:
                                message:
                                  type: object
                                  description: 'Message information:'
                                  properties:
                                    id:
                                      type: string
                                      description: 'Message key.'
                                    message:
                                      type: string
                                      description: 'Message text.'
                                    updated_at:
                                      type: string
                                      description: 'Date/time when the message has been posted.'
                                  required:
                                    - id
                                    - message
                                    - updated_at
                                user_profile:
                                  type: object
                                  description: "User's information:"
                                  properties:
                                    id_gender:
                                      $ref: '#/components/schemas/Wl.Gender.GenderSid'
                                      description: 'User gender. One of [GenderSid](#/components/schemas/Wl.Gender.GenderSid) constants.'
                                    s_first_name:
                                      type: string
                                      description: 'User first name.'
                                    s_last_name:
                                      type: string
                                      description: 'User last name.'
                                    uid:
                                      type: string
                                      description: 'User key.'
                                    url_photo:
                                      type: string
                                      description: "URL of the user's profile photo."
                                  required:
                                    - id_gender
                                    - s_first_name
                                    - s_last_name
                                    - uid
                                    - url_photo
                              required:
                                - message
                                - user_profile
                          required:
                            - a_data
                        -
                          type: object
                          title: 'Parameters for `1342`'
                          properties:
                            i_unread_alert:
                              type: integer
                              format: int32
                              description: 'The count with unread alert for the user.'
                            is_active:
                              type: boolean
                              description: 'Whether message is active. This is needed to avoid showing previous messages on page reload.'
                            is_message:
                              type: boolean
                              description: 'Whether this is an alert for an SMS message'
                            is_sound:
                              type: boolean
                              description: 'Whether the user should hear a sound when a notification is sent.'
                            k_alert:
                              type:
                                - string
                                - 'null'
                              description: |-
                                Key of the alert that was just sent.

                                `null` means alert was read.
                          required:
                            - i_unread_alert
                            - is_active
                            - is_message
                            - is_sound
                            - k_alert
                        -
                          type: object
                          title: 'Parameters for `733`'
                          properties:
                            k_business:
                              type:
                                - string
                                - 'null'
                              description: 'Business key.'
                          required:
                            - k_business
                        -
                          type: object
                          title: 'Parameters for `688`'
                          properties:
                            url_redirect:
                              type: string
                              description: 'Url link to redirect to join virtual meeting.'
                          required:
                            - url_redirect
                        -
                          type: object
                          title: 'Parameters for `735`'
                          properties:
                            i_cas_change:
                              type: integer
                              format: int32
                              description: |-
                                A CAS (compare-and-swap) number that allows to track changes in the report storage.

                                This number is changed every time content of the report gets updated.
                                If this number is not changed, the content is not updated.
                            id_report_status:
                              $ref: '#/components/schemas/Thoth.ReportCore.Generator.ReportGeneratorStatusSid'
                              description: |-
                                Status of this report.

                                One of [ReportGeneratorStatusSid](#/components/schemas/Thoth.ReportCore.Generator.ReportGeneratorStatusSid) constants.
                          required:
                            - i_cas_change
                            - id_report_status
                        -
                          type: object
                          title: 'Parameters for `19`'
                          properties:
                            text_title:
                              type: string
                              description: 'New title of the business.'
                          required:
                            - text_title
                        -
                          type: object
                          title: 'Parameters for `1820`'
                          properties:
                            k_login_type:
                              type:
                                - string
                                - 'null'
                              description: |-
                                Key of the client type.

                                `null` if client type is not set.
                            uid:
                              type: string
                              description: 'Key of the user.'
                          required:
                            - k_login_type
                            - uid
                        -
                          type: object
                          title: 'Parameters for `842`'
                          properties:
                            i_generation:
                              type: integer
                              format: int32
                              description: 'Duration of the generation of the report in seconds.'
                            id_report:
                              $ref: '#/components/schemas/RsReportSid'
                              description: |-
                                ID of the report that was generated.
                                One of the [RsReportSid](#/components/schemas/RsReportSid) constants.
                            is_need_show:
                              type: boolean
                              description: 'Whether need to display a message about report generation, regardless of the generation time.'
                            k_report_accumulation:
                              type: string
                              description: 'Report accumulation.'
                            text_report:
                              type: string
                              description: 'Title of the report that was generated.'
                          required:
                            - i_generation
                            - id_report
                            - is_need_show
                            - k_report_accumulation
                            - text_report
                        -
                          type: object
                          title: 'Parameters for `1543`'
                        -
                          type: object
                          title: 'Parameters for `977`'
                          properties:
                            html_error_message:
                              type: string
                              description: 'The text of the error.'
                            s_key:
                              type: string
                              description: 'The unique key of the sent SMS.'
                            tl_send:
                              type: integer
                              format: int32
                              description: 'The time in UNIX format when socket message was sent.'
                          required:
                            - html_error_message
                            - s_key
                            - tl_send
                        -
                          type: object
                          title: 'Parameters for `16`'
                          properties:
                            text_title:
                              type: string
                              description: 'New title of the business.'
                          required:
                            - text_title
                        -
                          type: object
                          title: 'Parameters for `1834`'
                          properties:
                            a_domain_token:
                              type: object
                              description: |-
                                List of email domain tokens: 

                                Empty array if the business does not have a mail domain set up.
                              properties:
                                id_status:
                                  $ref: '#/components/schemas/Wl.Mail.Domain.DomainVerifyStatusSid'
                                  description: 'Status of the token. One of [DomainVerifyStatusSid](#/components/schemas/Wl.Mail.Domain.DomainVerifyStatusSid) constants.'
                                text_host:
                                  type: string
                                  description: 'Host part of the token, which should be added to the DNS records.'
                                text_icon_class:
                                  type: string
                                  description: 'CSS class for the icon representing the token status.'
                                text_status:
                                  type: string
                                  description: 'Text representation of the token status.'
                                text_type:
                                  type: string
                                  description: 'Type of the token. One of [DomainTokenTypeSid](#/components/schemas/Wl.Mail.Domain.DomainTokenTypeSid) constants in text representation.'
                                text_value:
                                  type: string
                                  description: 'Value of the token, which should be added to the DNS records.'
                              required:
                                - id_status
                                - text_host
                                - text_icon_class
                                - text_status
                                - text_type
                                - text_value
                            id_domain_status:
                              $ref: '#/components/schemas/Wl.Mail.Domain.DomainVerifyStatusSid'
                              description: |-
                                Email domain status.

                                `null` if the business does not have a mail domain set up.
                            text_domain_status_icon:
                              type: string
                              description: |-
                                CSS class for the icon representing the email domain status.

                                Empty string if the business does not have a mail domain set up.
                          required:
                            - a_domain_token
                            - id_domain_status
                            - text_domain_status_icon
                        -
                          type: object
                          title: 'Parameters for `677`'
                          properties:
                            id_mail_verify_status:
                              $ref: '#/components/schemas/Wl.Mail.Verify.MailVerifyStatusSid'
                              description: |-
                                Status of mail verification.
                                One of the [MailVerifyStatusSid](#/components/schemas/Wl.Mail.Verify.MailVerifyStatusSid) constants.
                                Or [MailVerifyStatusOption::DEFAULT_VALUE](#/components/schemas/Wl.Business.Config.Option.OptionSidAbstract) if option "Enable Custom Reply To Emails" in Business -&gt; Feature is disabled.
                            text_email:
                              type: string
                              description: 'Email address to check.'
                          required:
                            - id_mail_verify_status
                            - text_email
                        -
                          type: object
                          title: 'Parameters for `1657`'
                        -
                          type: object
                          title: 'Parameters for `298`'
                          properties:
                            dt_end_local:
                              type: string
                              description: |-
                                End of change interval.

                                Empty string if change interval has no end.
                            dt_start_local:
                              type: string
                              description: 'Start of change interval.'
                            k_class_tab_new:
                              type:
                                - string
                                - 'null'
                              description: |-
                                New "Book now" tab primary key in [TabSid](#/components/schemas/Wl.Classes.Tab.TabSid) table.

                                `null` means system default tab.
                            k_class_tab_old:
                              type:
                                - string
                                - 'null'
                              description: |-
                                Old "Book now" tab primary key in [TabSid](#/components/schemas/Wl.Classes.Tab.TabSid) table.

                                `null` means system default tab.
                          required:
                            - dt_end_local
                            - dt_start_local
                            - k_class_tab_new
                            - k_class_tab_old
                        -
                          type: object
                          title: 'Parameters for `305`'
                          properties:
                            dtl_end:
                              type: string
                              description: 'Session end date/time.'
                            dtl_start:
                              type: string
                              description: 'Session start date/time.'
                            k_appointment:
                              type:
                                - string
                                - 'null'
                              description: |-
                                Key of the changed appointment.
                                Is set only if changed session is appointment.

                                `null` if changed session is not an appointment.
                            k_class_period:
                              type:
                                - string
                                - 'null'
                              description: |-
                                Key of the changed class session.
                                Is set only if changed session is class.

                                `null` if changed session is not a class.
                          required:
                            - dtl_end
                            - dtl_start
                            - k_appointment
                            - k_class_period
                        -
                          type: object
                          title: 'Parameters for `1163`'
                          properties:
                            is_active:
                              type: boolean
                              description: 'Whether message is active. This is needed to avoid showing previous messages on page reload.'
                            is_booking_in_progress:
                              type:
                                - boolean
                                - 'null'
                              description: 'Whether booking is in progress.'
                          required:
                            - is_active
                            - is_booking_in_progress
                        -
                          type: object
                          title: 'Parameters for `1850`'
                          properties:
                            i_complete:
                              type: integer
                              format: int32
                              description: 'Number of successfully processed items.'
                            i_fail:
                              type: integer
                              format: int32
                              description: 'Number of failed items.'
                            i_left:
                              type: integer
                              format: int32
                              description: 'Number of items left to process.'
                            k_import:
                              type: string
                              description: 'Key of the import being processing.'
                            url_log:
                              type: string
                              description: 'Url link to download log file with import progress.'
                          required:
                            - i_complete
                            - i_fail
                            - i_left
                            - k_import
                            - url_log
                        -
                          type: object
                          title: 'Parameters for `510`'
                          properties:
                            a_visit:
                              type: object
                              description: 'New data of changes schedule item:'
                              properties:
                                dtl_end:
                                  type: string
                                  description: 'Date/time of end.'
                                dtl_start:
                                  type: string
                                  description: 'Date/time of start.'
                                is_cancel:
                                  type: boolean
                                  description: '`true` if book was canceled; `false` otherwise.'
                                s_key:
                                  type: string
                                  description: 'Book key.'
                                text_address:
                                  type: string
                                  description: 'Address of location.'
                                text_location:
                                  type: string
                                  description: 'Title of location.'
                                text_note:
                                  type: string
                                  description: 'Description of event.'
                                text_title:
                                  type: string
                                  description: 'Title of event.'
                                url:
                                  type: string
                                  description: 'URL of virtual service. Empty if the visit is not virtual.'
                              required:
                                - dtl_end
                                - dtl_start
                                - is_cancel
                                - s_key
                                - text_address
                                - text_location
                                - text_note
                                - text_title
                                - url
                          required:
                            - a_visit
                        -
                          type: object
                          title: 'Parameters for `1660`'
                        -
                          type: object
                          title: 'Parameters for `1421`'
                          properties:
                            id_card_system:
                              $ref: '#/components/schemas/ACardSystemSid'
                              description: |-
                                Card type ID.

                                Not `null` when [DirectConnectTicketStatusChannel::$id_ticket_status](#/components/schemas/Core.WebSocket.ChannelBroadcast)
                                is equal [DirectConnectTicketStatusSid::COMPLETE](#/components/schemas/Thoth.PayProcessor.DirectConnect.Ticket.DirectConnectTicketStatusSid).
                            id_pay_exception:
                              $ref: '#/components/schemas/RsPayException'
                              description: |-
                                Transaction exception ID.

