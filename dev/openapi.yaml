  /Wl/Appointment/Book/Asset/AssetList.json:
    get:
      operationId: Wl.Appointment.Book.Asset.AssetListApi.get
      responses:
        '200':
          description: 'Successful response.'
          content:
            application/json:
              schema:
                type: object
                properties:
                  a_asset:
                    type: array
                    items:
                      type: object
                      properties:
                        a_age_restrictions:
                          type: object
                          description: |-
                            Information about age restrictions for this event.

                            This will be an empty array if there aren't any age restrictions.
                          properties:
                            i_age_from:
                              type:
                                - integer
                                - 'null'
                              format: int32
                              description: "The minimum age permitted for the event. This will be `null` if a minimum age isn't set or available."
                            i_age_to:
                              type:
                                - integer
                                - 'null'
                              format: int32
                              description: "The maximum age permitted for the event. This will be `null` if a maximum age isn't set or available."
                            is_age_public:
                              type: boolean
                              description: |-
                                This will be `true` if age restrictions are public and available. Otherwise, this will be `false` if they're hidden.
                                When restrictions are hidden and current user isn't a staff member, the age range will be empty.
                          required:
                            - i_age_from
                            - i_age_to
                            - is_age_public
                        a_class_tab:
                          type: array
                          description: |-
                            The key of service.
                              Keys are service key. 
                              Values are class tab key.
                          items:
                            type: string
                        a_direct_link:
                          type: object
                          description: |-
                            A list of links to create a booking from a direct link (direct booking URL).
                            The system needs to know what tab is associated with the booking. Therefore, there needs to be one link
                            per tab.
                            Each element has two values:
                          properties:
                            k_class_tab:
                              type: string
                              description: 'The key of the book now tab.'
                            url_tab:
                              type: string
                              description: 'The direct booking URL. This will open the booking wizard under the related booking tab.'
                          required:
                            - k_class_tab
                            - url_tab
                        a_image:
                          type: object
                          description: 'Information about the asset logo:'
                          properties:
                            i_angle:
                              type: integer
                              format: int32
                              description: 'The angle of the shape rotation. This is set only if the image is one of the default shapes.'
                            is_empty:
                              type: boolean
                              description: 'Determines if the asset logo is empty.'
                            sid_image_icon:
                              type: string
                              description: 'The icon name. String representation of one of the [ImageIconSid](#/components/schemas/Wl.Resource.Image.ImageIconSid) constants. This is only set if the image kind equals to `image`.'
                            sid_image_shape:
                              type: string
                              description: 'The shape name. String representation of one of the [ImageShapeSid](#/components/schemas/Wl.Resource.Image.ImageShapeSid) constants. This is set only if the image kind equals to `shape`.'
                            url:
                              type: string
                              description: 'The asset logo URL.'
                          required:
                            - i_angle
                            - is_empty
                            - sid_image_icon
                            - sid_image_shape
                            - url
                        a_period:
                          type: object
                          description: 'A list of asset periods with the following information:'
                          properties:
                            html_duration:
                              type: string
                              description: 'The HTML code used to display the asset duration.'
                            html_price:
                              type: string
                              description: 'The HTML code used to display the formatted price.'
                            i_duration:
                              type: integer
                              format: int32
                              description: 'The asset duration in minutes.'
                            id_price:
                              $ref: '#/components/schemas/RsServicePriceSid'
                              description: 'The asset period price type. One of [RsServicePriceSid](#/components/schemas/RsServicePriceSid) constants.'
                            m_price:
                              type: string
                              description: 'The asset period price.'
                          required:
                            - html_duration
                            - html_price
                            - i_duration
                            - id_price
                            - m_price
                        a_search_tag:
                          type: array
                          description: 'QUICK Search tag keys.'
                          items:
                            type: string
                        hide_application:
                          type: boolean
                          description: |-
                            Determines whether the asset will be hidden in the White Label mobile apps.
                            If `true`, the asset won't be displayed. Otherwise, this will be `false`.
                        html_age_restriction:
                          type: string
                          description: 'The resource age restriction'
                        html_title:
                          type: string
                          description: 'The resource name.'
                        id_service_require:
                          $ref: '#/components/schemas/RsServiceRequireSid'
                          description: 'The purchase rule. One of the [RsServiceRequireSid](#/components/schemas/RsServiceRequireSid) constants.'
                        is_age_restricted:
                          type: boolean
                          description: "Determines whether this service can't be booked due to age restrictions."
                        k_class_tab:
                          type: string
                          description: 'Quick book tab key.'
                        k_resource:
                          type: string
                          description: 'The resource key.'
                        k_resource_category:
                          type: string
                          description: 'The resource category key.'
                      required:
                        - a_age_restrictions
                        - a_class_tab
                        - a_direct_link
                        - a_image
                        - a_period
                        - a_search_tag
                        - hide_application
                        - html_age_restriction
                        - html_title
                        - id_service_require
                        - is_age_restricted
                        - k_class_tab
                        - k_resource
                        - k_resource_category
                  a_asset_busy:
                    type: array
                    description: |-
                      A list of reserved assets.

                      1st level keys refer to asset keys.
                      2nd level keys refer to asset numbers.
                      Values are keys of appointment bookings that reserve the asset, or `true` if the asset is reserved by a class or event.

                      For example, if you want to check if the 10th asset with the key of '15' is reserved,
                      you can check if `a_resource_busy[&#039;15&#039;][&#039;10&#039;]` is free.

                      If you're rebooking an appointment, check the value of `a_resource_busy[&#039;15&#039;][&#039;10&#039;]`.
                      If it's equal to the key of your current appointment booking, you can assume the asset is available.
                    items:
                      type: array
                      items:
                        oneOf:
                          -
                            type: string
                          -
                            type: boolean
                  k_resource_layout:
                    type: string
                    description: |-
                      The asset layout key.
                      May be empty if asset category has no layout.
                required:
                  - a_asset
                  - a_asset_busy
                  - k_resource_layout
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '404':
          $ref: '#/components/responses/404'
        '422':
          $ref: '#/components/responses/422'
        '500':
          $ref: '#/components/responses/500'
      summary: 'Retrieves information about assets in the current asset category.'
      description: |-
        Returns the list of bookable assets at the given location, optionally filtered by category and book now tab.
         When a date and time are provided, only assets available at that time are included and busy asset slots
         are returned in `a_asset_busy`. Supports both frontend and backend modes.
      tags:
        - Appointments
      parameters:
        -
          $ref: '#/components/parameters/X-Error-Rules'
        -
          name: dtl_date
          in: query
          required: true
          schema:
            type: string
            format: date-time
          description: |-
            The selected date and time of the asset booking. It is used in cases when the business booking policy allows
            clients to select a date and time, and then the available asset.
        -
          name: i_image_height
          in: query
          required: true
          schema:
            type: integer
            format: int32
          description: |-
            Image height in pixels. Please specify this value if you need image to be returned in specific size.
            In case this value is not specified returned image will have default size.
        -
          name: i_image_width
          in: query
          required: true
          schema:
            type: integer
            format: int32
          description: |-
            Image width in pixels. Please specify this value if you need image to be returned in specific size.
            In case this value is not specified returned image will have default size.
        -
          name: id_mode
          in: query
          required: true
          schema:
            $ref: '#/components/schemas/Wl.Mode.ModeSid'
          description: 'Mode type, one of [ModeSid](#/components/schemas/Wl.Mode.ModeSid) constants.'
        -
          name: is_backend
          in: query
          required: true
          schema:
            type: boolean
          description: 'This is `true` if asset categories are loaded for back-end mode. Otherwise, this will be `false` for front-end mode.'
        -
          name: is_tab_all
          in: query
          required: true
          schema:
            type: boolean
          description: |-
            `true` - search in all tabs.
            `false` - search only for the selected book tab.
        -
          name: k_appointment
          in: query
          required: true
          schema:
            type: string
          description: |-
            Key of the appointment, if we reschedule existing appointment.
            It should be sent to ignore it when we get availability hours for the asset.
        -
          name: k_business
          in: query
          required: true
          schema:
            type: string
          description: |-
            Business key.

            If not set, location's business will be used.
        -
          name: k_class_tab
          in: query
          required: true
          schema:
            type: string
          description: |-
            The class tab key used to filter assets.

            This will be `null` if not set yet or if elements with no specified class tab are selected.
        -
          name: k_location
          in: query
          required: true
          schema:
            type: string
          description: 'The location key.'
        -
          name: k_resource_category
          in: query
          required: true
          schema:
            type: string
          description: 'The asset category key to show information for.'
        -
          name: k_timezone
          in: query
          required: true
          schema:
            type: string
          description: |-
            Timezone of date and time of asset booking.

            Empty if `dtl_date` not set or client can't change in which timezone dates should be shown.
        -
          name: uid
          in: query
          required: false
          schema:
            type:
              - string
              - 'null'
          description: |-
            Client to get information for.

            If client not set, returns full asset list without client restrictions.
      x-rate-limit:
        -
          limit: 200000
          period: 3600
