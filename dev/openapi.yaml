      summary: 'Retrieves information about class.'
      description: |-
        Returns detailed information about one or more class sessions, including staff, location,
        assigned assets, virtual location links, visit counts, and booking availability. Supports
        single-session mode for one class period or multi-session mode for batch lookups.
      tags:
        - Schedule
      parameters:
        -
          $ref: '#/components/parameters/X-Error-Rules'
        -
          name: a_session_request
          in: query
          required: false
          schema:
            type:
              - array
              - 'null'
            items:
              type: object
              properties:
                dt_date:
                  type: string
                  description: 'The date/time of the session in UTC.'
                k_class_period:
                  type: string
                  description: 'The session key.'
              required:
                - dt_date
                - k_class_period
          description: |-
            A list of sessions to get information for. Every element has the following keys:


            `null` if requesting a single session.
        -
          name: dt_date
          in: query
          required: true
          schema:
            type: string
            format: date-time
          description: 'The date/time of the session.'
        -
          name: k_business
          in: query
          required: false
          schema:
            type:
              - string
              - 'null'
          description: |-
            Key of the business in which the action is performed.

            `null` if key of the business was not passed.

            Key of the business is required if [ClassViewApi](/Wl/Schedule/ClassView/ClassView.json) was passed.
        -
          name: k_class_period
          in: query
          required: true
          schema:
            type: string
          description: 'The class period key.'
        -
          name: uid
          in: query
          required: true
          schema:
            type: string
          description: 'The user key.'
      x-rate-limit:
        -
          limit: 200000
          period: 3600
        -
          limit: 3000
          period: 300
