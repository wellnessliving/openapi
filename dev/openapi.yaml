                            is_back_to_back:
                              type: boolean
                              description: '`true` if this service supports back-to-back booking.'
                            is_book_repeat_client:
                              type: boolean
                              description: '`true` if clients can book this service on a recurring basis.'
                            is_book_repeat_no_end_date_appointment:
                              type: boolean
                              description: '`true` if appointment bookings for this service default to weekly recurring with no end date.'
                            is_multiple_booking:
                              type: boolean
