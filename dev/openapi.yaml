                          type: boolean
                          description: 'If `true`, then the purchase item is active. Otherwise, this will be `false`.'
                        is_component:
                          type: boolean
                          description: 'If `true`, then the purchase item is a package component. Otherwise, this will be `false`.'
                        is_package:
