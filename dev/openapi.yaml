                id_relation:
                  $ref: '#/components/schemas/RsFamilyRelationSid'
                  description: |-
                    The relation type.
                    One of the [RsFamilyRelationSid](#/components/schemas/RsFamilyRelationSid) constants.
                is_mail_inherit:
                  type: boolean
                  description: |-
                    `true` - the new relative uses the email from `uid_from`.

                    `false` - the new relative has their own email.
                is_pay_self:
                  type: boolean
                  description: |-
                    `true` - the new relative pays for themselves.

                    `false` - `uid_from` pays for the new relative.
                text_mail:
                  type: string
                  description: "The new relative's email."
                text_name_first:
                  type: string
                  description: "The new relative's first name."
                text_name_last:
                  type: string
                  description: "The new relative's last name."
                uid_existed:
                  type: string
                  description: 'UID of already existed in another business user.'
              required:
