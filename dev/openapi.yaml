                  a_list_wait:
                    type: array
                    items:
                      type: object
                      properties:
                        a_info:
                          type: object
                          description: 'Information about member.'
                          properties:
                            a_icon:
                              type: object
                              description: 'List of icons with additional information about business member.'
                              properties:
                                s_color_background:
                                  type: string
                                  description: 'Color of background.'
                                s_color_foreground:
                                  type: string
                                  description: 'Color of letter.'
                                s_letter:
                                  type: string
                                  description: 'Icon letter.'
                                s_shape:
                                  type: string
                                  description: 'Symbol from font of shapes.'
                                s_title:
                                  type: string
                                  description: Title.
                                sid_shape:
                                  type: string
                                  description: 'SID of the icon type shape. Constant from [ShapeSid](#/components/schemas/Wl.Login.Type.ShapeSid).'
                              required:
                                - s_color_background
                                - s_color_foreground
                                - s_letter
                                - s_shape
                                - s_title
                                - sid_shape
                            a_vaccination_status:
                              type: object
                              description: 'Information about users vaccination status.'
                              properties:
                                sid_vaccination_status:
                                  type: string
                                  description: 'Vaccination status sid. Result from [VaccinationStatusSid::idSid()](#/components/schemas/Wl.Login.Member.VaccinationStatus.VaccinationStatusSid) method.'
                                text_vaccination_status:
                                  type: string
                                  description: 'Vaccination status.'
                              required:
                                - sid_vaccination_status
                                - text_vaccination_status
                            a_note:
                              type: object
                              description: "List of client's notes. Every element has keys:"
                              properties:
                                html_note:
                                  type: string
                                  description: 'HTML text ready to be pasted in browser.'
                                is_flag:
                                  type: boolean
                                  description: '`true` if this note has a flag; `false` otherwise.'
                              required:
                                - html_note
                                - is_flag
                            html_credit:
                              type: string
                              description: 'Amount the client owns to the business.'
                            html_note:
                              type: string
                              description: |-
                                User`s login notes.&lt;/dd&gt;

                                 &lt;dt&gt;int &lt;var&gt;i_visit_credit&lt;/var&gt;&lt;/dt&gt;
                                 &lt;dd&gt;Count of unpaid visits if client has at least one.&lt;/dd&gt;

                                 &lt;dt&gt;bool &lt;var&gt;is_account_positive&lt;/var&gt;&lt;/dt&gt;
                                 &lt;dd&gt;If the user has a positive balance on his account.&lt;/dd&gt;

                                 &lt;dt&gt;bool &lt;var&gt;is_birthday&lt;/var&gt;&lt;/dt&gt;
                                 &lt;dd&gt;If a user has a birthday today.&lt;/dd&gt;

                                 &lt;dt&gt;bool &lt;var&gt;is_contract&lt;/var&gt;&lt;/dt&gt;
                                 &lt;dd&gt;&lt;tt&gt;true&lt;/tt&gt; if client has some contracts that he should agree.&lt;/dd&gt;

                                 &lt;dt&gt;bool &lt;var&gt;is_family_payer&lt;/var&gt;&lt;/dt&gt;
                                 &lt;dd&gt;`true` if the user makes payments for a family member, `false` otherwise.&lt;/dd&gt;

                                 &lt;dt&gt;bool &lt;var&gt;is_first&lt;/var&gt;&lt;/dt&gt;
                                 &lt;dd&gt;&lt;tt&gt;true&lt;/tt&gt; if this is a first visit of the client.&lt;/dd&gt;

                                 &lt;dt&gt;bool &lt;var&gt;is_form&lt;/var&gt;&lt;/dt&gt;
                                 &lt;dd&gt;`true` if the client has uncompleted one or more forms.
                            is_task_active:
                              type: boolean
                              description: '`true` if for user exists not completed tasks.'
                            is_task_urgent:
                              type: boolean
                              description: '`true` if for user exists urgent tasks.'
                            is_waiver:
                              type: boolean
                              description: '`true` if client has not agreed with online waiver.'
                            k_currency:
                              type: string
                              description: |-
                                Currency of business `$k_business`.
                                   
                                   It is currency of amount `m_credit`.
                            m_credit:
                              type: string
                              description: "User's account balance."
                            show_amount:
                              type: boolean
                              description: 'Display user balance or not.'
                            text_address:
                              type: string
                              description: "User's address."
                            text_age:
                              type: string
                              description: 'Users age. Appears only on the day of birth.'
                            text_mail:
                              type: string
                              description: "User's email."
                            text_phone:
                              type: string
                              description: "User's cell phone."
                            text_firstname:
                              type: string
                              description: 'Users first name.'
                            text_visit_credit:
                              type: string
                              description: "Link to the page with client's attendance."
                            url_attendance:
                              type: string
                              description: "Link to the page with information about client's account balance."
                            url_billing:
                              type: string
                              description: "Link to user's billing page."
