<!DOCTYPE html>
<html lang="en">
<head>
  <title>WellnessLiving API - Stable</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { margin: 0; padding: 0; }
    #switcher {
      position: fixed;
      top: 12px;
      right: 16px;
      z-index: 9999;
      display: flex;
      border-radius: 6px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,.25);
    }
    #switcher button {
      border: none;
      padding: 7px 16px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      background: #fff;
      color: #555;
      transition: background .15s, color .15s;
    }
    #switcher button.active {
      background: #1d3557;
      color: #fff;
    }
    #container-swagger {
      display: none;
      padding-top: 48px;
    }
  </style>
</head>
<body>
  <div id="switcher">
    <button id="btn-redoc" class="active" onclick="showRedoc()">Redoc</button>
    <button id="btn-swagger" onclick="showSwagger()">Swagger UI</button>
  </div>

  <div id="container-redoc"></div>
  <div id="container-swagger">
    <div id="swagger-ui"></div>
  </div>

  <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist/swagger-ui.css">
  <script src="https://cdn.redoc.ly/redoc/latest/bundles/redoc.standalone.js"></script>
  <script src="https://unpkg.com/swagger-ui-dist/swagger-ui-bundle.js"></script>
  <script>
    function showRedoc()
    {
      document.getElementById('container-redoc').style.display = '';
      document.getElementById('container-swagger').style.display = 'none';
      document.getElementById('btn-redoc').classList.add('active');
      document.getElementById('btn-swagger').classList.remove('active');
      localStorage.setItem('wl-api-viewer', 'redoc');
    }

    function showSwagger()
    {
      document.getElementById('container-redoc').style.display = 'none';
      document.getElementById('container-swagger').style.display = '';
      document.getElementById('btn-redoc').classList.remove('active');
      document.getElementById('btn-swagger').classList.add('active');
      localStorage.setItem('wl-api-viewer', 'swagger');
    }

    Redoc.init('openapi.yaml', {}, document.getElementById('container-redoc'));

    SwaggerUIBundle({
      url: 'openapi.yaml',
      dom_id: '#swagger-ui',
      deepLinking: true,
      presets: [SwaggerUIBundle.presets.apis],
      layout: 'BaseLayout'
    });

    if (localStorage.getItem('wl-api-viewer') === 'swagger')
    {
      showSwagger();
    }
  </script>
</body>
</html>
