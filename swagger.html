<!DOCTYPE html>
<html lang="en">
<head>
  <title>WellnessLiving API</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist/swagger-ui.css">
  <style>
    body { margin: 0; padding: 0; }
    #switcher {
      position: fixed;
      top: 12px;
      right: 16px;
      z-index: 9999;
      display: flex;
      gap: 8px;
      align-items: center;
      border-radius: 6px;
      padding: 4px 8px;
      background: #fff;
      box-shadow: 0 2px 8px rgba(0,0,0,.25);
    }
    #switcher .branch {
      font-size: 12px;
      font-weight: 600;
      color: #999;
      padding-right: 8px;
      border-right: 1px solid #e2e8f0;
    }
    #switcher a {
      display: block;
      padding: 4px 12px;
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      border-radius: 4px;
      color: #555;
    }
    #switcher a.active {
      background: #1d3557;
      color: #fff;
      pointer-events: none;
    }
    .swagger-ui .topbar { display: none; }
  </style>
</head>
<body>
  <div id="switcher">
    <span id="branch-label" class="branch"></span>
    <a id="btn-redoc" href="#">Redoc</a>
    <a class="active" href="#">Swagger UI</a>
  </div>

  <div id="swagger-ui"></div>

  <script src="https://unpkg.com/swagger-ui-dist/swagger-ui-bundle.js"></script>
  <script src="https://unpkg.com/swagger-ui-dist/swagger-ui-standalone-preset.js"></script>
  <script>
    const branch = new URLSearchParams(location.search).get('branch') || 'stable';
    const branchLabels = {'dev': 'Development', 'stable': 'Stable'};

    document.title = 'WellnessLiving API - ' + (branchLabels[branch] || branch);
    document.getElementById('branch-label').textContent = branchLabels[branch] || branch;
    document.getElementById('btn-redoc').href = 'redoc.html?branch=' + branch;

    SwaggerUIBundle({
      url: branch + '/openapi.yaml',
      dom_id: '#swagger-ui',
      deepLinking: true,
      presets: [SwaggerUIBundle.presets.apis, SwaggerUIStandalonePreset],
      plugins: [SwaggerUIBundle.plugins.DownloadUrl],
      layout: 'StandaloneLayout'
    });
  </script>
</body>
</html>
