<!DOCTYPE html>
<html lang="en">
<head>
  <title>WellnessLiving API</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { margin: 0; padding: 0; }
    #switcher {
      position: fixed;
      top: 12px;
      right: 16px;
      z-index: 9999;
      display: flex;
      gap: 8px;
      align-items: center;
      border-radius: 6px;
      padding: 4px 8px;
      background: #fff;
      box-shadow: 0 2px 8px rgba(0,0,0,.25);
    }
    #switcher .branch {
      font-size: 12px;
      font-weight: 600;
      color: #999;
      padding-right: 8px;
      border-right: 1px solid #e2e8f0;
    }
    #switcher a {
      display: block;
      padding: 4px 12px;
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      border-radius: 4px;
      color: #555;
    }
    #switcher a.active {
      background: #1d3557;
      color: #fff;
      pointer-events: none;
    }
    #container-redoc,
    #container-swagger { display: none; }
    #container-swagger { padding-top: 48px; }
    .swagger-ui .topbar { display: none; }
  </style>
</head>
<body>
  <div id="switcher">
    <span id="branch-label" class="branch"></span>
    <a id="btn-redoc" href="#">Redoc</a>
    <a id="btn-swagger" href="#">Swagger UI</a>
  </div>

  <div id="container-redoc"></div>
  <div id="container-swagger">
    <div id="swagger-ui"></div>
  </div>

  <script>
    const params = new URLSearchParams(location.search);
    const branch = params.get('branch') || 'stable';
    const viewer = params.get('v') || localStorage.getItem('wl-api-viewer') || 'redoc';
    const specUrl = branch + '/openapi.yaml';

    const branchLabels = {'dev': 'Development', 'stable': 'Stable'};
    document.title = 'WellnessLiving API - ' + (branchLabels[branch] || branch);
    document.getElementById('branch-label').textContent = branchLabels[branch] || branch;

    document.getElementById('btn-redoc').href = '?branch=' + branch + '&v=redoc';
    document.getElementById('btn-swagger').href = '?branch=' + branch + '&v=swagger';

    localStorage.setItem('wl-api-viewer', viewer);
    document.getElementById('btn-' + viewer).classList.add('active');
    document.getElementById('container-' + viewer).style.display = '';

    function loadScript(src, onload)
    {
      const s = document.createElement('script');
      s.src = src;
      s.onload = onload;
      document.head.appendChild(s);
    }

    if (viewer === 'swagger')
    {
      const link = document.createElement('link');
      link.rel = 'stylesheet';
      link.href = 'https://unpkg.com/swagger-ui-dist/swagger-ui.css';
      document.head.appendChild(link);

      loadScript('https://unpkg.com/swagger-ui-dist/swagger-ui-bundle.js', function()
      {
        loadScript('https://unpkg.com/swagger-ui-dist/swagger-ui-standalone-preset.js', function()
        {
          SwaggerUIBundle({
            url: specUrl,
            dom_id: '#swagger-ui',
            deepLinking: true,
            presets: [SwaggerUIBundle.presets.apis, SwaggerUIStandalonePreset],
            plugins: [SwaggerUIBundle.plugins.DownloadUrl],
            layout: 'StandaloneLayout'
          });
        });
      });
    }
    else
    {
      loadScript('https://cdn.redoc.ly/redoc/latest/bundles/redoc.standalone.js', function()
      {
        Redoc.init(specUrl, {}, document.getElementById('container-redoc'));
      });
    }
  </script>
</body>
</html>
